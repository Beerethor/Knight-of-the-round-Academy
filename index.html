<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOTRA // COMMAND HUB</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0b10">
    <link rel="icon" type="image/png" href="img/index/icona_app.png">
    <link rel="apple-touch-icon" href="img/index/icona_app.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007a;
            --neon-purple: #bc13fe;
            --bg-dark: #06070a;
            --terminal-green: rgba(51, 255, 51, 0.8);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20, 30, 48, 0.5) 0%, rgba(6, 7, 10, 1) 100%),
                url('img/index/sfondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Overlay Effetto Scanline */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Navigazione */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            z-index: 1000;
        }

        #auth-status button {
            background: none;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 5px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s;
        }

        #auth-status button:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        /* Schermate Generali */
        .page { display: none; padding: 20px; width: 100%; max-width: 600px; margin: auto; z-index: 10; flex-direction: column; }
        .active { display: flex; animation: fadeIn 0.5s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Design Sezioni */
        .section {
            background: rgba(10, 11, 16, 0.9);
            padding: 30px;
            border-radius: 2px;
            border: 1px solid var(--glass-border);
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.05);
        }

        .section::before { 
            content: ""; position: absolute; top: -1px; left: -1px; width: 20px; height: 20px;
            border-top: 3px solid var(--neon-blue); border-left: 3px solid var(--neon-blue);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
        }

        /* Input & Form */
        input, select, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #333;
            color: var(--neon-blue);
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        /* Hub Buttons */
        .hub-menu { gap: 20px; width: 100%; }
        
        .hub-btn {
            width: 100%;
            padding: 20px;
            background: rgba(0, 242, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-btn::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.1), transparent);
            top: 0; left: -100%; transition: 0.5s;
        }

        .hub-btn:hover::after { left: 100%; }

        .hub-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            transform: scale(1.02);
        }

        .btn-primary { border-color: var(--neon-pink); color: var(--neon-pink); }
        .btn-primary:hover { background: rgba(255, 0, 122, 0.1); border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(255, 0, 122, 0.2); color: white; }

        /* Login Logo */
        .login-logo {
            width: 120px;
            filter: drop-shadow(0 0 10px var(--neon-blue));
            margin-bottom: 20px;
        }

        /* Mobile Tip - Nascondi su PC */
        .mobile-tip {
            margin: 20px auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-purple);
            border-radius: 4px;
            font-size: 0.8rem;
            color: #bbb;
            max-width: 90%;
            text-align: center;
            line-height: 1.4;
        }

        @media (min-width: 768px) {
            .mobile-tip { display: none; }
        }

        .pg-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-left: 4px solid var(--neon-blue);
            padding: 15px;
            margin-bottom: 12px;
            transition: 0.3s;
        }
        
        .pg-card:hover { background: rgba(0, 242, 255, 0.05); }

        .google-btn {
            background: white; color: black; font-weight: bold; border-radius: 4px; margin-top: 15px;
        }

    </style>
</head>
<body>

<nav>
    <div id="auth-status"></div>
    <div id="role-tag"></div>
</nav>

<div id="login-page" class="page active" style="justify-content: center; min-height: 80vh;">
    <div class="section" style="text-align: center;">
        <img src="img/index/icona_app.png" class="login-logo">
        <h2>System_Login</h2>
        
        <input type="email" id="email" placeholder="Credenziale_Email">
        <input type="password" id="password" placeholder="Access_Code">
        
        <button class="hub-btn" style="margin-top: 10px; border-color: var(--neon-blue);" onclick="handleAuth('login')">Inizializza Sessione</button>
        <button class="hub-btn btn-primary" style="margin-top: 10px;" onclick="handleAuth('signup')">Nuovo Operatore</button>
        
        <div id="resend-container" style="margin-top: 15px; display: none;">
            <p style="font-size: 0.8rem; color: var(--neon-pink);">Verifica richiesta. Controlla la tua inbox.</p>
            <button class="hub-btn" style="font-size: 0.7rem; padding: 10px;" onclick="resendVerification()">Reinvia Token</button>
        </div>

        <div style="margin: 20px 0; color: #444; font-size: 0.8rem; letter-spacing: 2px;">OR_AUTHENTICATE_VIA</div>
        
        <button class="hub-btn google-btn" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:16px; margin-right:10px;">
            Google_Sync
        </button>
    </div>
</div>

<div id="hub-page" class="page">
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="font-family: 'Orbitron'; font-size: 1.5rem; color: white; letter-spacing: 5px;">KOTRA_COMMAND</h1>
        <div style="width: 50px; height: 2px; background: var(--neon-blue); margin: 10px auto;"></div>
    </div>
    <div class="hub-menu">
         <button class="hub-btn" onclick="window.location.href='archivio.html'">📂 Archivio_Personaggi</button>
         <button class="hub-btn btn-primary" onclick="window.location.href='creatore.html'">🧬 Inizializza_Matricola</button>
         <button class="hub-btn" onclick="window.location.href='biblioteca.html'">📚 Biblioteca_Dati</button>
    </div>

    <div class="mobile-tip">
        <span style="color: var(--neon-blue);">TERMINAL_TIP:</span><br>
        Per un'esperienza HUD completa, aggiungi questa pagina alla tua <b>Home Screen</b>.
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";
    let currentUser = null;

    window.showPage = (pageId) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    window.handleAuth = async (type) => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alert("Inserire credenziali di accesso.");
        try {
            if(type === 'login') {
                const userCred = await signInWithEmailAndPassword(auth, email, pass);
                if(!userCred.user.emailVerified) {
                    document.getElementById('resend-container').style.display = 'block';
                    alert("Account non verificato. Controlla la tua email.");
                    auth.signOut();
                }
            } else {
                const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(userCred.user);
                alert("Protocollo di registrazione inviato alla tua email.");
                auth.signOut();
            }
        } catch (e) { alert("ERROR_LOG: " + e.message); }
    }

    window.handleGoogleLogin = async () => {
        try { await signInWithPopup(auth, provider); } catch (e) { alert(e.message); }
    }

    window.resendVerification = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            const userCred = await signInWithEmailAndPassword(auth, email, pass);
            await sendEmailVerification(userCred.user);
            alert("Nuovo token inviato.");
            auth.signOut();
        } catch (e) { alert(e.message); }
    }

    onAuthStateChanged(auth, user => {
        currentUser = user;
        const statusDiv = document.getElementById('auth-status');
        const roleDiv = document.getElementById('role-tag');
        
        if(user && (user.emailVerified || user.providerData[0].providerId === 'google.com')) {
            statusDiv.innerHTML = `<button onclick="auth.signOut()">Disconnetti Sessione</button>`;
            if(user.email === MASTER_EMAIL) {
                roleDiv.innerHTML = `<span style="background:var(--neon-pink); color:white; padding:3px 8px; font-size:0.7rem; font-family:'Orbitron'; font-weight:bold; border-radius:2px; box-shadow: 0 0 10px var(--neon-pink);">ACCESS: MASTER</span>`;
            } else {
                roleDiv.innerHTML = `<span style="border:1px solid var(--neon-blue); color:var(--neon-blue); padding:3px 8px; font-size:0.7rem; font-family:'Orbitron'; border-radius:2px;">OP_LEVEL: 01</span>`;
            }
            showPage('hub-page');
        } else {
            showPage('login-page');
            statusDiv.innerHTML = "";
            roleDiv.innerHTML = "";
        }
    });

</script>

</body>
</html>
