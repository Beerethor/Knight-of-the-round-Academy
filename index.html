<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Scheda Pilota</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007a;
            --bg-dark: #0a0b10;
            --card-bg: #161b22;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--neon-pink);
            padding-bottom: 10px;
        }

        .section {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #30363d;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--neon-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .dice-btn {
            background: linear-gradient(45deg, var(--neon-pink), #b30056);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .result-area {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 10px;
            color: var(--neon-blue);
            min-height: 1.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Knight of the Round: Academy</h1>

    <div class="section">
        <label>Nome Studente / Pilota</label>
        <input type="text" id="charName" placeholder="Es: Arthur Pendragon" oninput="saveData()">
        
        <div class="grid" style="margin-top: 10px;">
            <div>
                <label>Stirpe</label>
                <input type="text" id="lineage" oninput="saveData()">
            </div>
            <div>
                <label>Ego / Dovere</label>
                <input type="text" id="egoDovere" placeholder="Es: 4 / 6" oninput="saveData()">
            </div>
        </div>
    </div>

    <div class="section">
        <label>Tratto Principale (Dado)</label>
        <select id="mainDice" onchange="saveData()">
            <option value="6">d6</option>
            <option value="8">d8</option>
            <option value="10">d10</option>
            <option value="12">d12</option>
        </select>
        <button class="dice-btn" onclick="rollDice()">LANCIA IL DADO</button>
        <div class="result-area" id="result">---</div>
    </div>

    <div class="section">
        <label>Note sul Knight / Equipaggiamento</label>
        <textarea id="notes" rows="5" oninput="saveData()"></textarea>
    </div>
</div>

<script>
    // Funzione per lanciare il dado
    function rollDice() {
        const die = document.getElementById('mainDice').value;
        const roll = Math.floor(Math.random() * die) + 1;
        document.getElementById('result').innerText = "Risultato: " + roll;
    }

    // Funzione per salvare i dati automaticamente sul telefono/PC
    function saveData() {
        const data = {
            name: document.getElementById('charName').value,
            lineage: document.getElementById('lineage').value,
            ego: document.getElementById('egoDovere').value,
            dice: document.getElementById('mainDice').value,
            notes: document.getElementById('notes').value
        };
        localStorage.setItem('kotra_character', JSON.stringify(data));
    }

    // Funzione per caricare i dati all'apertura
    window.onload = function() {
        const saved = localStorage.getItem('kotra_character');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('charName').value = data.name || '';
            document.getElementById('lineage').value = data.lineage || '';
            document.getElementById('egoDovere').value = data.ego || '';
            document.getElementById('mainDice').value = data.dice || '6';
            document.getElementById('notes').value = data.notes || '';
        }
    }
</script>

</body>
</html>
