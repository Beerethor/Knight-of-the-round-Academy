<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA Academy - HUB</title>
    
    <link rel="icon" type="image/png" href="img/index/icona_app.png">
    <link rel="apple-touch-icon" href="img/index/icona_app.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0b10">

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007a;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        
        body {
            background-color: var(--bg-dark);
            background-image: url('img/index/sfondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Navbar ridotta per dare spazio ai tasti */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--neon-blue);
        }

        /* Menu a schermi grandi (Tasti centrali) */
        .hub-menu {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .hub-btn {
            width: 100%;
            max-width: 400px;
            padding: 25px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            backdrop-filter: blur(15px);
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .hub-btn:hover {
            background: rgba(0, 242, 255, 0.2);
            border-color: var(--neon-blue);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* Pagine di contenuto */
        .page {
            display: none;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            width: 90%;
        }
        
        .active { display: flex; flex-direction: column; }
        
        .section {
            background: rgba(10, 11, 16, 0.85);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--neon-blue);
            backdrop-filter: blur(10px);
        }

        input, select, textarea {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            align-self: flex-start;
            border-radius: 5px;
        }

        .login-logo {
            width: 120px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav>
    <div id="auth-status"></div>
    <div id="role-tag"></div>
</nav>

<div id="login-page" class="page active" style="justify-content: center; align-items: center; min-height: 80vh;">
    <div class="section" style="width: 100%; max-width: 400px; text-align: center;">
        <img src="img/index/icona_app.png" class="login-logo">
        <h2 style="color:var(--neon-blue)">Sincronizzazione Pilota</h2>
        <input type="email" id="email" placeholder="Codice Email">
        <input type="password" id="password" placeholder="Password">
        <button class="hub-btn" style="font-size: 1rem; padding: 15px;" onclick="handleAuth('login')">Connetti</button>
        <p style="font-size: 0.8rem; margin-top: 15px; color: #8b949e" onclick="handleAuth('signup')">Nuova Recluta? Registrati qui.</p>
    </div>
</div>

<div id="hub-page" class="page">
    <div class="hub-menu">
        <button class="hub-btn" onclick="showPage('home-page')">📂 I Miei Personaggi</button>
        <button class="hub-btn" onclick="showPage('create-page')">⚔️ Nuovo Recluta</button>
        <button class="hub-btn" onclick="showPage('library-page')">📚 Biblioteca</button>
    </div>
</div>

<div id="home-page" class="page">
    <button class="back-btn" onclick="showPage('hub-page')">← Torna all'Hub</button>
    <div class="section">
        <h2>Archivio Studenti</h2>
        <div id="pg-list"></div>
    </div>
</div>

<div id="create-page" class="page">
    <button class="back-btn" onclick="showPage('hub-page')">← Annulla</button>
    <div class="section">
        <h2>Creazione Personaggio</h2>
        <input type="text" id="new-char-name" placeholder="Nome Personaggio">
        <select id="new-char-race">
            <option value="Umano">Umano</option>
            <option value="Nephilim">Nephilim</option>
            <option value="Esper">Esper</option>
        </select>
        <textarea id="new-char-notes" placeholder="Note..."></textarea>
        <button class="hub-btn" style="font-size: 1rem;" onclick="createCharacter()">Salva nel Database</button>
    </div>
</div>

<div id="library-page" class="page">
    <button class="back-btn" onclick="showPage('hub-page')">← Chiudi Biblioteca</button>
    <div class="section">
        <h2>Biblioteca Brit-Annia</h2>
        <p>Contenuto in fase di caricamento dai server centrali...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";
    let currentUser = null;

    window.showPage = (pageId) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId === 'home-page') loadCharacters();
    }

    window.handleAuth = async (type) => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            if(type === 'login') await signInWithEmailAndPassword(auth, email, pass);
            else await createUserWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert(e.message); }
    }

    onAuthStateChanged(auth, user => {
        currentUser = user;
        if(user) {
            document.getElementById('auth-status').innerHTML = `<button onclick="auth.signOut()" style="background:none; border:none; color:white; cursor:pointer;">LOGOUT (${user.email.split('@')[0]})</button>`;
            showPage('hub-page');
        } else {
            showPage('login-page');
        }
    });

    // Funzioni Firebase (createCharacter, loadCharacters) rimangono le stesse della versione precedente...
    // [Inserisci qui le funzioni createCharacter e loadCharacters già fornite]
</script>

</body>
</html>
