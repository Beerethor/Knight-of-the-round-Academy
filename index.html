<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="apple-touch-icon" href="img/index/icona_app.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTR:Academy - HUB</title>
    
    <link rel="icon" type="image/png" href="img/index/icona_app.png">
    <link rel="apple-touch-icon" href="img/index/icona_app.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0b10">

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007a;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        
        body {
            background-color: var(--bg-dark);
            background-image: url('img/index/sfondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--neon-blue);
        }

        .hub-menu {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .hub-btn {
            width: 100%;
            max-width: 400px;
            padding: 18px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .hub-btn:hover {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--neon-blue);
            transform: translateY(-2px);
        }

        .google-btn {
            background: white;
            color: #444;
            margin-top: 15px;
            font-size: 0.9rem;
            text-transform: none;
        }

        .page { display: none; padding: 20px; max-width: 800px; margin: auto; width: 90%; }
        .active { display: flex; flex-direction: column; }
        
        .section {
            background: rgba(10, 11, 16, 0.88);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--neon-blue);
            backdrop-filter: blur(10px);
        }

        input, select, textarea {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border);
            color: white; padding: 12px; margin: 10px 0; border-radius: 8px; box-sizing: border-box;
        }

        .back-btn {
            background: none; border: 1px solid var(--neon-pink); color: var(--neon-pink);
            padding: 8px 15px; margin-bottom: 20px; cursor: pointer; align-self: flex-start; border-radius: 5px;
        }

        .login-logo { width: 100px; margin-bottom: 15px; }

        .pg-card {
            background: rgba(255,255,255,0.05); border-left: 4px solid var(--neon-blue);
            padding: 15px; margin-bottom: 10px; border-radius: 4px;
        }
        
        #resend-container { margin-top: 15px; display: none; }
    </style>
</head>
<body>

<nav>
    <div id="auth-status"></div>
    <div id="role-tag"></div>
</nav>

<div id="login-page" class="page active" style="justify-content: center; align-items: center; min-height: 85vh;">
    <div class="section" style="width: 100%; max-width: 380px; text-align: center;">
        <img src="img/index/icona_app.png" class="login-logo">
        <h2 style="color:var(--neon-blue); margin-bottom: 20px;">Sincronizzazione</h2>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        
        <button class="hub-btn" style="padding: 15px; margin-top: 10px;" onclick="handleAuth('login')">Accedi</button>
        <button class="hub-btn" style="padding: 15px; margin-top: 10px; background: #30363d;" onclick="handleAuth('signup')">Registrati</button>
        
        <div id="resend-container">
            <button class="back-btn" style="width:100%" onclick="resendVerification()">Reinvia Email di Verifica</button>
        </div>

        <div style="margin: 20px 0; color: #555;">——— OPPURE ———</div>
        
        <button class="hub-btn google-btn" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px; margin-right:10px;">
            Accedi con Google
        </button>
    </div>
</div>

<div id="hub-page" class="page">
    <div class="hub-menu">
        <button class="hub-btn" onclick="showPage('home-page')">📂 I Miei Personaggi</button>
        <button class="hub-btn" onclick="showPage('create-page')">⚔️ Nuova Recluta</button>
        <button class="hub-btn" onclick="window.location.href='biblioteca.html'">📚 Biblioteca</button>
    </div>
</div>

<div id="home-page" class="page">
    <button class="back-btn" onclick="showPage('hub-page')">← HUB</button>
    <div class="section">
        <h2>Archivio Studenti</h2>
        <div id="pg-list"></div>
    </div>
</div>

<div id="create-page" class="page">
    <button class="back-btn" onclick="showPage('hub-page')">← ANNULLA</button>
    <div class="section">
        <h2>Nuovo Personaggio</h2>
        <input type="text" id="new-char-name" placeholder="Nome Personaggio">
        <select id="new-char-race">
            <option value="Umano">Umano</option>
            <option value="Nephilim">Nephilim</option>
            <option value="Esper">Esper</option>
            <option value="Bionico">Bionico</option>
        </select>
        <textarea id="new-char-notes" rows="4" placeholder="Note..."></textarea>
        <button class="hub-btn" style="border-color: var(--neon-pink);" onclick="createCharacter()">Salva nel Database</button>
    </div>
</div>

<div id="library-page" class="page">
    <button class="back-btn" onclick="showPage('hub-page')">← ESCI</button>
    <div class="section">
        <h2>Biblioteca Brit-Annia</h2>
        <p>In attesa di dati dal manuale...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";
    let currentUser = null;

    window.showPage = (pageId) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId === 'home-page' && currentUser) loadCharacters();
    }

    // Login e Registrazione
    window.handleAuth = async (type) => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alert("Inserisci credenziali");
        try {
            if(type === 'login') {
                const userCred = await signInWithEmailAndPassword(auth, email, pass);
                if(!userCred.user.emailVerified) {
                    document.getElementById('resend-container').style.display = 'block';
                    alert("Verifica la tua email prima di entrare!");
                    auth.signOut();
                }
            } else {
                const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(userCred.user);
                alert("Registrazione effettuata! Controlla l'email per confermare.");
                auth.signOut();
            }
        } catch (e) { alert("Errore: " + e.message); }
    }

    window.handleGoogleLogin = async () => {
        try { await signInWithPopup(auth, provider); } 
        catch (e) { alert(e.message); }
    }

    window.resendVerification = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            const userCred = await signInWithEmailAndPassword(auth, email, pass);
            await sendEmailVerification(userCred.user);
            alert("Email di verifica reinviata!");
            auth.signOut();
        } catch (e) { alert(e.message); }
    }

    onAuthStateChanged(auth, user => {
        currentUser = user;
        const statusDiv = document.getElementById('auth-status');
        const roleDiv = document.getElementById('role-tag');
        
        if(user && (user.emailVerified || user.providerData[0].providerId === 'google.com')) {
            statusDiv.innerHTML = `<button onclick="auth.signOut()" style="background:none; border:none; color:var(--neon-blue); cursor:pointer; font-size:0.7rem;">LOGOUT (${user.email})</button>`;
            if(user.email === MASTER_EMAIL) roleDiv.innerHTML = `<span style="background:var(--neon-blue); color:black; padding:2px 5px; font-size:0.6rem; font-weight:bold; border-radius:3px;">MASTER</span>`;
            showPage('hub-page');
        } else {
            showPage('login-page');
        }
    });

    // Funzioni Database
    window.createCharacter = async () => {
        const name = document.getElementById('new-char-name').value;
        const race = document.getElementById('new-char-race').value;
        const notes = document.getElementById('new-char-notes').value;
        if(!name) return alert("Nome obbligatorio");
        try {
            await setDoc(doc(db, "characters", name), {
                name, race, notes, ownerId: currentUser.uid, ownerEmail: currentUser.email
            });
            alert("PG Creato!");
            showPage('home-page');
        } catch (e) { alert(e.message); }
    }

    window.loadCharacters = async () => {
        const list = document.getElementById('pg-list');
        list.innerHTML = "Caricamento...";
        let q = (currentUser.email === MASTER_EMAIL) ? query(collection(db, "characters")) : query(collection(db, "characters"), where("ownerId", "==", currentUser.uid));
        const snap = await getDocs(q);
        list.innerHTML = snap.empty ? "Nessun dato." : "";
        snap.forEach(d => {
            const p = d.data();
            list.innerHTML += `<div class="pg-card"><b style="color:var(--neon-blue)">${p.name}</b> [${p.race}]<br><small style="color:#777">${p.notes || ''}</small></div>`;
        });
    }
</script>

</body>
</html>
