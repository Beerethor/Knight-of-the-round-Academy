<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Terminale Orientamento v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-dark: #0a0a0c;
            --glass: rgba(0, 242, 255, 0.05);
        }

        body {
            background: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #1a1a20 0%, #0a0a0c 100%);
            min-height: 100vh;
        }

        /* HEADER */
        .tactic-header {
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .tactic-header h1 {
            font-family: 'Orbitron';
            color: var(--neon-blue);
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,242,255,0.5);
        }

        /* LAYOUT PRINCIPALE */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 480px;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* LISTA STEP (SINISTRA) */
        .steps-list { display: flex; flex-direction: column; gap: 10px; }

        .step-card {
            background: var(--glass);
            border: 1px solid #333;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .step-card:hover { border-color: var(--neon-blue); transform: translateX(10px); }
        .step-card.active { border-left: 5px solid var(--neon-pink); background: rgba(255, 0, 255, 0.08); border-color: var(--neon-pink); }

        .step-id { font-family: 'Orbitron'; color: var(--neon-pink); font-size: 1rem; width: 30px; }
        .step-name { font-family: 'Orbitron'; text-transform: uppercase; font-size: 1rem; }

        /* MONITOR DETTAGLI (DESTRA) */
        .detail-panel {
            background: rgba(10, 10, 12, 0.95);
            border: 1px solid var(--neon-blue);
            padding: 30px;
            position: sticky;
            top: 20px;
            min-height: 600px;
            box-shadow: inset 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border: 1px solid #444;
            border-left: 3px solid var(--neon-blue);
            margin-top: 15px;
            line-height: 1.6;
        }

        .highlight { color: var(--neon-yellow); font-weight: bold; border-bottom: 1px dashed var(--neon-yellow); }

        .glossary-box {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 0, 0.05);
            border: 1px solid rgba(255, 255, 0, 0.2);
            font-size: 0.9rem;
            animation: fadeIn 0.4s ease;
        }

        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { background: #1a1a1a; border: 1px solid #444; padding: 4px 10px; color: var(--neon-yellow); font-size: 0.85rem; }

        .btn-link {
            display: block;
            margin-top: 25px;
            padding: 15px;
            background: var(--neon-pink);
            color: #000;
            font-family: 'Orbitron';
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: 0.3s;
        }

        .btn-link:hover { background: var(--neon-yellow); box-shadow: 0 0 20px var(--neon-yellow); }

        /* ERROR HANDLING */
        #error-display { color: #ff4444; background: rgba(255,0,0,0.1); padding: 20px; border: 1px solid #ff4444; display: none; margin-bottom: 20px; font-family: 'Orbitron'; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h3 { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-pink); margin-bottom: 5px; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="tactic-header">
        <div>
            <h1>TERMINALE ORIENTAMENTO</h1>
            <small style="color:var(--neon-pink); font-family:'Orbitron'">SISTEMA ANALISI MATRICOLE // v3.0</small>
        </div>
        <button onclick="window.location.href='biblioteca.html'" style="background:none; border:1px solid #555; color:#888; cursor:pointer; font-family:'Orbitron'; padding:5px 15px;">ESCI</button>
    </div>

    <div id="error-display"></div>

    <div class="grid-container">
        <div class="steps-list" id="steps-container"></div>

        <div class="detail-panel" id="detail-panel">
            <div id="welcome" style="text-align:center; padding-top:200px; opacity:0.4;">
                <p style="font-family:'Orbitron'; letter-spacing:3px;">IN ATTESA DI SELEZIONE MODULO...</p>
            </div>

            <div id="content" style="display:none;">
                <h2 id="d-title" style="margin:0; font-family:'Orbitron'; color:var(--neon-blue); font-size:1.5rem;"></h2>
                <div id="d-desc" class="info-box"></div>
                <div id="d-glossary"></div>
                <div id="d-extra"></div>
                <div id="d-links"></div>
            </div>
        </div>
    </div>

    <script>
        let curriculum = null;

        async function init() {
            const errorDiv = document.getElementById('error-display');
            try {
                const response = await fetch('curriculum.json');
                
                if (!response.ok) {
                    throw new Error(`Impossibile trovare il file curriculum.json (Stato: ${response.status})`);
                }

                curriculum = await response.json();
                renderSteps();
                
            } catch (e) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `⚠️ ERRORE DI SISTEMA: ${e.message}<br><small>Verifica che curriculum.json sia nella stessa cartella e non contenga errori di sintassi.</small>`;
                console.error("Dettaglio Errore:", e);
            }
        }

        function renderSteps() {
            const container = document.getElementById('steps-container');
            if (!curriculum.orientamento_step_by_step) return;

            curriculum.orientamento_step_by_step.forEach(step => {
                const div = document.createElement('div');
                div.className = 'step-card';
                div.innerHTML = `
                    <div class="step-id">${String(step.id).padStart(2, '0')}</div>
                    <div class="step-name">${step.fase}</div>
                `;
                div.onclick = () => showDetail(step, div);
                container.appendChild(div);
            });
        }

        function showDetail(step, element) {
            document.querySelectorAll('.step-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            document.getElementById('d-title').innerText = step.fase;
            
            // Unione dei campi di testo per la descrizione
            let mainText = step.descrizione || step.nota || step.regola || step.benefici || step.stile || step.frame || "";
            let glossaryHtml = "";

            // Scansione per definizioni tecniche
            if (curriculum.definizioni_tecniche) {
                Object.keys(curriculum.definizioni_tecniche).forEach(key => {
                    const regex = new RegExp(`\\b${key}\\b`, 'gi');
                    if (mainText.match(regex)) {
                        mainText = mainText.replace(regex, `<span class="highlight">$&</span>`);
                        glossaryHtml += `
                            <div class="glossary-box">
                                <b style="color:var(--neon-yellow)">🔍 ${key.toUpperCase()}:</b> 
                                ${curriculum.definizioni_tecniche[key]}
                            </div>`;
                    }
                });
            }
            
            document.getElementById('d-desc').innerHTML = mainText.replace(/\n/g, "<br>");
            document.getElementById('d-glossary').innerHTML = glossaryHtml;

            const extra = document.getElementById('d-extra');
            extra.innerHTML = "";

            // Rendering liste dinamiche
            if (step.elementi) {
                extra.innerHTML += `<h3>Core Disponibili:</h3><div class="tag-list">` + 
                    step.elementi.map(e => `<span class="tag">${e}</span>`).join('') + `</div>`;
            }

            if (step.opzioni) {
                extra.innerHTML += `<h3>Stirpi Rilevate:</h3><div class="tag-list">` + 
                    step.opzioni.map(o => `<span class="tag">${o}</span>`).join('') + `</div>`;
            }

            if (step.categorie) {
                for (let cat in step.categorie) {
                    extra.innerHTML += `<h3>Profilo Anima (${cat}):</h3><div class="tag-list">` + 
                        step.categorie[cat].map(a => `<span class="tag">${a}</span>`).join('') + `</div>`;
                }
            }

            if (step.formula_limite) {
                extra.innerHTML += `<div class="info-box" style="border-color:var(--neon-pink)">
                    <h3>Formula Sincronizzazione:</h3>
                    <code style="color:var(--neon-pink); font-size:1.1rem;">${step.formula_limite}</code><br>
                    <small>Massimo Teorico: ${step.massimo_teorico}</small>
                </div>`;
            }

            if (step.tipi || step.esempi) {
                const list = step.tipi || step.esempi;
                extra.innerHTML += `<h3>Varianti:</h3><div class="tag-list">` + 
                    list.map(i => `<span class="tag">${i}</span>`).join('') + `</div>`;
            }

            // Link Biblioteca
            const links = document.getElementById('d-links');
            links.innerHTML = "";
            const title = step.fase.toUpperCase();
            
            if (title.includes("STIRPE")) {
                links.innerHTML = `<a href="biblioteca.html?cat=stirpi" class="btn-link">APRI ARCHIVIO STIRPI ➔</a>`;
            } else if (title.includes("JOB")) {
                links.innerHTML = `<a href="biblioteca.html?cat=classi" class="btn-link">ANALIZZA PROTOCOLLI JOB ➔</a>`;
            } else if (title.includes("FRAME")) {
                links.innerHTML = `<a href="biblioteca.html?cat=knight" class="btn-link">DATABASE MECHA & FRAME ➔</a>`;
            }
        }

        init();
    </script>
</body>
</html>
