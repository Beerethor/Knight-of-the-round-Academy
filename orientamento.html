<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Terminale Orientamento Operativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-dark: #0a0a0c;
            --glass: rgba(0, 242, 255, 0.05);
            --border-dim: #333;
        }

        body {
            background: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a20 0%, #0a0a0c 100%);
        }

        /* HEADER TATTICO */
        .tactic-header {
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .tactic-header h1 {
            font-family: 'Orbitron';
            margin: 0;
            color: var(--neon-blue);
            font-size: 1.6rem;
            text-shadow: 0 0 10px rgba(0,242,255,0.5);
            letter-spacing: 2px;
        }

        /* LAYOUT A COLONNE */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 30px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* LISTA DEGLI STEP (SINISTRA) */
        .steps-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step-card {
            background: var(--glass);
            border: 1px solid var(--border-dim);
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .step-card:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            transform: translateX(10px);
        }

        .step-card.active {
            border-left: 6px solid var(--neon-pink);
            border-color: var(--neon-pink);
            background: rgba(255, 0, 255, 0.05);
        }

        .step-id {
            font-family: 'Orbitron';
            color: var(--neon-pink);
            font-size: 0.9rem;
            min-width: 30px;
        }

        .step-title {
            font-family: 'Orbitron';
            font-size: 1.1rem;
            color: #fff;
            text-transform: uppercase;
        }

        /* PANNELLO MONITOR (DESTRA) */
        .detail-panel {
            background: rgba(10, 10, 12, 0.9);
            border: 1px solid var(--neon-blue);
            padding: 30px;
            position: sticky;
            top: 20px;
            height: fit-content;
            min-height: 600px;
            box-shadow: inset 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border: 1px solid #444;
            margin-top: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
            border-left: 3px solid var(--neon-blue);
        }

        /* COMPONENTI EXTRA (TAGS & LINKS) */
        .extra-section { margin-top: 25px; }
        .extra-section h3 {
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: var(--neon-yellow);
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .tag-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag {
            background: #1a1a1a;
            border: 1px solid #444;
            padding: 5px 12px;
            font-size: 0.85rem;
            color: var(--neon-yellow);
            border-radius: 2px;
        }

        .btn-link {
            display: block;
            margin-top: 30px;
            padding: 15px;
            background: var(--neon-pink);
            color: #000;
            font-family: 'Orbitron';
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            font-size: 0.9rem;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: 0.3s;
        }

        .btn-link:hover {
            background: var(--neon-yellow);
            box-shadow: 0 0 20px var(--neon-yellow);
        }

        /* ANIMAZIONE SCANLINE */
        .detail-panel::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        @media (max-width: 950px) {
            .grid-container { grid-template-columns: 1fr; }
            .detail-panel { position: relative; min-height: auto; }
        }
    </style>
</head>
<body>

    <div class="tactic-header">
        <div>
            <h1>TERMINALE ORIENTAMENTO</h1>
            <small style="color:var(--neon-pink); font-family:'Orbitron'">ANALISI CURRICULUM MATRICOLA // ACCADEMIA DEL ROUND</small>
        </div>
        <button onclick="window.location.href='biblioteca.html'" style="background:none; border:1px solid #555; color:#888; cursor:pointer; font-family:'Orbitron'; padding:8px 15px; transition:0.3s;">
            INTERROMPI
        </button>
    </div>

    <div class="grid-container">
        <div class="steps-list" id="steps-container"></div>

        <div class="detail-panel" id="detail-panel">
            <div id="detail-welcome" style="text-align:center; padding-top:150px; opacity:0.5;">
                <p style="font-family:'Orbitron'; letter-spacing:3px;">IN ATTESA DI DATI...</p>
                <small>SELEZIONARE UN MODULO DI ORIENTAMENTO</small>
            </div>

            <div id="detail-content" style="display:none;">
                <h2 id="d-title" style="margin:0; font-family:'Orbitron'; color:var(--neon-blue); font-size:1.4rem;"></h2>
                <div id="d-desc" class="info-box"></div>
                <div id="d-extra" class="extra-section"></div>
                <div id="d-link-container"></div>
            </div>
        </div>
    </div>

    <script>
        let curriculumData = null;

        // Inizializzazione e caricamento dati
        async function init() {
            try {
                const response = await fetch('curriculum.json');
                curriculumData = await response.json();
                renderSteps();
            } catch (e) {
                console.error("Errore nel caricamento del file curriculum.json:", e);
                document.getElementById('steps-container').innerHTML = "<p style='color:red'>ERRORE CRITICO: File curriculum.json non trovato.</p>";
            }
        }

        function renderSteps() {
            const container = document.getElementById('steps-container');
            const steps = curriculumData.orientamento_step_by_step || curriculumData.procedura_orientamento;
            
            steps.forEach(step => {
                const div = document.createElement('div');
                div.className = 'step-card';
                div.innerHTML = `
                    <div class="step-id">${String(step.id || step.step).padStart(2, '0')}</div>
                    <div class="step-title">${step.fase || step.azione}</div>
                `;
                div.onclick = (e) => showDetail(step, div);
                container.appendChild(div);
            });
        }

        function showDetail(step, element) {
            // Gestione stato attivo
            document.querySelectorAll('.step-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            // Visualizzazione pannello
            document.getElementById('detail-welcome').style.display = 'none';
            const content = document.getElementById('detail-content');
            content.style.display = 'block';

            // Titolo e Descrizione (gestione campi multipli per sicurezza)
            document.getElementById('d-title').innerText = step.fase || step.azione;
            const desc = step.descrizione || step.meccanica || step.info || step.regola || "Modulo senza descrizione testuale.";
            document.getElementById('d-desc').innerHTML = desc.replace(/\n/g, "<br>");

            const extra = document.getElementById('d-extra');
            const links = document.getElementById('d-link-container');
            extra.innerHTML = "";
            links.innerHTML = "";

            // LOGICA REINDIRIZZAMENTO DINAMICO
            const stepTitle = (step.fase || step.azione).toUpperCase();
            if (stepTitle.includes("STIRPE")) {
                links.innerHTML = `<a href="biblioteca.html?cat=stirpi" class="btn-link">APRI ARCHIVIO STIRPI ➔</a>`;
            } else if (stepTitle.includes("JOB") || stepTitle.includes("SPECIALIZZAZIONE")) {
                links.innerHTML = `<a href="biblioteca.html?cat=classi" class="btn-link">ANALIZZA PROTOCOLLI JOB ➔</a>`;
            } else if (stepTitle.includes("KNIGHT") || stepTitle.includes("FRAME")) {
                links.innerHTML = `<a href="biblioteca.html?cat=knight" class="btn-link">CONFIGURAZIONE KNIGHT ➔</a>`;
            }

            // Visualizzazione Elementi Core
            if (step.elementi || step.core_esempi) {
                const list = step.elementi || step.core_esempi;
                extra.innerHTML += `<h3>NUCLEI CORE RILEVATI:</h3><div class="tag-list">` + 
                    list.map(e => `<span class="tag">${e}</span>`).join('') + `</div>`;
            }

            // Visualizzazione Categorie Anima
            const anime = step.categorie || step.anima_categorie;
            if (anime) {
                let html = `<h3>PROFILI ANIMA COMPATIBILI:</h3>`;
                for (let cat in anime) {
                    html += `<div style="margin-top:10px; font-size:0.7rem; color:var(--neon-pink); font-family:'Orbitron'">${cat.toUpperCase()}</div>`;
                    html += `<div class="tag-list">` + anime[cat].map(a => `<span class="tag">${a}</span>`).join('') + `</div>`;
                }
                extra.innerHTML += html;
            }

            // Visualizzazione Modelli Frame
            if (step.modelli || step.modelli_base) {
                const frameList = step.modelli || step.modelli_base;
                extra.innerHTML += `<h3>CONFIGURAZIONI FRAME:</h3>` + 
                    frameList.map(m => `
                        <div style="background:rgba(0,0,0,0.3); padding:10px; border:1px solid #333; margin-top:5px; font-size:0.9rem;">
                            <b style="color:var(--neon-blue)">${m.codice || m.tipo}</b>: ${m.ruolo || m.specialità}
                        </div>
                    `).join('');
            }
        }

        init();
    </script>
</body>
</html>
