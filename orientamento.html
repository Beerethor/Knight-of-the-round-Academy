<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Terminale Orientamento Operativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-dark: #0a0a0c;
            --glass: rgba(0, 242, 255, 0.05);
            --border-dim: #333;
        }

        body {
            background: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a20 0%, #0a0a0c 100%);
        }

        /* HEADER */
        .tactic-header {
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .tactic-header h1 {
            font-family: 'Orbitron';
            margin: 0;
            color: var(--neon-blue);
            font-size: 1.6rem;
            text-shadow: 0 0 10px rgba(0,242,255,0.5);
            letter-spacing: 2px;
        }

        /* LAYOUT */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 30px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* LISTA STEP (SINISTRA) */
        .steps-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step-card {
            background: var(--glass);
            border: 1px solid var(--border-dim);
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .step-card:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            transform: translateX(10px);
        }

        .step-card.active {
            border-left: 6px solid var(--neon-pink);
            border-color: var(--neon-pink);
            background: rgba(255, 0, 255, 0.05);
        }

        .step-id {
            font-family: 'Orbitron';
            color: var(--neon-pink);
            font-size: 0.9rem;
            min-width: 30px;
        }

        .step-title {
            font-family: 'Orbitron';
            font-size: 1.1rem;
            color: #fff;
            text-transform: uppercase;
        }

        /* MONITOR DETTAGLI (DESTRA) */
        .detail-panel {
            background: rgba(10, 10, 12, 0.95);
            border: 1px solid var(--neon-blue);
            padding: 30px;
            position: sticky;
            top: 20px;
            height: fit-content;
            min-height: 600px;
            box-shadow: inset 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border: 1px solid #444;
            margin-top: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
            border-left: 3px solid var(--neon-blue);
        }

        .highlight {
            color: var(--neon-yellow);
            border-bottom: 1px dashed var(--neon-yellow);
            font-weight: bold;
        }

        .glossary-box {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 0, 0.05);
            border: 1px solid rgba(255, 255, 0, 0.2);
            font-size: 0.9rem;
            animation: fadeIn 0.5s ease;
        }

        /* TAGS E EXTRA */
        .extra-section { margin-top: 25px; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag {
            background: #1a1a1a;
            border: 1px solid #444;
            padding: 4px 10px;
            color: var(--neon-yellow);
            font-size: 0.8rem;
        }

        .btn-link {
            display: block;
            margin-top: 30px;
            padding: 15px;
            background: var(--neon-pink);
            color: #000;
            font-family: 'Orbitron';
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: 0.3s;
        }

        .btn-link:hover {
            background: var(--neon-yellow);
            box-shadow: 0 0 20px var(--neon-yellow);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 950px) {
            .grid-container { grid-template-columns: 1fr; }
            .detail-panel { position: relative; min-height: auto; }
        }
    </style>
</head>
<body>

    <div class="tactic-header">
        <div>
            <h1>TERMINALE ORIENTAMENTO</h1>
            <small style="color:var(--neon-pink); font-family:'Orbitron'">ANALISI CURRICULUM v3.0 // SINCRO BIBLIOTECA</small>
        </div>
        <button onclick="window.location.href='biblioteca.html'" style="background:none; border:1px solid #555; color:#888; cursor:pointer; font-family:'Orbitron'; padding:8px 15px;">ESCI</button>
    </div>

    <div class="grid-container">
        <div class="steps-list" id="steps-container"></div>

        <div class="detail-panel" id="detail-panel">
            <div id="detail-welcome" style="text-align:center; padding-top:150px; opacity:0.4;">
                <p style="font-family:'Orbitron'; letter-spacing:2px;">IN ATTESA DI SELEZIONE MODULO...</p>
            </div>

            <div id="detail-content" style="display:none;">
                <h2 id="d-title" style="margin:0; font-family:'Orbitron'; color:var(--neon-blue); font-size:1.4rem;"></h2>
                <div id="d-desc" class="info-box"></div>
                <div id="d-glossary"></div>
                <div id="d-extra" class="extra-section"></div>
                <div id="d-link-container"></div>
            </div>
        </div>
    </div>

    <script>
        let curriculumData = null;

        async function init() {
            try {
                const response = await fetch('curriculum.json');
                curriculumData = await response.json();
                renderSteps();
            } catch (e) {
                console.error("Errore caricamento curriculum.json:", e);
            }
        }

        function renderSteps() {
            const container = document.getElementById('steps-container');
            const steps = curriculumData.orientamento_step_by_step;
            
            steps.forEach(step => {
                const div = document.createElement('div');
                div.className = 'step-card';
                div.innerHTML = `
                    <div class="step-id">${String(step.id).padStart(2, '0')}</div>
                    <div class="step-title">${step.fase}</div>
                `;
                div.onclick = () => showDetail(step, div);
                container.appendChild(div);
            });
        }

        function showDetail(step, element) {
            // Stato Attivo
            document.querySelectorAll('.step-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            // Visibilità
            document.getElementById('detail-welcome').style.display = 'none';
            document.getElementById('detail-content').style.display = 'block';

            // Titolo
            document.getElementById('d-title').innerText = step.fase;

            // --- MOTORE DI SCANSIONE DEFINIZIONI E GLOSSARIO ---
            let descText = step.descrizione || "Modulo caricato.";
            let glossaryHtml = "";

            if (curriculumData.definizioni_tecniche) {
                Object.keys(curriculumData.definizioni_tecniche).forEach(key => {
                    const regex = new RegExp(`\\b${key}\\b`, 'gi');
                    if (descText.match(regex)) {
                        // Evidenzia la parola nel testo
                        descText = descText.replace(regex, `<span class="highlight">$&</span>`);
                        // Aggiunge box glossario
                        glossaryHtml += `
                            <div class="glossary-box">
                                <b style="color:var(--neon-yellow); text-transform:uppercase;">🔍 ${key}:</b> 
                                ${curriculumData.definizioni_tecniche[key]}
                            </div>`;
                    }
                });
            }

            document.getElementById('d-desc').innerHTML = descText.replace(/\n/g, "<br>");
            document.getElementById('d-glossary').innerHTML = glossaryHtml;

            // --- EXTRA (TAGS) E LINKS ---
            const extra = document.getElementById('d-extra');
            const links = document.getElementById('d-link-container');
            extra.innerHTML = ""; links.innerHTML = "";

            // Link alla Biblioteca
            const titleUpper = step.fase.toUpperCase();
            if (titleUpper.includes("STIRPE")) {
                links.innerHTML = `<a href="biblioteca.html?cat=stirpi" class="btn-link">APRI ARCHIVIO STIRPI ➔</a>`;
            } else if (titleUpper.includes("JOB")) {
                links.innerHTML = `<a href="biblioteca.html?cat=classi" class="btn-link">ANALIZZA PROTOCOLLI JOB ➔</a>`;
            } else if (titleUpper.includes("KNIGHT") || titleUpper.includes("FRAME")) {
                links.innerHTML = `<a href="biblioteca.html?cat=knight" class="btn-link">CONFIGURAZIONE KNIGHT ➔</a>`;
            }

            // Core
            if (step.elementi) {
                extra.innerHTML += `<div style="margin-top:15px;"><b>CORE RILEVATI:</b></div><div class="tag-list">` + 
                    step.elementi.map(e => `<span class="tag">${e}</span>`).join('') + `</div>`;
            }

            // Anime
            if (step.categorie) {
                let html = `<div style="margin-top:15px;"><b>PROFILI ANIMA:</b></div>`;
                for (let cat in step.categorie) {
                    html += `<div style="margin-top:8px; font-size:0.7rem; color:var(--neon-pink); font-family:'Orbitron'">${cat.toUpperCase()}</div>`;
                    html += `<div class="tag-list">` + step.categorie[cat].map(a => `<span class="tag">${a}</span>`).join('') + `</div>`;
                }
                extra.innerHTML += html;
            }

            // Frame
            if (step.modelli) {
                extra.innerHTML += `<div style="margin-top:15px;"><b>MODELLI FRAME:</b></div>` + 
                    step.modelli.map(m => `
                        <div class="tag" style="display:block; margin-top:5px; border-color:var(--neon-blue)">
                            <b style="color:var(--neon-blue)">${m.codice}</b>: ${m.ruolo}
                        </div>
                    `).join('');
            }
        }

        init();
    </script>
</body>
</html>
