<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KOTRA">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0b10"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    
    <link rel="apple-touch-icon" href="img/index/icona_app.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Archivio Digitale</title>
    <link rel="icon" type="image/png" href="img/index/icona_app.png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007a;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.08);
        }
        
        body {
            background-color: var(--bg-dark);
            background-image: url('img/bibioteca/sfondo.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; 
            height: 100vh;
            overflow: hidden;
        }

        .hub-container {
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            gap: 20px;
            background: rgba(0, 0, 0, 0.6);
        }

        .menu-btn {
            width: 320px; 
            padding: 20px; 
            background: var(--glass);
            border: 1px solid var(--neon-blue); 
            border-radius: 12px;
            color: white; 
            text-transform: uppercase; 
            font-weight: bold;
            cursor: pointer; 
            backdrop-filter: blur(10px); 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
        }

        .menu-btn:hover { 
            background: rgba(0, 242, 255, 0.2); 
            box-shadow: 0 0 25px var(--neon-blue); 
            transform: scale(1.05);
        }

        /* SISTEMA MODALE */
        .modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 6, 10, 0.95); 
            backdrop-filter: blur(15px); 
            z-index: 1000;
            flex-direction: column; 
            padding: 40px; 
            box-sizing: border-box;
        }

        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .search-bar {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--neon-blue); color: white; border-radius: 8px; 
            margin-bottom: 25px; font-size: 1rem; outline: none;
        }

        .items-grid {
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px; 
    
    /* AGGIUNGI QUESTE RIGHE */
    max-height: 60vh; /* Occupa al massimo il 60% dell'altezza schermo */
    overflow-y: auto; /* Attiva lo scroll verticale se serve */
    padding-right: 10px; /* Spazio per la scrollbar */
    padding-bottom: 20px;
}

/* Rendi la scrollbar più bella e in stile Cyberpunk */
.items-grid::-webkit-scrollbar {
    width: 6px;
    -webkit-overflow-scrolling: touch;
}

.items-grid::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
}

.items-grid::-webkit-scrollbar-thumb {
    background: var(--neon-blue);
    border-radius: 10px;
    box-shadow: 0 0 10px var(--neon-blue);
}

        .item-card {
            padding: 20px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 12px; text-align: center; cursor: pointer;
            transition: 0.3s; font-weight: bold; text-transform: uppercase;
        }

        .item-card:hover { 
            border-color: var(--neon-pink); 
            background: rgba(255, 0, 122, 0.15);
            box-shadow: 0 0 15px rgba(255, 0, 122, 0.3);
        }

        /* VISTA DETTAGLIO */
        #detail-view { display: none; overflow-y: auto; padding-right: 15px; }
        
        .detail-header { border-left: 5px solid var(--neon-pink); padding-left: 20px; margin-bottom: 30px; }
        
        .section-title { 
            color: var(--neon-blue); 
            text-transform: uppercase; 
            margin-top: 35px; 
            font-size: 0.85rem; 
            letter-spacing: 3px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            padding-bottom: 5px;
        }

        .eredita-box { 
            background: rgba(255,255,255,0.04); 
            padding: 18px; 
            border-radius: 10px; 
            margin-top: 15px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        
        .eredita-box:hover { transform: translateX(5px); background: rgba(255,255,255,0.07); }

        .effetto-tag {
            background: rgba(0, 242, 255, 0.1); 
            padding: 10px; 
            border-radius: 6px; 
            margin-top: 10px; 
            font-size: 0.95rem; 
            border-left: 3px solid var(--neon-pink);
            line-height: 1.4;
        }

        .close-btn { background: var(--neon-pink); border: none; color: white; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .close-btn:hover { background: #ff3399; box-shadow: 0 0 15px var(--neon-pink); }

        .back-btn { background: #222; border: 1px solid #444; color: white; padding: 12px 20px; border-radius: 6px; cursor: pointer; display: none; margin-right: 15px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1 style="color: var(--neon-blue); letter-spacing: 8px; margin-bottom: 40px; text-shadow: 0 0 15px var(--neon-blue);">ARCHIVIO DIGITALE</h1>
        
        <button class="menu-btn" onclick="openModal('stirpi_database.json', '🧬 Database Stirpi')">🧬 Stirpi / Razze</button>
        <button class="menu-btn" onclick="openModal('classi_database.json', '⚔️ Registro Classi')">⚔️ Ruoli / Classi</button>
        <button class="menu-btn" onclick="openModal('knight_database.json', '🤖 Hangar Knight')">🤖 Modelli Knight</button>
        
        <a href="index.html" style="color: #555; text-decoration: none; margin-top: 40px; font-size: 0.8rem; letter-spacing: 2px;">← DISCONNETTI UTENTE</a>
    </div>

    <div id="main-modal" class="modal">
        <div class="modal-header">
            <div style="display: flex; align-items: center;">
                <button id="back-to-list" class="back-btn" onclick="showList()">← LISTA</button>
                <h2 id="modal-title" style="margin: 0; color: var(--neon-blue); letter-spacing: 2px;"></h2>
            </div>
            <button class="close-btn" onclick="closeModal()">ESCI [X]</button>
        </div>

        <div id="list-view">
    <input type="text" class="search-bar" id="search" placeholder="Cerca nel database..." onkeyup="filterItems()">
    <div class="items-grid" id="items-container">
        </div>
</div>

        <div id="detail-view"></div>
    </div>

    <script>
        let currentData = [];

        async function openModal(jsonFile, title) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('main-modal').style.display = 'flex';
            document.getElementById('items-container').innerHTML = "<p style='color:var(--neon-blue)'>Caricamento dati in corso...</p>";
            
            try {
                const response = await fetch(jsonFile);
                if (!response.ok) throw new Error();
                const data = await response.json();
                currentData = data.items;
                renderList(currentData);
            } catch (e) {
                document.getElementById('items-container').innerHTML = "<p style='color:var(--neon-pink)'>ERRORE: Database non trovato. Verifica il file JSON su GitHub.</p>";
            }
        }

        function renderList(items) {
            const container = document.getElementById('items-container');
            container.innerHTML = "";
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerText = item.nome;
                card.onclick = () => showDetail(item);
                container.appendChild(card);
            });
            showList();
        }

       function showDetail(item) {
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    document.getElementById('back-to-list').style.display = 'inline-block';
    
    const desc = Array.isArray(item.descrizione) ? item.descrizione.join('<br><br>') : item.descrizione;
    const descFormattata = desc.replace(/\n/g, "<br>");

           // Questo trasforma "NOTE SPECIALI:" in un testo giallo e grassetto automaticamente
           const descFormattata = desc.replace(/\n/g, "<br>")
           .replace("NOTE SPECIALI:", "<b style='color:var(--neon-yellow);'>NOTE SPECIALI:</b>");

    // Gestione dinamica: Eredità (per Stirpi) o Tecniche (per Classi)
    let extraContent = "";
    
    if (item.eredita) {
        extraContent = `<div class="section-title">Eredità di Stirpe</div>` + 
            item.eredita.map(e => `
                <div class="eredita-box">
                    <b style="color:var(--neon-blue);">${e.nome}</b>
                    <p style="font-size:0.9rem; margin:5px 0;">${e.descrizione}</p>
                    <div class="effetto-tag"><i style="color:var(--neon-pink)">EFFETTO:</i> ${e.effetto}</div>
                </div>
            `).join('');
    } else if (item.tecniche) {
        extraContent = `<div class="section-title">Tecniche di Job</div>` + 
            item.tecniche.map(t => `
                <div class="eredita-box" style="border-left: 3px solid var(--neon-blue);">
                    <small style="color:var(--neon-pink); font-weight:bold;">${t.tipo}</small><br>
                    <b style="text-transform:uppercase; letter-spacing:1px;">${t.nome}</b>
                    <div class="effetto-tag" style="margin-top:10px;">${t.effetto}</div>
                </div>
            `).join('');
    }

    const citazioneHtml = item.citazione 
    ? `<div style="font-style: italic; color: var(--neon-pink); border-left: 2px solid var(--neon-pink); padding-left: 15px; margin: 20px 0; font-size: 1.1rem; line-height: 1.4;">
        "${item.citazione}"
       </div>` 
    : "";

document.getElementById('detail-view').innerHTML = `
    <div class="detail-header"><h1>${item.nome}</h1></div>
    
    <div style="display: flex; gap: 30px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 300px;">
            <img src="${item.immagine}" style="width:100%; border-radius:12px; border:1px solid var(--neon-blue);" onerror="this.style.display='none'">
        </div>
        
        <div style="flex: 2; min-width: 300px;">
            ${citazioneHtml}

            <div class="section-title">Background</div>
            <p style="line-height:1.6; color: #ddd;">${descFormattata}</p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <div class="section-title">Temi</div>
                    <p>${item.temi_da_esplorare.join(' • ')}</p>
                </div>
                <div>
                    <div class="section-title">Nemesi</div>
                    <p>${item.nemesi ? item.nemesi.join(' • ') : 'Non specificata'}</p>
                </div>
            </div>
            
            <div class="section-title">Tratti Consigliati</div>
            <p>${item.tratti_consigliati.join(', ')}</p>

            ${extraContent}
        </div>
    </div>
    <div style="height:80px"></div>
`;
        function showList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('back-to-list').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('main-modal').style.display = 'none';
            document.getElementById('search').value = "";
        }

        function filterItems() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = currentData.filter(i => i.nome.toLowerCase().includes(term));
            renderList(filtered);
        }
    </script>
</body>
</html>
