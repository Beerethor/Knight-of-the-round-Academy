<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Database Operativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
    :root {
        --neon-blue: #00f2ff;
        --neon-pink: #ff00ff;
        --neon-yellow: #ffff00;
        --bg-dark: #0a0a0c;
        --card-bg: rgba(22, 22, 26, 0.85);
        --glass: rgba(0, 242, 255, 0.05);
        --border-glow: rgba(0, 242, 255, 0.3);
    }

    * { box-sizing: border-box; } /* Fondamentale per non far uscire i padding dai bordi */

    body {
        background-color: var(--bg-dark);
        background-image: linear-gradient(rgba(10, 10, 12, 0.85), rgba(10, 10, 12, 0.85)), url('img/bibioteca/sfondo.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: #e0e0e0;
        font-family: 'Rajdhani', sans-serif;
        margin: 0;
        padding: 10px; /* Ridotto per mobile */
        line-height: 1.4;
        overflow-x: hidden;
        width: 100%;
    }

    /* Overlay di Scansione */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
        z-index: 100;
    }

    h1, h2, h3 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; margin: 0; word-wrap: break-word; }

    header {
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-glow);
        padding: 15px;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column; /* Incolonna su mobile */
        align-items: center;
        text-align: center;
        gap: 15px;
    }

    .nav-buttons { 
        display: grid; 
        grid-template-columns: repeat(2, 1fr); /* Due colonne di tasti su mobile */
        gap: 8px; 
        width: 100%;
    }

    button {
        background: transparent;
        border: 1px solid var(--neon-blue);
        color: var(--neon-blue);
        padding: 8px 5px;
        cursor: pointer;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.65rem;
        transition: 0.3s;
        text-transform: uppercase;
        width: 100%;
    }

    /* Griglia Card */
    .items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); /* Card più piccole su mobile */
        gap: 15px;
        padding: 5px;
    }

    .card img {
        width: 100%;
        height: 160px; /* Altezza ridotta per mobile */
        object-fit: cover;
    }

    /* VISTA DETTAGLIO */
    #detail-view { 
        display: none; 
        width: 100%;
        max-width: 1200px; 
        margin: 0 auto;
        background: rgba(10, 10, 12, 0.95);
        padding: 15px; /* Ridotto per mobile */
        border: 1px solid var(--neon-blue);
    }

    .detail-container { 
        display: flex; 
        flex-direction: column; /* Incolonna immagine e testo su mobile */
        gap: 20px; 
    }

    .image-side img { 
        width: 100%; 
        max-height: 400px;
        object-fit: contain;
    }

    .content-side h1 {
        font-size: clamp(1.8rem, 8vw, 3rem); /* Titolo fluido */
    }

    .citazione {
        font-size: 0.85rem;
        padding: 10px 15px;
        margin: 15px 0;
    }

    .box { 
        padding: 15px; 
        margin-bottom: 10px;
        font-size: 0.95rem;
        word-wrap: break-word; /* Evita che il testo lungo rompa il layout */
    }

    .section-title {
        font-size: 1rem;
        margin: 25px 0 15px 0;
    }

    /* MEDIA QUERIES PER DESKTOP */
    @media (min-width: 768px) {
        body { padding: 20px; }
        header { flex-direction: row; justify-content: space-between; text-align: left; padding: 20px; }
        .nav-buttons { display: flex; width: auto; }
        button { width: auto; padding: 10px 20px; font-size: 0.7rem; }
        .items-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        #detail-view { padding: 40px; }
        .detail-container { flex-direction: row; gap: 50px; }
        .image-side { flex: 1; }
        .content-side { flex: 1.5; }
        .section-title { font-size: 1.2rem; }
    }
</style>
</head>
<body>

    <header>
        <div onclick="window.location.href='index.html'" style="cursor:pointer;">
            <h2 style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);">BIBLIOTECA</h2>
            <small style="color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.6rem; letter-spacing: 2px;">PROTOCOLLO ARCHIVIO: ATTIVO</small>
        </div>
        <div class="nav-buttons">
            <button onclick="window.location.href='index.html'">HUB</button>
            <button onclick="window.location.href='orientamento.html'" class="btn-orientamento">ORIENTAMENTO</button>
            <button onclick="loadData('stirpi_database.json', this)">STIRPI</button>
            <button onclick="loadData('classi_database.json', this)">CLASSI & JOB</button>
            <button onclick="showKnightGuide(this)" class="btn-knight">GUIDA KNIGHT</button>
            <button id="back-btn" style="display:none; border-color: var(--neon-yellow); color: var(--neon-yellow);" onclick="showList()">← TORNA ALLA LISTA</button>
        </div>
    </header>

    <div id="list-view" class="items-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 100px 20px;">
            <h3 style="color: var(--neon-blue); opacity: 0.5;">IN ATTESA DI SELEZIONE CATEGORIA...</h3>
            <p style="font-family: 'Rajdhani'; color: #555;">Accedi ai file protetti tramite i pulsanti superiori.</p>
        </div>
    </div>

    <div id="detail-view"></div>

    <script>
        // Logica di caricamento (uguale alla precedente ma integrata con la nuova UI)
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const categoria = urlParams.get('cat');
            if (categoria) {
                setTimeout(() => {
                    if (categoria === 'stirpi') loadData('stirpi_database.json', document.querySelector('button[onclick*="stirpi_database.json"]'));
                    else if (categoria === 'classi') loadData('classi_database.json', document.querySelector('button[onclick*="classi_database.json"]'));
                    else if (categoria === 'knight') showKnightGuide(document.querySelector('.btn-knight'));
                }, 100);
            }
        });

        let currentData = [];

        async function loadData(filename, btn) {
            document.querySelectorAll('.nav-buttons button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            try {
                const response = await fetch(filename);
                if (!response.ok) throw new Error("File non trovato");
                const data = await response.json();
                currentData = data.items.sort((a, b) => a.nome.localeCompare(b.nome));
                renderList();
                showList();
            } catch (e) {
                document.getElementById('list-view').innerHTML = `<p style='color:red; text-align:center; grid-column:1/-1;'>ERRORE CRITICO: DATABASE ${filename} NON RAGGIUNGIBILE.</p>`;
            }
        }

        function renderList() {
            const container = document.getElementById('list-view');
            container.innerHTML = currentData.map((item, index) => `
                <div class="card" onclick="showDetail(${index})">
                    <img src="${item.immagine}" onerror="this.src='https://via.placeholder.com/400x300/111/00f2ff?text=${item.nome}'">
                    <h3>${item.nome}</h3>
                </div>
            `).join('');
        }

        function showDetail(index) {
            const item = currentData[index];
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';

            let skillSection = "";
            if (item.eredita) {
                skillSection = `<div class="section-title">EREDITÀ DI STIRPE</div>` + 
                    item.eredita.map(e => `
                        <div class="box">
                            <b style="color:var(--neon-blue); font-family:'Orbitron';">${e.nome}</b>
                            <p style="margin: 8px 0; font-size: 1rem;">${e.descrizione}</p>
                            <div style="color:var(--neon-yellow); font-size:0.9rem; background: rgba(255,255,0,0.05); padding: 5px 10px;"><i>EFFETTO:</i> ${e.effetto}</div>
                        </div>`).join('');
            } else if (item.tecniche) {
                skillSection = `<div class="section-title">PROTOCOLLI TECNICI (JOB)</div>` + 
                    item.tecniche.map(t => `
                        <div class="box" style="border-left: 3px solid var(--neon-pink);">
                            <small style="color:var(--neon-pink); font-family:'Orbitron'; font-weight:bold;">${t.tipo}</small><br>
                            <b style="font-size:1.2rem; color: #fff;">${t.nome}</b>
                            <p style="margin: 8px 0; font-size: 1rem; opacity: 0.9;">${t.effetto}</p>
                        </div>`).join('');
            }

            document.getElementById('detail-view').innerHTML = `
                <div class="detail-container">
                    <div class="image-side"><img src="${item.immagine}"></div>
                    <div class="content-side">
                        <h1 style="color:var(--neon-blue); font-size: 3rem; text-shadow: 0 0 15px var(--neon-blue);">${item.nome}</h1>
                        ${item.citazione ? `<div class="citazione">"${item.citazione}"</div>` : ''}
                        <div class="section-title">BACKGROUND OPERATIVO</div>
                        <p style="font-size: 1.1rem; color: #ccc;">${item.descrizione.replace(/\n/g, "<br>")}</p>
                        ${skillSection}
                    </div>
                </div>
                <div style="height:100px;"></div>
            `;
            window.scrollTo(0, 0);
        }

        function showKnightGuide(btn) {
            document.querySelectorAll('.nav-buttons button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';

            document.getElementById('detail-view').innerHTML = `
                <div style="max-width: 900px; margin: 0 auto;">
                    <h1 style="color: var(--neon-blue); text-align: center; font-size: 3rem; text-shadow: 0 0 20px var(--neon-blue);">ANATOMIA DEI KNIGHT</h1>
                    <p style="text-align: center; color: var(--neon-pink); font-family: 'Orbitron'; letter-spacing: 3px;">PROTOCOLLO MERLIN v.4.2</p>
                    
                    <div class="section-title">CLASSI E SCALE DIMENSIONALI</div>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px;">
                        <div class="box" style="text-align:center;"><b style="color:var(--neon-yellow); font-family:'Orbitron';">KNAVE</b><br><small>Supporto Urbano</small></div>
                        <div class="box" style="text-align:center;"><b style="color:var(--neon-blue); font-family:'Orbitron';">CHEVALIER</b><br><small>Standard Mecha</small></div>
                        <div class="box" style="text-align:center;"><b style="color:var(--neon-pink); font-family:'Orbitron';">PALADIN</b><br><small>Classe Fortezza</small></div>
                    </div>

                    <div class="section-title">FRAME OPERATIVI DISPONIBILI</div>
                    <div class="box" style="border-right: 3px solid var(--neon-blue);"><b>LANCER</b>: Specializzato in ingaggi ravvicinati e velocità cinetica.</div>
                    <div class="box" style="border-right: 3px solid var(--neon-blue);"><b>ARCHER</b>: Piattaforma di fuoco a lungo raggio e precisione Sidhe.</div>
                    <div class="box" style="border-right: 3px solid var(--neon-blue);"><b>TANKER</b>: Corazza stratificata e sistemi di difesa ad area.</div>
                    <div class="box" style="border-right: 3px solid var(--neon-blue);"><b>SCOUTER</b>: Sistemi ECM, occultamento e mobilità estrema.</div>
                    <div class="box" style="border-right: 3px solid var(--neon-blue);"><b>CASTER</b>: Condotto per particelle Dragon e manipolazione elementale.</div>

                    <div class="citazione" style="text-align:center; margin-top:50px;">
                        "L'interfaccia neurale non è un comando, è un dialogo tra l'anima del pilota e il metallo del Knight."
                    </div>
                </div>
            `;
            window.scrollTo(0,0);
        }

        function showList() {
            document.getElementById('list-view').style.display = 'grid';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
</body>
</html>
