<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Archivio Digitale</title>
    <link rel="icon" type="image/png" href="img/index/icona_app.png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007a;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.08);
        }
        
        body {
            background-color: var(--bg-dark);
            /* --- CORREZIONE SFONDO --- */
            background-image: url('img/biblioteca/sfondo.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            /* ------------------------- */
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow: hidden; /* Evita lo scroll della pagina intera, lo gestiamo nei modali */
        }

        .hub-container {
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            gap: 20px;
            background: rgba(0, 0, 0, 0.4); /* Scurisce leggermente lo sfondo per far risaltare i tasti */
        }

        .menu-btn {
            width: 280px; 
            padding: 25px; 
            background: var(--glass);
            border: 1px solid var(--neon-blue); 
            border-radius: 15px;
            color: white; 
            text-transform: uppercase; 
            font-weight: bold;
            cursor: pointer; 
            backdrop-filter: blur(10px); 
            transition: 0.3s;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .menu-btn:hover { 
            background: rgba(0, 242, 255, 0.2); 
            box-shadow: 0 0 15px var(--neon-blue); 
            transform: scale(1.05);
        }

        .modal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(20px); 
            z-index: 1000;
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
            border-bottom: 1px solid var(--neon-blue);
            padding-bottom: 10px;
        }
        
        .search-bar {
            width: 100%; 
            padding: 15px; 
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-blue); 
            color: white; 
            border-radius: 8px; 
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .items-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; 
            overflow-y: auto; 
            padding-bottom: 50px;
        }

        .item-card {
            padding: 20px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 10px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.2s;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .item-card:hover { 
            border-color: var(--neon-pink); 
            background: rgba(255, 0, 122, 0.1); 
            box-shadow: 0 0 10px rgba(255, 0, 122, 0.5);
        }

        #detail-view { 
            display: none; 
            text-align: left; 
            overflow-y: auto; 
            padding: 10px;
        }

        .detail-img { 
            width: 100%; 
            max-width: 500px; 
            border-radius: 15px; 
            border: 1px solid var(--neon-blue); 
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .close-btn { 
            background: var(--neon-pink); 
            border: none; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
        }

        /* Scrollbar stilizzata */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
