<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Database Operativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        h1, h2, h3 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        /* HEADER & NAVIGATION */
        header {
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .nav-buttons { display: flex; gap: 10px; }

        button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 18px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        button.active {
            background: var(--neon-blue);
            color: var(--bg-dark);
        }

        /* GRID SYSTEM */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            /* Focalizza l'anteprima sulla parte alta (volti) */
            object-position: center top; 
            filter: grayscale(30%);
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .card:hover img { filter: grayscale(0%); transform: scale(1.05); }

        /* DETAIL VIEW */
        #detail-view { display: none; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .detail-container { display: flex; gap: 40px; flex-wrap: wrap; }
        
        .image-side { flex: 1; min-width: 300px; }
        .content-side { flex: 2; min-width: 400px; }

        .image-side img {
            width: 100%;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .citazione {
            font-style: italic;
            color: var(--neon-pink);
            border-left: 3px solid var(--neon-pink);
            padding: 10px 20px;
            margin: 20px 0;
            background: rgba(255, 0, 255, 0.05);
            font-size: 1.1rem;
        }

        .section-title {
            color: var(--neon-blue);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            margin: 30px 0 15px 0;
            font-size: 1rem;
        }

        .box {
            background: var(--glass);
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 10px;
        }

        .tag-speciale {
            background: var(--neon-yellow);
            color: black;
            padding: 2px 8px;
            font-weight: bold;
            font-size: 0.7rem;
            border-radius: 2px;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); }
    </style>
</head>
<body>

    <header>
        <div onclick="window.location.href='index.html'" style="cursor:pointer;">
            <h2 style="color: var(--neon-blue);">Sistema KOTRA v3.0</h2>
            <small style="color: #666;">Accesso Biblioteca: Autorizzato</small>
        </div>
        <div class="nav-buttons">
            <button onclick="window.location.href='index.html'" style="border-color: #fff; color: #fff;">HOME</button>
            <button onclick="loadData('stirpi_database.json', this)">Stirpi</button>
            <button onclick="loadData('classi_database.json', this)">Classi & Job</button>
            <button id="back-btn" style="display:none; border-color: var(--neon-yellow); color: var(--neon-yellow);" onclick="showList()">← Torna alla Lista</button>
        </div>
    </header>

    <div id="list-view" class="items-grid">
        <p style="color: #444; text-align: center; grid-column: 1/-1; margin-top: 50px;">In attesa di selezione categoria...</p>
    </div>

    <div id="detail-view"></div>

    <script>
        let currentData = [];

        async function loadData(filename, btn) {
            document.querySelectorAll('.nav-buttons button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            try {
                const response = await fetch(filename);
                if (!response.ok) throw new Error("File non trovato");
                const data = await response.json();
                
                // Ordinamento Alfabetico
                currentData = data.items.sort((a, b) => a.nome.localeCompare(b.nome));
                
                renderList();
                showList();
            } catch (e) {
                console.error(e);
                document.getElementById('list-view').innerHTML = "<p style='color:red; text-align:center; grid-column:1/-1;'>Errore nel caricamento del database.</p>";
            }
        }

        function renderList() {
            const container = document.getElementById('list-view');
            container.innerHTML = currentData.map((item, index) => {
                const isSpeciale = item.descrizione && item.descrizione.includes("NOTE SPECIALI");
                return `
                    <div class="card" onclick="showDetail(${index})">
                        ${isSpeciale ? '<span class="tag-speciale" style="position:absolute; top:10px; right:10px; z-index:2;">SPECIALE</span>' : ''}
                        <img src="${item.immagine}" onerror="this.src='https://via.placeholder.com/200x180/111/00f2ff?text=${item.nome}'">
                        <h3>${item.nome}</h3>
                    </div>
                `;
            }).join('');
        }

        function showDetail(index) {
            const item = currentData[index];
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';

            const descFormattata = item.descrizione
                .replace(/\n/g, "<br>")
                .replace("NOTE SPECIALI:", "<br><b style='color:var(--neon-yellow); border:1px solid var(--neon-yellow); padding: 2px 5px;'>⚠️ NOTE SPECIALI</b><br>");

            let skillSection = "";
            if (item.eredita) {
                skillSection = `<div class="section-title">Eredità di Stirpe</div>` + 
                    item.eredita.map(e => `
                        <div class="box">
                            <b style="color:var(--neon-blue);">${e.nome}</b>
                            <p style="margin: 5px 0; font-size: 0.9rem;">${e.descrizione}</p>
                            <div style="color:var(--neon-yellow); font-size:0.85rem;"><i>EFFETTO:</i> ${e.effetto}</div>
                        </div>`).join('');
            } else if (item.tecniche) {
                skillSection = `<div class="section-title">Protocolli Tecnici (Job)</div>` + 
                    item.tecniche.map(t => `
                        <div class="box" style="border-left: 2px solid var(--neon-pink);">
                            <small style="color:var(--neon-pink); font-weight:bold;">${t.tipo}</small><br>
                            <b style="font-size:1.1rem;">${t.nome}</b>
                            <p style="margin: 5px 0; font-size: 0.9rem; opacity: 0.8;">${t.effetto}</p>
                        </div>`).join('');
            }

            document.getElementById('detail-view').innerHTML = `
                <div class="detail-container">
                    <div class="image-side">
                        <img src="${item.immagine}">
                        <div class="box" style="margin-top:20px;">
                            <div style="color:var(--neon-blue); margin-bottom:10px;">TRATTI CONSIGLIATI</div>
                            <small>${item.tratti_consigliati.join(' • ')}</small>
                        </div>
                    </div>
                    <div class="content-side">
                        <h1 style="color:var(--neon-blue); font-size: 2.5rem;">${item.nome}</h1>
                        ${item.citazione ? `<div class="citazione">"${item.citazione}"</div>` : ''}
                        <div class="section-title">Background Operativo</div>
                        <p>${descFormattata}</p>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div>
                                <div class="section-title">Temi Chiave</div>
                                <div style="font-size:0.9rem;">${item.temi_da_esplorare.join(' • ')}</div>
                            </div>
                            ${item.nemesi ? `
                            <div>
                                <div class="section-title">Nemesi</div>
                                <div style="font-size:0.9rem; color:var(--neon-pink);">${item.nemesi.join(' • ')}</div>
                            </div>` : ''}
                        </div>
                        ${skillSection}
                    </div>
                </div>
                <div style="height:100px;"></div>
            `;
            window.scrollTo(0, 0);
        }

        function showList() {
            document.getElementById('list-view').style.display = 'grid';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
</body>
</html>
