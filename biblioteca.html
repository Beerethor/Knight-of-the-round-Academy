<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Archivio Digitale</title>
    <link rel="icon" type="image/png" href="img/index/icona_app.png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007a;
            --bg-dark: #0a0b10;
        }
        
        body {
            background-color: var(--bg-dark);
            /* Il percorso deve essere esatto: controlla minuscole/maiuscole su GitHub */
            background-image: url('img/bibioteca/sfondo.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
        }

        /* Overlay per garantire che i tasti si vedano anche se lo sfondo è nero */
        .hub-container {
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            gap: 20px;
            background: rgba(0, 0, 0, 0.6); 
        }

        .menu-btn {
            width: 280px; 
            padding: 25px; 
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-blue); 
            border-radius: 15px;
            color: white; 
            text-transform: uppercase; 
            font-weight: bold;
            cursor: pointer; 
            backdrop-filter: blur(10px); 
            transition: 0.3s;
        }

        .menu-btn:hover { 
            background: rgba(0, 242, 255, 0.2); 
            box-shadow: 0 0 15px var(--neon-blue); 
        }

        .modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 11, 16, 0.95); 
            backdrop-filter: blur(20px); 
            z-index: 1000;
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--neon-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .search-bar {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--neon-blue); color: white; border-radius: 8px; margin-bottom: 20px;
        }

        .items-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; 
            overflow-y: auto;
        }

        .item-card {
            padding: 15px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; text-align: center; cursor: pointer;
        }

        .item-card:hover { border-color: var(--neon-pink); }

        #detail-view { display: none; overflow-y: auto; }
        
        .close-btn { background: var(--neon-pink); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .back-btn { background: #444; border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1 style="color: var(--neon-blue); margin-bottom: 30px; letter-spacing: 3px;">BIBLIOTECA DIGITALE</h1>
        <button class="menu-btn" onclick="openModal('stirpi_database.json', 'STIRPI')">🧬 Razze / Stirpi</button>
        <button class="menu-btn" onclick="openModal('classi_database.json', 'CLASSI')">⚔️ Ruoli / Classi</button>
        <button class="menu-btn" onclick="openModal('knight_database.json', 'KNIGHT')">🤖 Modelli Knight</button>
        <a href="index.html" style="color: grey; text-decoration: none; margin-top: 20px;">Torna all'Hub</a>
    </div>

    <div id="main-modal" class="modal">
        <div class="modal-header">
            <button id="back-to-list" class="back-btn" onclick="showList()">← LISTA</button>
            <h2 id="modal-title" style="margin: 0;"></h2>
            <button class="close-btn" onclick="closeModal()">CHIUDI X</button>
        </div>

        <div id="list-view">
            <input type="text" class="search-bar" id="search" placeholder="Cerca..." onkeyup="filterItems()">
            <div class="items-grid" id="items-container"></div>
        </div>

        <div id="detail-view"></div>
    </div>

    <script>
        let currentData = [];
        let currentType = "";

        async function openModal(jsonFile, title) {
            currentType = jsonFile.split('_')[0]; // stirpi, classi, o knight
            document.getElementById('modal-title').innerText = title;
            document.getElementById('main-modal').style.display = 'flex';
            
            try {
                const response = await fetch(jsonFile);
                const data = await response.json();
                currentData = data.items || data.stirpi || [];
                renderList(currentData);
            } catch (e) {
                document.getElementById('items-container').innerHTML = "Errore nel caricamento del file JSON. Controlla che il file esista su GitHub.";
            }
        }

        function renderList(items) {
            const container = document.getElementById('items-container');
            container.innerHTML = "";
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerText = item.nome;
                card.onclick = () => showDetail(item);
                container.appendChild(card);
            });
            showList();
        }

        function showDetail(item) {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('back-to-list').style.display = 'block';
            
            let extraContent = "";
            if(item.eredita) {
                extraContent = "<h3>EREDITÀ</h3>" + item.eredita.map(e => `<b>${e.nome}</b>: ${e.descrizione}<br><br>`).join('');
            } else if(item.temi_da_esplorare) {
                extraContent = "<h3>TEMI</h3>" + item.temi_da_esplorare.join(', ');
            }

            document.getElementById('detail-view').innerHTML = `
                <img src="img/razze/${item.immagine}" style="width:100%; max-width:400px; border-radius:10px; border:1px solid var(--neon-blue); margin-bottom:20px;" onerror="this.src='img/index/icona_app.png'">
                <h1>${item.nome}</h1>
                <p>${item.descrizione}</p>
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px;">${extraContent}</div>
            `;
        }

        function showList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('back-to-list').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('main-modal').style.display = 'none';
        }

        function filterItems() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = currentData.filter(i => i.nome.toLowerCase().includes(term));
            renderList(filtered);
        }
    </script>
</body>
</html>
