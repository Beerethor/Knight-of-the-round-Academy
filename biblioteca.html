<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Archivio Digitale</title>
    <link rel="icon" type="image/png" href="img/index/icona_app.png">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007a;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.08);
        }
        
        body {
            background-color: var(--bg-dark);
            background-image: url('img/biblioteca/sfondo.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden;
        }

        /* Layout Principale */
        .hub-container {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px;
        }

        .menu-btn {
            width: 280px; padding: 25px; background: var(--glass);
            border: 1px solid var(--neon-blue); border-radius: 15px;
            color: white; text-transform: uppercase; font-weight: bold;
            cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s;
        }

        .menu-btn:hover { background: rgba(0, 242, 255, 0.2); box-shadow: 0 0 15px var(--neon-blue); }

        /* Finestra Modale (Full Screen) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000;
            flex-direction: column; padding: 20px; box-sizing: border-box;
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .search-bar {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.1);
            border: 1px solid var(--neon-blue); color: white; border-radius: 8px; margin-bottom: 20px;
        }

        /* Lista Elementi */
        .items-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; overflow-y: auto; padding-bottom: 50px;
        }

        .item-card {
            padding: 20px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s;
        }

        .item-card:hover { border-color: var(--neon-pink); background: rgba(255, 0, 122, 0.1); }

        /* Schermata Dettaglio */
        #detail-view { display: none; text-align: left; overflow-y: auto; }
        .detail-img { width: 100%; max-width: 400px; border-radius: 15px; border: 2px solid var(--neon-blue); margin-bottom: 20px; }

        .close-btn { background: var(--neon-pink); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hub-container">
        <a href="index.html" style="color: var(--neon-blue); text-decoration: none; margin-bottom: 20px;">← ESCI DALL'ARCHIVIO</a>
        <button class="menu-btn" onclick="openModal('stirpi_database.json', 'STIRPI')">🧬 Razze / Stirpi</button>
        <button class="menu-btn" onclick="openModal('classi_database.json', 'CLASSI')">⚔️ Ruoli / Classi</button>
        <button class="menu-btn" onclick="openModal('knight_database.json', 'KNIGHT')">🤖 Modelli Knight</button>
    </div>

    <div id="main-modal" class="modal">
        <div class="modal-header">
            <button class="close-btn" id="back-to-list" style="background: grey; display: none;" onclick="showList()">← Indietro</button>
            <h2 id="modal-title" style="color: var(--neon-blue);">ARCHIVIO</h2>
            <button class="close-btn" onclick="closeModal()">CHIUDI X</button>
        </div>

        <div id="list-view">
            <input type="text" class="search-bar" id="search" placeholder="Cerca nel database..." onkeyup="filterItems()">
            <div class="items-grid" id="items-container"></div>
        </div>

        <div id="detail-view">
            </div>
    </div>

    <script>
        let currentData = [];
        let currentJsonFile = "";

        async function openModal(jsonFile, title) {
            currentJsonFile = jsonFile;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('main-modal').style.display = 'flex';
            
            const response = await fetch(jsonFile);
            const data = await response.json();
            currentData = data.items || data.stirpi; // Gestisce entrambi i nomi dei campi
            renderList(currentData);
        }

        function renderList(items) {
            const container = document.getElementById('items-container');
            container.innerHTML = "";
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerText = item.nome;
                card.onclick = () => showDetail(item);
                container.appendChild(card);
            });
            showList();
        }

        function showDetail(item) {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('back-to-list').style.display = 'block';
            const detail = document.getElementById('detail-view');
            detail.style.display = 'block';

            // Percorso immagine basato sulla cartella (img/razze, img/classi, etc.)
            let folder = currentJsonFile.split('_')[0]; // Prende 'stirpi', 'classi' o 'knight'
            
            detail.innerHTML = `
                <img src="img/${folder}/${item.immagine}" class="detail-img" onerror="this.src='img/index/icona_app.png'">
                <h1 style="color: var(--neon-blue)">${item.nome}</h1>
                <p style="font-size: 1.1rem; line-height: 1.6;">${item.descrizione}</p>
                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border-left: 4px solid var(--neon-pink);">
                    ${item.eredita ? renderEredita(item.eredita) : (item.dati_extra || "Dati tecnici in fase di caricamento...")}
                </div>
            `;
        }

        function renderEredita(eredita) {
            return "<h3>EREDITÀ:</h3>" + eredita.map(e => `<b>${e.nome}</b>: ${e.descrizione}<br><br>`).join('');
        }

        function showList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('back-to-list').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('main-modal').style.display = 'none';
        }

        function filterItems() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = currentData.filter(i => i.nome.toLowerCase().includes(term));
            renderList(filtered);
        }
    </script>
</body>
</html>
