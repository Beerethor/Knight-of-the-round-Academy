<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Evoluzione Matricola</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; --bg-dark: #0a0a0c; --glass: rgba(255,255,255,0.03); }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; padding: 20px; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-nav { text-decoration: none; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid var(--neon-blue); padding: 5px 15px; transition: 0.3s; }
        .btn-nav:hover { background: var(--neon-blue); color: black; }

        .form-section { background: var(--glass); padding: 20px; border: 1px solid #222; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-left: 3px solid var(--neon-blue); }
        .locked { border-left-color: #555; opacity: 0.8; }
        .evolution { border-left-color: var(--neon-pink); }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.7rem; margin-bottom: 5px; text-transform: uppercase; }
        .evolution label { color: var(--neon-pink); }
        
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-family: 'Rajdhani'; font-size: 1rem; outline: none; }
        input:focus, select:focus { border-color: var(--neon-pink); }
        input:read-only { background: #111; color: #888; border-color: #222; cursor: not-allowed; }
        
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        .btn-update { width: 100%; background: transparent; border: 2px solid var(--neon-pink); color: var(--neon-pink); padding: 15px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-update:hover { background: var(--neon-pink); color: black; box-shadow: 0 0 20px var(--neon-pink); }
        
        #loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }

        /* Stile speciale per il secondo Job */
        .job-highlight { border: 1px solid var(--neon-pink); background: rgba(255, 0, 255, 0.05); }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <p style="font-family:'Orbitron'; color:var(--neon-pink);">SINCRONIZZAZIONE EVOLUZIONE...</p>
    </div>

    <header class="nav-header">
        <h1 style="font-family:'Orbitron'; font-size: 1.2rem; color:var(--neon-blue);">EVOLUZIONE MATRICOLA</h1>
        <a href="archivio.html" class="btn-nav">ANNULLA</a>
    </header>

    <div class="form-section locked">
        <div class="full-width"><h3 style="font-family:'Orbitron'; font-size: 0.8rem; margin:0; color:#888;">DATI CORE BLOCCATI</h3></div>
        <div>
            <label>NOME</label><input type="text" id="nome" readonly>
            <label>STIRPE</label><input type="text" id="stirpe" readonly>
        </div>
        <div>
            <label>JOB PRIMARIO</label><input type="text" id="job-primario" readonly>
            <label>SINCRONIA CORE / ANIMA</label>
            <div class="grid-2">
                <input type="text" id="core" readonly>
                <input type="text" id="anima" readonly>
            </div>
        </div>
    </div>

    <div class="form-section evolution">
        <div class="full-width"><h3 style="font-family:'Orbitron'; font-size: 0.8rem; margin:0;">SINAPSI JOB SECONDARIO</h3></div>
        <div class="full-width">
            <label>SECONDO JOB (SBLOCCO MULTICLASSE)</label>
            <select id="secondo-job" class="job-highlight">
                <option value="">-- NESSUN SECONDO JOB --</option>
                </select>
            <p style="font-size: 0.7rem; color: #888; margin: 0;">L'acquisizione di un secondo Job permette di accedere a nuove Tecniche nel Terminale Archivio.</p>
        </div>
    </div>

    <div class="form-section evolution">
        <div class="full-width"><h3 style="font-family:'Orbitron'; font-size: 0.8rem; margin:0;">ESPANSIONE MEMETICA (MAX 10 TRATTI)</h3></div>
        <div class="full-width grid-4" id="tratti-container"></div>
    </div>

    <div class="form-section evolution">
        <div>
            <label>CAPACITÀ SPECIALI (MAX 2)</label>
            <input type="text" class="cap-input" placeholder="Capacità 1">
            <input type="text" class="cap-input" placeholder="Capacità 2">
        </div>
        <div>
            <label>EQUIPAGGIAMENTO / OGGETTI (MAX 2)</label>
            <input type="text" class="item-input" placeholder="Oggetto 1">
            <input type="text" class="item-input" placeholder="Oggetto 2">
        </div>
        <div class="full-width">
            <label>MEMORIE (+3 PUNTI LIMITE CAD.)</label>
            <div class="grid-3">
                <input type="text" class="mem-input" placeholder="Memoria 1">
                <input type="text" class="mem-input" placeholder="Memoria 2">
                <input type="text" class="mem-input" placeholder="Memoria 3">
            </div>
        </div>
    </div>

    <div class="form-section evolution">
        <div class="full-width"><h3 style="font-family:'Orbitron'; font-size: 0.8rem; margin:0;">PERSONALIZZAZIONE IDENTITY</h3></div>
        <div>
            <label>UNIFORME PERSONALIZZATA (DESCRIZIONE)</label>
            <textarea id="uniforme" rows="2" placeholder="Descrivi lo stile della tua divisa..."></textarea>
            <label>CLUB SCOLASTICO / FAZIONE</label>
            <input type="text" id="club" placeholder="Es: Club di Kendo, Consiglio Studentesco...">
        </div>
        <div>
            <label>TRATTO DISTINTIVO</label>
            <input type="text" id="tratto-distintivo" placeholder="Es: Occhi eterocromatici, Cicatrice...">
            <label>AFFINITÀ (MAX 2)</label>
            <div class="grid-2">
                <input type="text" class="aff-input" placeholder="Affinità 1">
                <input type="text" class="aff-input" placeholder="Affinità 2">
            </div>
        </div>
    </div>

    <button class="btn-update" id="btn-save-evolution">SALVA EVOLUZIONE</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const updateId = sessionStorage.getItem('updateModeId');
        if(!updateId) window.location.href = "archivio.html";

        let classiDatabase = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // Carica database classi per il menu a tendina
                    const resJ = await fetch('classi_database.json');
                    const dataJ = await resJ.json();
                    classiDatabase = dataJ.items;
                    
                    const selectJob = document.getElementById('secondo-job');
                    classiDatabase.forEach(job => {
                        const opt = document.createElement('option');
                        opt.value = job.nome;
                        opt.textContent = job.nome.toUpperCase();
                        selectJob.appendChild(opt);
                    });

                    // Carica dati personaggio
                    const docSnap = await getDoc(doc(db, "personaggi", updateId));
                    if(docSnap.exists()) {
                        const p = docSnap.data();
                        
                        document.getElementById('nome').value = p.nome;
                        document.getElementById('stirpe').value = p.stirpe;
                        document.getElementById('job-primario').value = p.job;
                        document.getElementById('core').value = p.core;
                        document.getElementById('anima').value = p.anima;

                        // Secondo Job
                        if(p.secondoJob) document.getElementById('secondo-job').value = p.secondoJob;

                        // Tratti
                        const container = document.getElementById('tratti-container');
                        for(let i=0; i<10; i++) {
                            const val = (p.tratti && p.tratti[i]) ? p.tratti[i] : "";
                            const input = document.createElement('input');
                            input.type = "text";
                            input.className = "tratto-input";
                            input.value = val;
                            if(i < 4 && val !== "") input.readOnly = true;
                            container.appendChild(input);
                        }

                        // Helper per caricare array negli input
                        const fillInputs = (className, dataArray) => {
                            const inputs = document.querySelectorAll(`.${className}`);
                            if(dataArray) dataArray.forEach((d, i) => { if(inputs[i]) inputs[i].value = d; });
                        };

                        fillInputs('cap-input', p.capacita);
                        fillInputs('item-input', p.oggetti);
                        fillInputs('mem-input', p.memorie);
                        fillInputs('aff-input', p.affinita);
                        
                        document.getElementById('uniforme').value = p.uniforme || "";
                        document.getElementById('club').value = p.club || "";
                        document.getElementById('tratto-distintivo').value = p.trattoDistintivo || "";
                    }
                } catch (e) {
                    console.error("Errore caricamento:", e);
                }
            } else { window.location.href = "index.html"; }
        });

        document.getElementById('btn-save-evolution').onclick = async () => {
            document.getElementById('loading-overlay').style.display = 'flex';
            
            const memorie = Array.from(document.querySelectorAll('.mem-input')).map(i => i.value).filter(v => v !== "");
            const bonusPuntiLimite = memorie.length * 3;

            const updatedData = {
                secondoJob: document.getElementById('secondo-job').value,
                tratti: Array.from(document.querySelectorAll('.tratto-input')).map(i => i.value).filter(v => v !== ""),
                capacita: Array.from(document.querySelectorAll('.cap-input')).map(i => i.value).filter(v => v !== ""),
                oggetti: Array.from(document.querySelectorAll('.item-input')).map(i => i.value).filter(v => v !== ""),
                memorie: memorie,
                bonusPuntiLimite: bonusPuntiLimite,
                uniforme: document.getElementById('uniforme').value,
                club: document.getElementById('club').value,
                trattoDistintivo: document.getElementById('tratto-distintivo').value,
                affinita: Array.from(document.querySelectorAll('.aff-input')).map(i => i.value).filter(v => v !== "")
            };

            try {
                await updateDoc(doc(db, "personaggi", updateId), updatedData);
                sessionStorage.removeItem('updateModeId');
                window.location.href = "archivio.html";
            } catch (e) {
                alert("Errore sincronizzazione.");
                document.getElementById('loading-overlay').style.display = 'none';
            }
        };
    </script>
</body>
</html>
