<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Evoluzione Matricola</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-pink: #ff00ff; 
            --neon-yellow: #ffff00; 
            --bg-dark: #060608; 
            --panel-bg: rgba(15, 15, 20, 0.9);
            --border-color: rgba(0, 242, 255, 0.2);
        }

        body { 
            background: var(--bg-dark); 
            color: var(--neon-blue); 
            font-family: 'Rajdhani', sans-serif; 
            padding: 20px;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 80%),
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        /* Scanline effect */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 10;
        }

        .nav-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; border-bottom: 2px solid var(--neon-blue); 
            padding-bottom: 10px; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1);
        }

        .btn-nav { 
            text-decoration: none; color: var(--neon-pink); font-family: 'Orbitron'; 
            font-size: 0.7rem; border: 1px solid var(--neon-pink); padding: 8px 20px; 
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .btn-nav:hover { background: var(--neon-pink); color: #000; box-shadow: 0 0 15px var(--neon-pink); }

        .form-section { 
            background: var(--panel-bg); 
            padding: 25px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 25px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px; 
            position: relative;
            overflow: hidden;
        }

        /* Decoration corners */
        .form-section::before {
            content: ""; position: absolute; top: 0; left: 0; width: 10px; height: 10px;
            border-top: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue);
        }

        .locked { border-left: 4px solid #333; opacity: 0.7; filter: grayscale(1); }
        .evolution { border-left: 4px solid var(--neon-pink); box-shadow: -5px 0 15px rgba(255, 0, 255, 0.1); }
        .full-width { grid-column: 1 / -1; }
        
        label { 
            display: block; color: var(--neon-blue); font-family: 'Orbitron'; 
            font-size: 0.65rem; margin-bottom: 8px; letter-spacing: 1px;
        }
        .evolution label { color: var(--neon-pink); }
        
        input, select, textarea { 
            width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--border-color); 
            color: #fff; padding: 12px; margin-bottom: 5px; border-radius: 0; 
            font-family: 'Rajdhani'; font-size: 1rem; transition: 0.3s;
        }
        
        input:focus, select:focus, textarea:focus { 
            border-color: var(--neon-pink); outline: none; background: rgba(255, 0, 255, 0.05); 
        }

        input:read-only { background: rgba(20, 20, 25, 0.8); color: #555; border-color: #222; cursor: not-allowed; }
        
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .btn-update { 
            width: 100%; background: transparent; border: 2px solid var(--neon-pink); 
            color: var(--neon-pink); padding: 20px; font-family: 'Orbitron'; 
            font-weight: bold; cursor: pointer; transition: 0.4s; margin-top: 20px;
            letter-spacing: 4px; text-transform: uppercase;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }
        .btn-update:hover { 
            background: var(--neon-pink); color: #000; box-shadow: 0 0 30px var(--neon-pink); 
        }
        
        #loading-overlay { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(6, 6, 8, 0.95); z-index: 1000; flex-direction: column; 
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        .job-highlight { 
            border: 1px solid var(--neon-pink); color: var(--neon-pink); font-weight: bold;
        }

        h3 { font-family: 'Orbitron'; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }

        @media (max-width: 768px) {
            .form-section { grid-template-columns: 1fr; }
            .grid-3, .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="width: 50px; height: 50px; border: 3px solid var(--neon-pink); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="font-family:'Orbitron'; color:var(--neon-pink); margin-top: 20px; letter-spacing: 3px;">UPLOADING DATA...</p>
    </div>

    <header class="nav-header">
        <h1 style="font-family:'Orbitron'; font-size: 1.1rem; color:var(--neon-blue); margin: 0;">&gt; EVOLUZIONE_MATRICOLA.EXE</h1>
        <a href="archivio.html" class="btn-nav">DISCONNETTI</a>
    </header>

    <div class="form-section locked">
        <div class="full-width"><h3 style="font-size: 0.75rem; color:#555;">[ CORE_DATA_LOCKED ]</h3></div>
        <div>
            <label>SOGGETTO</label><input type="text" id="nome" readonly>
            <label>ORIGINE_STIRPE</label><input type="text" id="stirpe" readonly>
        </div>
        <div>
            <label>SYNC_JOB_01</label><input type="text" id="job-primario" readonly>
            <label>BIO_SYNCHRONIZATION (C/A)</label>
            <div class="grid-2">
                <input type="text" id="core" readonly>
                <input type="text" id="anima" readonly>
            </div>
        </div>
    </div>

    <div class="form-section evolution">
        <div class="full-width"><h3 style="font-size: 0.75rem;">[ MULTICLASS_NEURAL_LINK ]</h3></div>
        <div class="full-width">
            <label>SECONDO JOB (OVERRIDE_SELECT)</label>
            <select id="secondo-job" class="job-highlight">
                <option value="">-- NESSUNA SINAPSI RILEVATA --</option>
            </select>
        </div>
    </div>

    <div class="form-section evolution">
        <div class="full-width"><h3 style="font-size: 0.75rem;">[ MEMETIC_EXPANSION_SLOTS ]</h3></div>
        <div class="full-width grid-4" id="tratti-container"></div>
    </div>

    <div class="form-section evolution">
        <div>
            <label>CAPACITÀ_SPECIALI_SBLOCCATE</label>
            <input type="text" class="cap-input" placeholder="Slot_01">
            <input type="text" class="cap-input" placeholder="Slot_02">
        </div>
        <div>
            <label>EQUIPAGGIAMENTO_MOD</label>
            <input type="text" class="item-input" placeholder="Item_01">
            <input type="text" class="item-input" placeholder="Item_02">
        </div>
        <div class="full-width">
            <label>RELIQUIA_MEMORIE (LIMIT_UP: +3)</label>
            <div class="grid-3">
                <input type="text" class="mem-input" placeholder="Fragment_01">
                <input type="text" class="mem-input" placeholder="Fragment_02">
                <input type="text" class="mem-input" placeholder="Fragment_03">
                <div class="form-section evolution">
        <div class="full-width"><h3 style="font-size: 0.75rem;">[ NEURAL & HARDWARE UPGRADE ]</h3></div>
        <div>
            <label>SINAPSI_KNIGHT (OVERRIDE_SELECT)</label>
            <input type="text" id="Knight" class="Knight-input" placeholder="Es: Lancelot, The Fool">
            </select>
        </div>
        <div>
            <label>FRAME_MODIFICATION (HARDWARE_TYPE)</label>
            <input type="text" id="frame" class="frame-input" placeholder="Es: Lancer...">
        </div>
    </div>
            </div>
        </div>
    </div>

    <div class="form-section evolution">
        <div class="full-width"><h3 style="font-size: 0.75rem;">[ IDENTITY_PERSONALIZATION ]</h3></div>
        <div>
            <label>UNIFORME_CUSTOM_STYLE</label>
            <textarea id="uniforme" rows="2" placeholder="Input visual data..."></textarea>
            <label>FAZIONE_CLUB</label>
            <input type="text" id="club" placeholder="Neural identification...">
        </div>
        <div>
            <label>DISTINCTIVE_MARK</label>
            <input type="text" id="tratto-distintivo" placeholder="Anomalies detected...">
            <label>AFFINITY_LINKS</label>
            <div class="grid-2">
                <input type="text" class="aff-input" placeholder="Link_01">
                <input type="text" class="aff-input" placeholder="Link_02">
            </div>
        </div>
    </div>

    <button class="btn-update" id="btn-save-evolution">COMMIT_CHANGES</button>

    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const updateId = sessionStorage.getItem('updateModeId');
        if(!updateId) window.location.href = "archivio.html";

        let classiDatabase = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const resJ = await fetch('classi_database.json');
                    const dataJ = await resJ.json();
                    classiDatabase = dataJ.items;
                    
                    const selectJob = document.getElementById('secondo-job');
                    classiDatabase.forEach(job => {
                        const opt = document.createElement('option');
                        opt.value = job.nome;
                        opt.textContent = job.nome.toUpperCase();
                        opt.style.background = "#060608";
                        selectJob.appendChild(opt);
                    });

                    const docSnap = await getDoc(doc(db, "personaggi", updateId));
                    if(docSnap.exists()) {
                        const p = docSnap.data();
                        
                        document.getElementById('nome').value = p.nome;
                        document.getElementById('stirpe').value = p.stirpe;
                        document.getElementById('job-primario').value = p.job;
                        document.getElementById('core').value = p.core;
                        document.getElementById('anima').value = p.anima;
                        if(p.secondoJob) document.getElementById('secondo-job').value = p.secondoJob;

                        const container = document.getElementById('tratti-container');
                        for(let i=0; i<10; i++) {
                            const val = (p.tratti && p.tratti[i]) ? p.tratti[i] : "";
                            const input = document.createElement('input');
                            input.type = "text";
                            input.className = "tratto-input";
                            input.placeholder = `TRAIT_${i+1}`;
                            input.value = val;
                            if(i < 4 && val !== "") input.readOnly = true;
                            container.appendChild(input);
                        }

                        const fillInputs = (className, dataArray) => {
                            const inputs = document.querySelectorAll(`.${className}`);
                            if(dataArray) dataArray.forEach((d, i) => { if(inputs[i]) inputs[i].value = d; });
                        };

                        fillInputs('cap-input', p.capacita);
                        fillInputs('item-input', p.oggetti);
                        fillInputs('mem-input', p.memorie);
                        fillInputs('aff-input', p.affinita);
                        
                        document.getElementById('uniforme').value = p.uniforme || "";
                        document.getElementById('club').value = p.club || "";
                        document.getElementById('tratto-distintivo').value = p.trattoDistintivo || "";
                    }
                } catch (e) { console.error(e); }
            } else { window.location.href = "index.html"; }
        });

        document.getElementById('btn-save-evolution').onclick = async () => {
            document.getElementById('loading-overlay').style.display = 'flex';
            const memorie = Array.from(document.querySelectorAll('.mem-input')).map(i => i.value).filter(v => v !== "");
            
            const updatedData = {
                secondoJob: document.getElementById('secondo-job').value,
                tratti: Array.from(document.querySelectorAll('.tratto-input')).map(i => i.value).filter(v => v !== ""),
                capacita: Array.from(document.querySelectorAll('.cap-input')).map(i => i.value).filter(v => v !== ""),
                oggetti: Array.from(document.querySelectorAll('.item-input')).map(i => i.value).filter(v => v !== ""),
                memorie: memorie,
                bonusPuntiLimite: memorie.length * 3,
                uniforme: document.getElementById('uniforme').value,
                club: document.getElementById('club').value,
                trattoDistintivo: document.getElementById('tratto-distintivo').value,
                affinita: Array.from(document.querySelectorAll('.aff-input')).map(i => i.value).filter(v => v !== "")
            };

            try {
                await updateDoc(doc(db, "personaggi", updateId), updatedData);
                sessionStorage.removeItem('updateModeId');
                window.location.href = "archivio.html";
            } catch (e) {
                alert("SYNC_ERROR: UNABLE TO COMMIT CHANGES.");
                document.getElementById('loading-overlay').style.display = 'none';
            }
        };
    </script>
</body>
</html>
