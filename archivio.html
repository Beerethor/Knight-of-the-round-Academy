<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Terminale di Accesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --bg-dark: #060608; }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; }
        
        .nav-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        
        /* Pannelli Sezioni */
        .archive-section { padding: 20px 40px; }
        .section-header { 
            font-family: 'Orbitron'; color: var(--neon-pink); 
            border-left: 4px solid var(--neon-pink); padding-left: 15px; 
            margin: 30px 0 20px 0; text-transform: uppercase; letter-spacing: 2px;
        }

        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        /* Card */
        .pg-card { background: #111116; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .pg-card:hover { border-color: var(--neon-blue); transform: translateY(-5px); }
        .pg-card img { width: 100%; height: 180px; object-fit: cover; }
        .info { padding: 15px; }

        /* Login Master */
        #master-auth { 
            background: rgba(255, 0, 255, 0.05); border: 1px solid var(--neon-pink);
            padding: 10px; margin: 20px 40px; display: flex; gap: 10px; align-items: center;
        }
        input#master-key { background: #000; border: 1px solid #444; color: white; padding: 5px; }
    </style>
</head>
<body>

    <header class="nav-header">
        <h1 style="font-family:'Orbitron'; color:var(--neon-blue);">SISTEMA ARCHIVIO KOTRA</h1>
        <div id="user-info" style="font-size: 0.8rem; color: #888;">ID UTENTE: <span id="uid-display">Generazione...</span></div>
    </header>

    <div id="master-auth">
        <label style="font-family:'Orbitron'; font-size: 0.7rem;">ACCESSO MASTER:</label>
        <input type="password" id="master-key" placeholder="Inserisci Chiave">
        <button onclick="checkMaster()" style="cursor:pointer; background:var(--neon-pink); border:none; color:black; font-family:'Orbitron'; font-size:0.6rem; padding:5px 10px;">AUTH</button>
    </div>

    <div class="archive-section">
        <div class="section-header" id="label-miei">Le Mie Matricole</div>
        <div class="archive-grid" id="grid-personali"></div>

        <div id="master-only-area" style="display: none;">
            <div class="section-header">Database Utenti (Sola Lettura Master)</div>
            <div class="archive-grid" id="grid-utenti"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Gestione Identità (Semplice ID nel LocalStorage)
        let userId = localStorage.getItem('kotra_uid');
        if (!userId) {
            userId = 'USR-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('kotra_uid', userId);
        }
        document.getElementById('uid-display').innerText = userId;

        // 2. Controllo Master
        const MASTER_PASSWORD = "KOTRA-MASTER-2024"; // Sostituisci con la tua chiave
        window.checkMaster = () => {
            const key = document.getElementById('master-key').value;
            if (key === MASTER_PASSWORD) {
                localStorage.setItem('is_master', 'true');
                alert("Protocollo Master Attivato.");
                location.reload();
            } else {
                alert("Accesso Negato.");
            }
        };

        async function loadArchive() {
            const isMaster = localStorage.getItem('is_master') === 'true';
            const gridPersonali = document.getElementById('grid-personali');
            const gridUtenti = document.getElementById('grid-utenti');
            
            // Query 1: I miei PG (creati da me o creati dal master se io sono il master)
            const qPersonal = query(collection(db, "personaggi"), where("creatoDa", "==", isMaster ? "MASTER" : userId));
            const snapPersonal = await getDocs(qPersonal);
            
            renderGrid(snapPersonal, gridPersonali);

            // Query 2: Se sono Master, carica tutti gli altri
            if (isMaster) {
                document.getElementById('master-only-area').style.display = 'block';
                document.getElementById('label-miei').innerText = "Le Mie Matricole (Master)";
                
                const qUtenti = query(collection(db, "personaggi"), where("creatoDa", "!=", "MASTER"));
                const snapUtenti = await getDocs(qUtenti);
                renderGrid(snapUtenti, gridUtenti);
            }
        }

        function renderGrid(snap, target) {
            target.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                target.innerHTML += `
                    <div class="pg-card" onclick="alert('Apertura scheda: ${p.nome}')">
                        <img src="${p.immagine}">
                        <div class="info">
                            <div style="font-family:'Orbitron'; color:var(--neon-blue);">${p.nome}</div>
                            <div style="font-size:0.7rem; color:#666;">ID: ${p.creatoDa || '---'}</div>
                        </div>
                    </div>`;
            });
        }

        window.onload = loadArchive;
    </script>
</body>
</html>
