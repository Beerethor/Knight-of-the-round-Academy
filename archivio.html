<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Terminale Archivio v3.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-pink: #ff00ff; 
            --neon-yellow: #ffff00; 
            --bg-dark: #060608; 
            --panel-bg: rgba(17, 17, 22, 0.95);
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .nav-header { 
            padding: 15px 20px; 
            border-bottom: 2px solid var(--neon-blue); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
            flex-wrap: wrap; gap: 10px;
        }

        .btn-action { 
            background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); 
            padding: 8px 15px; font-family: 'Orbitron'; cursor: pointer; text-decoration: none; 
            font-size: 0.7rem; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .btn-action:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }

        .btn-support {
            background: rgba(255, 255, 0, 0.05); border: 1px solid var(--neon-yellow); color: var(--neon-yellow);
            padding: 8px 15px; font-family: 'Orbitron'; cursor: pointer; text-decoration: none;
            font-size: 0.7rem; transition: 0.3s; clip-path: polygon(0 0, 90% 0, 100% 100%, 10% 100%);
        }
        .btn-support:hover { background: var(--neon-yellow); color: black; box-shadow: 0 0 15px var(--neon-yellow); }

        .search-container { padding: 20px; background: rgba(12, 12, 15, 0.6); display: flex; justify-content: center; }
        .search-input { 
            width: 100%; max-width: 500px; background: rgba(0,0,0,0.7); 
            border: 1px solid var(--neon-blue); color: white; padding: 12px; 
            font-family: 'Rajdhani'; font-size: 1.1rem; outline: none;
        }

        .section-label { font-family: 'Orbitron'; color: var(--neon-pink); padding: 30px 20px 10px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;}
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 10px 20px; }
        
        .pg-card { 
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; transition: 0.4s; position: relative; overflow: hidden;
        }
        .pg-card:hover { border-color: var(--neon-blue); transform: translateY(-5px); }
        
        .pg-card img { 
            width: 100%; height: 200px; 
            object-fit: contain; 
            background: #000; 
            filter: brightness(0.8); 
            transition: 0.6s; 
        }
        .pg-card:hover img { filter: brightness(1.1); }
        
        .pg-card-info { padding: 15px; background: linear-gradient(to top, #000 80%, transparent); position: relative; margin-top: -40px; z-index: 2;}
        .pg-card-name { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 1.1rem; margin-bottom: 5px; }

        .btn-edit-small, .btn-delete-small {
            background: none; border: 1px solid; font-family: 'Orbitron'; font-size: 0.55rem; 
            padding: 4px 8px; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-edit-small { border-color: var(--neon-yellow); color: var(--neon-yellow); }
        .btn-delete-small { border-color: var(--neon-pink); color: var(--neon-pink); }
        .btn-edit-small:hover { background: var(--neon-yellow); color: black; }
        .btn-delete-small:hover { background: var(--neon-pink); color: white; }

        #viewer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; backdrop-filter: blur(10px); }
        .sheet-container { max-width: 1100px; margin: 20px auto; background: var(--panel-bg); border: 1px solid var(--neon-blue); display: grid; grid-template-columns: 350px 1fr; position: relative; }
        
        .side-img { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            background: #000;
            border-right: 1px solid var(--neon-blue); 
        }

        .main-sheet { padding: 25px; }
        .close-overlay { position: fixed; top: 15px; right: 15px; color: var(--neon-pink); cursor: pointer; font-family: 'Orbitron'; border: 1px solid var(--neon-pink); padding: 5px 10px; z-index: 1100; background: black; font-size: 0.8rem;}

        .data-box { background: rgba(255,255,255,0.03); border-left: 3px solid var(--neon-blue); padding: 15px; margin-bottom: 15px; }
        .data-box h3 { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--neon-pink); margin: 0 0 8px; letter-spacing: 1px; }
        .tech-tag { background: rgba(0, 242, 255, 0.05); border-left: 2px solid var(--neon-blue); padding: 6px; margin-bottom: 5px; font-size: 0.85rem; }
        .trait-pill { display: inline-block; padding: 3px 8px; border: 1px solid var(--neon-yellow); margin: 2px; font-size: 0.65rem; color: var(--neon-yellow); font-family: 'Orbitron'; }
        
        /* Label Speciali (Eredità/Mutazioni) */
        .special-label { font-size: 0.75rem; color: var(--neon-yellow); margin-top: 4px; border-bottom: 1px solid rgba(255,255,0,0.2); padding-bottom: 2px; }

        .limite-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 10px; }
        .limite-dot { height: 8px; background: #111; border: 1px solid #333; }
        .dot-filled { background: var(--neon-pink); box-shadow: 0 0 8px var(--neon-pink); border-color: white;}

        @media (max-width: 900px) {
            .sheet-container { grid-template-columns: 1fr; margin: 10px; }
            .side-img { height: 300px; border-right: none; border-bottom: 1px solid var(--neon-blue); }
            #v-nome { font-size: 2rem !important; }
        }

        #v-loader {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1001; flex-direction: column; justify-content: center; align-items: center;
        }
        .hack-bar-container { width: 200px; height: 3px; background: rgba(0,242,255,0.1); border: 1px solid var(--neon-blue); margin-top: 15px; }
        .hack-bar-fill { width: 0%; height: 100%; background: var(--neon-blue); transition: width 0.1s; }
    </style>
</head>
<body>

    <header class="nav-header">
        <div>
            <h1 style="color:var(--neon-blue); margin:0; font-size:1.1rem; letter-spacing: 1px;">KOTRA // ARCHIVIO</h1>
            <span id="role-display"></span>
        </div>
        <div class="nav-controls">
            <a id="support-link" href="#" class="btn-support" style="display:none;">AIUTO MODIFICA</a>
            <a href="index.html" class="btn-action">HUB</a>
            <a href="creatore.html" class="btn-action">+ REGISTRAZIONE</a>
            <button class="btn-action" id="btn-logout" style="border-color:var(--neon-pink); color:var(--neon-pink);">LOGOUT</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-bar" class="search-input" placeholder="Scansione database (nome, stirpe, job)..." oninput="filterArchive()">
    </div>

    <div id="master-view" style="display: none;">
        <div class="section-label">UNITÀ SOTTOPOSTE [ADMIN]</div>
        <div class="archive-grid" id="grid-utenti"></div>
    </div>

    <div class="section-label">LE MIE MATRICOLE</div>
    <div class="archive-grid" id="grid-personali"></div>

    <div id="viewer-overlay">
        <div id="v-loader">
            <div style="color:var(--neon-blue); font-family:'Orbitron'; font-size:0.7rem;">DECRYPTING...</div>
            <div class="hack-bar-container"><div id="v-hack-fill" class="hack-bar-fill"></div></div>
        </div>

        <span class="close-overlay" onclick="closeViewer()">CHIUDI [X]</span>
        <div class="sheet-container">
            <img id="v-img" class="side-img" src="">
            <div class="main-sheet">
                <div style="border-bottom: 1px solid var(--neon-blue); padding-bottom: 15px; margin-bottom: 15px;">
                    <h2 id="v-nome" style="font-family:'Orbitron'; font-size: 2.5rem; margin:0; color:var(--neon-blue);">---</h2>
                    <p id="v-motto" style="font-style:italic; color:var(--neon-yellow); margin: 5px 0 0; font-size: 1rem;"></p>
                </div>
                
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:20px;">
                    <div>
                        <div class="data-box" style="border-color: var(--neon-yellow);">
                            <h3>PROFILO SOCIALE & MOD</h3>
                            <div style="font-size:0.9rem;"><strong>CLUB:</strong> <span id="v-club" style="color:var(--neon-blue)"></span></div>
                            <div style="font-size:0.9rem;"><strong>DISTINTIVO:</strong> <span id="v-distintivo" style="color:var(--neon-blue)"></span></div>
                            <div id="v-extra-social"></div>
                        </div>
                        <div class="data-box">
                            <h3>STIRPE & EREDITÀ</h3>
                            <div id="v-stirpe" style="font-weight:bold; color:var(--neon-blue); font-family:'Orbitron'; margin-bottom:5px; font-size:0.8rem;"></div>
                            <div id="v-eredita-desc" style="font-size:0.85rem; line-height:1.4; color:#ccc;"></div>
                        </div>
                    </div>
                    <div>
                        <div class="data-box" style="border-color: var(--neon-pink);">
                            <h3>CORE SYNC</h3>
                            <div id="v-params" style="display:grid; grid-template-columns: 1fr 1fr; font-size:0.9rem; gap:8px; font-family:'Orbitron';"></div>
                            <div id="v-extra-core"></div>
                            <div id="v-limite-visual" style="margin-top:10px;"></div>
                        </div>
                        <div class="data-box">
                            <h3>CAPACITÀ & EQUIP</h3>
                            <div id="v-tecniche"></div>
                        </div>
                    </div>
                </div>
                <div class="data-box" style="border-left-color: var(--neon-yellow);">
                    <h3>TRATTI MEMETICI</h3>
                    <div id="v-tratti"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allChars = [], dbStirpi = [], dbClassi = [], isMasterGlobal = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const configSnap = await getDoc(doc(db, "config", "permissions"));
                let masterEmail = configSnap.exists() ? configSnap.data().masterEmail || "" : "";
                let supportEmail = configSnap.exists() ? configSnap.data().supportEmail || "" : "";

                if(supportEmail){
                    const sLink = document.getElementById('support-link');
                    sLink.href = `mailto:${supportEmail}?subject=Richiesta Supporto KOTRA&body=Utente: ${user.email}`;
                    sLink.style.display = 'inline-block';
                }

                isMasterGlobal = user.email.toLowerCase().trim() === masterEmail.toLowerCase().trim();
                document.getElementById('role-display').innerHTML = `<span style="font-family:'Orbitron'; font-size:0.55rem; padding:2px 6px; border:1px solid var(--neon-blue); color:var(--neon-blue); margin-left:10px;">${isMasterGlobal?'MASTER':'OPERATOR'}</span>`;

                try {
                    const [resS, resJ] = await Promise.all([fetch('stirpi_database.json'), fetch('classi_database.json')]);
                    dbStirpi = (await resS.json()).items;
                    dbClassi = (await resJ.json()).items;
                    const snap = await getDocs(collection(db, "personaggi"));
                    allChars = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderArchive(user.uid);
                } catch (e) { console.error(e); }
            } else { window.location.href = "index.html"; }
        });

        function renderArchive(uid, filter = "") {
            const gPers = document.getElementById('grid-personali');
            const gUtenti = document.getElementById('grid-utenti');
            gPers.innerHTML = ""; gUtenti.innerHTML = "";
            document.getElementById('master-view').style.display = isMasterGlobal ? 'block' : 'none';

            allChars.filter(c => c.nome.toLowerCase().includes(filter.toLowerCase())).forEach(p => {
                const card = document.createElement('div');
                card.className = 'pg-card';
                const isMio = (p.creatoDa === uid) || (isMasterGlobal && p.creatoDa === "MASTER");
                const jobLabel = p.secondoJob ? `${p.job} + ${p.secondoJob}` : p.job;

                card.innerHTML = `
                    <img src="${p.immagine || ''}">
                    <div class="pg-card-info">
                        <div class="pg-card-name">${p.nome}</div>
                        <div style="font-size:0.7rem; color:#888; font-family:'Orbitron'; text-transform:uppercase;">${p.stirpe} // ${jobLabel}</div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            ${isMasterGlobal ? `<button class="btn-delete-small" onclick="event.stopPropagation(); window.deleteChar('${p.id}', '${p.nome}')">EPURARE</button>` : ''}
                            ${(isMasterGlobal || isMio) ? `<button class="btn-edit-small" onclick="event.stopPropagation(); window.editChar('${p.id}')">EVOLVERE</button>` : ''}
                        </div>
                    </div>`;
                card.onclick = () => openViewer(p);
                isMio ? gPers.appendChild(card) : gUtenti.appendChild(card);
            });
        }

        window.openViewer = async (p) => {
            const overlay = document.getElementById('viewer-overlay');
            const loader = document.getElementById('v-loader');
            overlay.style.display = 'block';
            loader.style.display = 'flex';
            document.getElementById('v-hack-fill').style.width = "100%";

            // Eredità e Dati Database
            let ereditaDati = null;
            dbStirpi.forEach(s => { const found = s.eredita.find(e => e.nome === p.eredita); if(found) ereditaDati = found; });
            const jobDati = dbClassi.find(j => j.nome === p.job);
            const secondoJobDati = p.secondoJob ? dbClassi.find(j => j.nome === p.secondoJob) : null;
            const job2Dati = p.job2 ? dbClassi.find(j => j.nome === p.job2) : null;

            // Info Base
            document.getElementById('v-img').src = p.immagine || '';
            document.getElementById('v-nome').innerText = p.nome;
            document.getElementById('v-motto').innerText = p.motto || "";
            document.getElementById('v-club').innerText = p.club || "--";
            document.getElementById('v-distintivo').innerText = p.trattoDistintivo || "--";

            // Sezione Sociale (Frame e Mutazione)
            const extraSocial = document.getElementById('v-extra-social');
            extraSocial.innerHTML = "";
            if(p.frame2) extraSocial.innerHTML += `<div class="special-label">FRAME EREDITÀ: ${p.frame2}</div>`;
            if(p.mutazione) extraSocial.innerHTML += `<div class="special-label">MUTAZIONE: ${p.mutazione}</div>`;

            // Sezione Core (Core2 e Scintilla)
            const extraCore = document.getElementById('v-extra-core');
            extraCore.innerHTML = "";
            if(p.core2) extraCore.innerHTML += `<div class="special-label" style="color:var(--neon-pink)">CORE EREDITÀ: ${p.core2}</div>`;
            if(p.scintilla) extraCore.innerHTML += `<div class="special-label" style="color:var(--neon-pink)">SCINTILLA: ${p.scintilla}</div>`;

            // Stirpe Header
            let jobHeader = p.job;
            if(p.secondoJob) jobHeader += ` + ${p.secondoJob}`;
            if(p.job2) jobHeader += ` [Job Eredità: ${p.job2}]`;
            
            document.getElementById('v-stirpe').innerHTML = `
                <div style="color:var(--neon-pink)">${p.stirpe} > ${p.eredita}</div>
                <div style="font-size:0.65rem; color:var(--neon-yellow); margin-top:4px;">CONFIG: ${jobHeader}</div>`;
            document.getElementById('v-eredita-desc').innerHTML = `<p>${ereditaDati?.descrizione || ""}</p>` + (ereditaDati?.effetto ? `<div class="tech-tag" style="border-color:var(--neon-pink); color:var(--neon-yellow);">${ereditaDati.effetto}</div>` : "");

            // Stats e Sync
            const numMem = p.memorie?.length || 0;
            const totLim = Math.min(11 + (numMem * 3), 20);
            document.getElementById('v-params').innerHTML = `
                <div>ANIMA: ${p.anima}</div><div>CORE: ${p.core}</div>
                <div>DIFETTO: ${p.difetto}</div><div>NEMESI: ${p.nemesi}</div>`;
            
            let dots = `<div style="font-size:0.5rem; color:var(--neon-pink); margin-bottom:3px;">SYNC: ${totLim}/20</div><div class="limite-container">`;
            for(let i=0; i<20; i++) dots += `<div class="limite-dot ${i<totLim?'dot-filled':''}"></div>`;
            document.getElementById('v-limite-visual').innerHTML = dots + "</div>";

            // Tecniche
            const tBox = document.getElementById('v-tecniche'); tBox.innerHTML = "";
            jobDati?.tecniche?.forEach(t => tBox.innerHTML += `<div class="tech-tag"><strong>[${p.job}]</strong> ${t.nome}: ${t.effetto}</div>`);
            secondoJobDati?.tecniche?.forEach(t => tBox.innerHTML += `<div class="tech-tag" style="border-color:var(--neon-yellow)"><strong>[${p.secondoJob}]</strong> ${t.nome}: ${t.effetto}</div>`);
            
            // Logica Job Eredità (Job2)
            if(job2Dati) {
                job2Dati.tecniche?.forEach(t => tBox.innerHTML += `<div class="tech-tag" style="border-color:var(--neon-pink)"><strong>[JOB EREDITÀ]</strong> ${t.nome}: ${t.effetto}</div>`);
            }
            p.capacita?.forEach(c => tBox.innerHTML += `<div class="tech-tag" style="border-color:var(--neon-pink)">${c}</div>`);

            document.getElementById('v-tratti').innerHTML = p.tratti?.map(t => `<span class="trait-pill">${t}</span>`).join('') || '--';
            setTimeout(() => { loader.style.display = 'none'; }, 400);
        };

        window.closeViewer = () => document.getElementById('viewer-overlay').style.display = 'none';
        window.filterArchive = () => renderArchive(auth.currentUser.uid, document.getElementById('search-bar').value);
        window.editChar = (id) => { sessionStorage.setItem('updateModeId', id); window.location.href = 'aggiorna.html'; };
        window.deleteChar = async (id, nome) => { if(confirm(`ELIMINARE DEFINITIVAMENTE ${nome}?`)) { await deleteDoc(doc(db, "personaggi", id)); location.reload(); } };
        document.getElementById('btn-logout').onclick = () => signOut(auth);
    </script>
</body>
</html>
