<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Archivio Matricole</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; --bg-dark: #0a0a0c; }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; padding: 20px; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-nav { text-decoration: none; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid var(--neon-blue); padding: 8px 15px; transition: 0.3s; }
        .btn-nav:hover { background: var(--neon-blue); color: black; }

        h1 { font-family: 'Orbitron'; color: var(--neon-blue); text-transform: uppercase; margin: 0; letter-spacing: 2px; }

        /* Griglia Card */
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .pg-card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid #333; 
            border-radius: 4px; 
            overflow: hidden; 
            transition: 0.3s;
            position: relative;
        }
        .pg-card:hover { border-color: var(--neon-pink); transform: translateY(-5px); }
        
        .pg-thumb { 
            width: 100%; 
            height: 200px; 
            background: #000; 
            object-fit: cover; 
            object-position: center 20%; 
            border-bottom: 1px solid #333;
        }

        .pg-info { padding: 15px; }
        .pg-name { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 1.2rem; margin-bottom: 5px; }
        .pg-details { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }
        
        .card-actions { display: flex; gap: 10px; }
        .btn-action { 
            flex: 1; 
            padding: 8px; 
            font-family: 'Orbitron'; 
            font-size: 0.7rem; 
            cursor: pointer; 
            background: transparent; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-edit { border: 1px solid var(--neon-yellow); color: var(--neon-yellow); }
        .btn-edit:hover { background: var(--neon-yellow); color: black; }
        .btn-delete { border: 1px solid #ff4444; color: #ff4444; }
        .btn-delete:hover { background: #ff4444; color: white; }

        /* Stato Vuoto */
        #loading-status { text-align: center; font-family: 'Orbitron'; color: var(--neon-pink); margin-top: 50px; }
    </style>
</head>
<body>

    <header class="nav-header">
        <h1>Archivio Operativo</h1>
        <div style="display: flex; gap: 10px;">
            <a href="creatore.html" class="btn-nav">+ NUOVA MATRICOLA</a>
            <a href="index.html" class="btn-nav">HOME</a>
        </div>
    </header>

    <div id="loading-status">SINCRONIZZAZIONE CON IL CLOUD...</div>
    <div class="archive-grid" id="archive-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadArchive() {
            const grid = document.getElementById('archive-grid');
            const status = document.getElementById('loading-status');
            
            try {
                const querySnapshot = await getDocs(collection(db, "personaggi"));
                status.style.display = 'none';
                grid.innerHTML = "";

                if (querySnapshot.empty) {
                    status.style.display = 'block';
                    status.innerText = "NESSUNA MATRICOLA TROVATA NELL'ARCHIVIO.";
                    return;
                }

                querySnapshot.forEach((documento) => {
                    const data = documento.data();
                    const id = documento.id;
                    const img = data.immagine || 'https://via.placeholder.com/300x200?text=NO+VISUAL';

                    grid.innerHTML += `
                        <div class="pg-card" id="card-${id}">
                            <img src="${img}" class="pg-thumb" alt="${data.nome}">
                            <div class="pg-info">
                                <div class="pg-name">${data.nome}</div>
                                <div class="pg-details">
                                    ${data.stirpe} | ${data.job}<br>
                                    <em>"${data.motto || 'Nessun motto'}"</em>
                                </div>
                                <div class="card-actions">
                                    <button class="btn-action btn-edit" onclick="editPG('${id}')">Modifica</button>
                                    <button class="btn-action btn-delete" onclick="deletePG('${id}')">Elimina</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                status.innerText = "ERRORE DI CONNESSIONE.";
                console.error(e);
            }
        }

        window.deletePG = async (id) => {
            if(confirm("Sei sicuro di voler eliminare questa Matricola definitivamente?")) {
                try {
                    await deleteDoc(doc(db, "personaggi", id));
                    document.getElementById(`card-${id}`).remove();
                } catch (e) { alert("Errore durante l'eliminazione."); }
            }
        };

        window.editPG = (id) => {
            // Reindirizziamo al creatore passando l'ID come parametro nell'URL
            window.location.href = `creatore.html?edit=${id}`;
        };

        window.onload = loadArchive;
    </script>
</body>
</html>
