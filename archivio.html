<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Terminale Archivio v3.9</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; 
            --bg-dark: #060608; --panel-bg: rgba(17, 17, 22, 0.95);
        }

        * { box-sizing: border-box; }
        body { 
            background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; margin: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Scanline Overlay */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        .nav-header { padding: 15px 20px; border-bottom: 2px solid var(--neon-blue); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); }
        .btn-action { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px 15px; font-family: 'Orbitron'; cursor: pointer; text-decoration: none; font-size: 0.7rem; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
        .btn-action:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }

        /* Griglia Card */
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .pg-card { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.4s; position: relative; overflow: hidden; }
        .pg-card img { width: 100%; height: 220px; object-fit: cover; object-position: center 20%; filter: brightness(0.7); transition: 0.5s; }
        .pg-card:hover img { filter: brightness(1); transform: scale(1.05); }
        .pg-card-info { padding: 15px; background: linear-gradient(to top, #000 85%, transparent); position: relative; margin-top: -50px; z-index: 2; }

        /* Viewer Overlay */
        #viewer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; backdrop-filter: blur(10px); }
        .sheet-container { max-width: 1100px; margin: 20px auto; background: var(--panel-bg); border: 1px solid var(--neon-blue); display: grid; grid-template-columns: 380px 1fr; }
        .side-img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; border-right: 1px solid var(--neon-blue); }
        .main-sheet { padding: 30px; }

        /* Tratti come Pills */
        .trait-pill { display: inline-block; padding: 4px 12px; border: 1px solid var(--neon-yellow); margin: 3px; font-size: 0.75rem; color: var(--neon-yellow); font-family: 'Orbitron'; text-transform: uppercase; background: rgba(255,255,0,0.05); }
        .data-box { background: rgba(255,255,255,0.02); border-left: 3px solid var(--neon-blue); padding: 15px; margin-bottom: 20px; }
        .data-box h3 { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-pink); margin: 0 0 12px; letter-spacing: 2px; }
        .tech-tag { background: rgba(0, 242, 255, 0.05); border-left: 2px solid var(--neon-blue); padding: 10px; margin-bottom: 8px; font-size: 0.85rem; line-height: 1.4; border-radius: 0 4px 4px 0; }

        /* Punti Sync */
        .limite-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 10px; }
        .limite-dot { height: 10px; background: #111; border: 1px solid #333; }
        .dot-filled { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); border-color: white; }
    </style>
</head>
<body>

    <header class="nav-header">
        <h1 style="color:var(--neon-blue); margin:0; font-size:1.2rem; font-family:'Orbitron';">KOTRA // ARCHIVE_v3.9</h1>
        <div id="role-display" style="font-size:0.7rem; font-family:'Orbitron';">AUTHENTICATING...</div>
        <div class="nav-controls">
            <a href="creatore.html" class="btn-action">+ REGISTRA_UNITÀ</a>
            <button class="btn-action" id="btn-logout" style="border-color:var(--neon-pink); color:var(--neon-pink);">LOGOUT</button>
        </div>
    </header>

    <div style="padding: 20px; background: rgba(0,0,0,0.4); border-bottom: 1px solid #222;">
        <input type="text" id="search-bar" style="width:100%; background:#000; border:1px solid var(--neon-blue); color:white; padding:15px; font-family:'Rajdhani'; font-size:1.1rem;" placeholder="SCANSIONE DATABASE PER NOME O STIRPE..." oninput="filterArchive()">
    </div>

    <div class="archive-grid" id="grid-main"></div>

    <div id="viewer-overlay">
        <button onclick="closeViewer()" style="position:fixed; top:20px; right:20px; background:black; color:var(--neon-pink); border:1px solid var(--neon-pink); padding:10px; cursor:pointer; z-index:1100; font-family:'Orbitron';">CHIUDI_TERMINALE [X]</button>
        <div class="sheet-container">
            <img id="v-img" class="side-img">
            <div class="main-sheet">
                <div style="border-bottom: 2px solid var(--neon-blue); padding-bottom: 20px; margin-bottom: 25px;">
                    <h2 id="v-nome" style="font-family:'Orbitron'; font-size: 3rem; margin:0; color:var(--neon-blue); text-transform:uppercase;">---</h2>
                    <div id="v-primary-traits" style="margin-top:15px;"></div>
                </div>

                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:25px;">
                    <div>
                        <div id="v-special-box"></div> <div class="data-box">
                            <h3>[01] EREDITÀ_ATTIVA</h3>
                            <div id="v-eredita-nome" style="font-family:'Orbitron'; color:var(--neon-blue); font-size:1.1rem; margin-bottom:5px;">--</div>
                            <div id="v-eredita-desc" style="font-size:0.9rem; color:#ccc;">--</div>
                        </div>
                    </div>
                    <div>
                        <div class="data-box" style="border-color: var(--neon-pink);">
                            <h3>[02] SINCRONIZZAZIONE_CORE</h3>
                            <div id="v-stats" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-family:'Orbitron'; font-size:0.8rem; margin-bottom:15px;"></div>
                            <div id="v-sync-bar"></div>
                        </div>
                        <div class="data-box">
                            <h3>[03] MODULI_OPERATIVI (TECNICHE)</h3>
                            <div id="v-tech-list"></div>
                        </div>
                    </div>
                </div>
                <div class="data-box" style="border-left-color:var(--neon-yellow);">
                    <h3>[04] DATABASE_TRATTI_MEMETICI</h3>
                    <div id="v-memetic-traits"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allChars = [], dbStirpi = [], dbClassi = [], isMaster = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const configSnap = await getDoc(doc(db, "config", "permissions"));
                isMaster = user.email.toLowerCase() === (configSnap.exists() ? configSnap.data().masterEmail.toLowerCase() : "");
                document.getElementById('role-display').innerText = isMaster ? "MASTER_ACCESS" : "OPERATOR_ACCESS";
                
                const [resS, resJ] = await Promise.all([fetch('stirpi_database.json'), fetch('classi_database.json')]);
                dbStirpi = (await resS.json()).items;
                dbClassi = (await resJ.json()).items;
                
                const snap = await getDocs(collection(db, "personaggi"));
                allChars = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderArchive();
            } else { window.location.href = "index.html"; }
        });

        window.renderArchive = (filter = "") => {
            const grid = document.getElementById('grid-main');
            grid.innerHTML = "";
            allChars.filter(c => c.nome.toLowerCase().includes(filter.toLowerCase()) || c.stirpe.toLowerCase().includes(filter.toLowerCase()))
            .forEach(p => {
                const card = document.createElement('div');
                card.className = 'pg-card';
                card.innerHTML = `
                    <img src="${p.immagine || ''}">
                    <div class="pg-card-info">
                        <div style="color:var(--neon-blue); font-family:'Orbitron'; font-size:1.1rem;">${p.nome}</div>
                        <div style="font-size:0.6rem; color:#888; margin-top:4px;">${p.stirpe.toUpperCase()} // ${p.job.toUpperCase()}</div>
                    </div>`;
                card.onclick = () => openViewer(p);
                grid.appendChild(card);
            });
        };

        window.openViewer = (p) => {
            document.getElementById('viewer-overlay').style.display = 'block';
            document.getElementById('v-img').src = p.immagine || '';
            document.getElementById('v-nome').innerText = p.nome;

            // 1. TRATTI PRIMARI (Stirpe e Job separati e visibili)
            let traitsHTML = `<span class="trait-pill" style="border-color:var(--neon-blue); color:var(--neon-blue);">STIRPE: ${p.stirpe}</span>`;
            traitsHTML += `<span class="trait-pill" style="border-color:var(--neon-pink); color:var(--neon-pink);">JOB: ${p.job}</span>`;
            if(p.specialData?.job2) traitsHTML += `<span class="trait-pill">EXTRA_JOB: ${p.specialData.job2}</span>`;
            document.getElementById('v-primary-traits').innerHTML = traitsHTML;

            // 2. LOGICA TECNICHE (Job 1 + Job 2)
            const tList = document.getElementById('v-tech-list');
            tList.innerHTML = "";
            const j1 = dbClassi.find(j => j.nome === p.job);
            j1?.tecniche?.forEach(t => tList.innerHTML += `<div class="tech-tag"><strong>${t.nome}:</strong> ${t.effetto}</div>`);
            
            if(p.specialData?.job2) {
                const j2 = dbClassi.find(j => j.nome === p.specialData.job2);
                j2?.tecniche?.forEach(t => tList.innerHTML += `<div class="tech-tag" style="border-left-color:var(--neon-yellow); background:rgba(255,255,0,0.05);"><strong>[EXTRA] ${t.nome}:</strong> ${t.effetto}</div>`);
            }

            // 3. EREDITÀ
            let ereditaObj = null;
            dbStirpi.forEach(s => { const e = s.eredita.find(er => er.nome === p.eredita); if(e) ereditaObj = e; });
            document.getElementById('v-eredita-nome').innerText = p.eredita;
            document.getElementById('v-eredita-desc').innerHTML = (ereditaObj?.descrizione || "") + 
                (ereditaObj?.effetto ? `<div class="tech-tag" style="border-color:var(--neon-pink); color:var(--neon-yellow); margin-top:10px;">${ereditaObj.effetto}</div>` : "");

            // 4. MODULI SPECIALI (Mutazioni, Scintilla, Core 2)
            const sBox = document.getElementById('v-special-box');
            sBox.innerHTML = "";
            if(p.specialData) {
                let sHTML = "";
                if(p.specialData.mutazione) sHTML += `<div class="tech-tag" style="border-color:var(--neon-pink)">MUTAZIONE: ${p.specialData.mutazione}</div>`;
                if(p.specialData.scintilla) sHTML += `<div class="tech-tag" style="border-color:var(--neon-blue)">SCINTILLA: ${p.specialData.scintilla}</div>`;
                if(p.specialData.core2) sHTML += `<div class="tech-tag">CORE_LINK_SEC: ${p.specialData.core2}</div>`;
                if(sHTML) sBox.innerHTML = `<div class="data-box" style="border-left-color:var(--neon-yellow);"><h3>[!] ANOMALIE_RILEVATE</h3>${sHTML}</div>`;
            }

            // 5. SYNC BAR
            const totTratti = 11 + (p.tratti?.length || 0);
            document.getElementById('v-stats').innerHTML = `<div>CORE: ${p.core}</div><div>ANIMA: ${p.anima}</div><div>NEMESI: ${p.nemesi}</div><div>DIFETTO: ${p.difetto}</div>`;
            let bar = `<div style="font-size:0.6rem; color:var(--neon-pink); margin-bottom:5px;">SYNC_STABILITY: ${totTratti}/20</div><div class="limite-container">`;
            for(let i=0; i<20; i++) bar += `<div class="limite-dot ${i<totTratti?'dot-filled':''}"></div>`;
            document.getElementById('v-sync-bar').innerHTML = bar + `</div>`;

            // 6. TRATTI MEMETICI
            document.getElementById('v-memetic-traits').innerHTML = p.tratti?.map(t => `<span class="trait-pill">${t}</span>`).join('') || '--';
        };

        window.closeViewer = () => document.getElementById('viewer-overlay').style.display = 'none';
        window.filterArchive = () => renderArchive(document.getElementById('search-bar').value);
        document.getElementById('btn-logout').onclick = () => signOut(auth);
    </script>
</body>
</html>
