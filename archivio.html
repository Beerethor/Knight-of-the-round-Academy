<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Terminale Archivio v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; 
            --bg-dark: #060608; --panel-bg: rgba(17, 17, 22, 0.95);
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; margin: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        body::before {
            content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; pointer-events: none; background-size: 100% 4px, 3px 100%;
        }

        /* Nav & Grid */
        .nav-header { padding: 15px 20px; border-bottom: 2px solid var(--neon-blue); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top:0; z-index:100; }
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .pg-card { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.4s; position: relative; }
        .pg-card img { width: 100%; height: 200px; object-fit: contain; background: #000; filter: brightness(0.8); transition: 0.6s; }
        .pg-card:hover { border-color: var(--neon-blue); transform: translateY(-5px); }
        .pg-card-info { padding: 12px; background: #000; border-top: 1px solid rgba(0, 242, 255, 0.3); }

        /* Tratti e Chip */
        .data-chip { display: inline-block; padding: 5px 12px; margin: 4px 4px 4px 0; border: 1px solid var(--neon-blue); background: rgba(0, 242, 255, 0.05); font-family: 'Orbitron'; font-size: 0.65rem; color: var(--neon-blue); clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); text-transform: uppercase; }
        .data-chip.job { border-color: var(--neon-pink); color: var(--neon-pink); }
        .data-chip.job-3 { border-color: #00ff88; color: #00ff88; }
        .data-chip.special { border-color: var(--neon-yellow); color: var(--neon-yellow); }

        /* Stats */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-block { text-align: center; border: 1px solid #333; padding: 10px; background: rgba(0,0,0,0.4); }
        .stat-value { display: block; font-size: 1.2rem; color: var(--neon-pink); font-family: 'Orbitron'; }
        .stat-label { font-size: 0.55rem; color: #888; letter-spacing: 1px; text-transform: uppercase; }
        .stat-block.highlight { border-color: var(--neon-yellow); background: rgba(255, 255, 0, 0.05); }

        /* Viewer Overlay */
        #viewer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; backdrop-filter: blur(10px); }
        .sheet-container { max-width: 1250px; margin: 20px auto; background: var(--panel-bg); border: 1px solid var(--neon-blue); display: grid; grid-template-columns: 380px 1fr; }
        .side-img { width: 100%; height: 100%; object-fit: contain; background: #000; border-right: 1px solid var(--neon-blue); }
        .main-sheet { padding: 25px; }

        .data-box { background: rgba(255,255,255,0.02); border-left: 3px solid var(--neon-blue); padding: 15px; margin-bottom: 20px; }
        .data-box h3 { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--neon-pink); margin: 0 0 12px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid rgba(255,0,255,0.2); padding-bottom: 5px; }
        
        .item-tag { background: rgba(0, 242, 255, 0.05); border-left: 2px solid var(--neon-blue); padding: 8px; margin-bottom: 5px; font-size: 0.8rem; line-height: 1.3; }
        .item-tag.yellow { border-left-color: var(--neon-yellow); }

        /* Sync Bar */
        .limite-container { display: grid; grid-template-columns: repeat(20, 1fr); gap: 4px; margin-top: 8px; }
        .limite-dot { height: 12px; background: #111; border: 1px solid #333; }
        .dot-filled { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        /* Affinity Link Style */
        .affinity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .affinity-link { background: rgba(0,0,0,0.6); border: 1px solid var(--neon-blue); padding: 4px; font-size: 0.7rem; color: var(--neon-blue); text-align: center; font-family: 'Orbitron'; }

        .btn-action { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 6px 12px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.6rem; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); text-decoration: none; display: inline-block; }
        .btn-action:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 10px var(--neon-blue); }

        @media (max-width: 1000px) { .sheet-container { grid-template-columns: 1fr; margin: 10px; } .side-img { height: 400px; border-right: none; border-bottom: 1px solid var(--neon-blue); } }
    </style>
</head>
<body>

    <header class="nav-header">
        <h1 style="color:var(--neon-blue); margin:0; font-size:1rem; font-family:'Orbitron';">KOTRA // ARCHIVE_v5.0</h1>
        <div id="role-display" style="font-size:0.6rem; color:var(--neon-yellow); font-family:'Orbitron';">AUTHENTICATING...</div>
        <div class="nav-controls">
            <a href="creatore.html" class="btn-action">+ REGISTRA_UNITÀ</a>
            <button class="btn-action" id="btn-logout" style="border-color:var(--neon-pink); color:var(--neon-pink);">LOGOUT</button>
        </div>
    </header>

    <div id="grid-master"></div>
    <div id="grid-users"></div>

    <div id="viewer-overlay">
        <button onclick="closeViewer()" style="position:fixed; top:20px; right:20px; background:black; color:var(--neon-pink); border:1px solid var(--neon-pink); padding:10px; cursor:pointer; z-index:1100; font-family:'Orbitron';">CLOSE_X</button>
        <div class="sheet-container">
            <img id="v-img" class="side-img">
            <div class="main-sheet">
                <div style="border-bottom: 2px solid var(--neon-blue); padding-bottom: 15px; margin-bottom: 20px;">
                    <h2 id="v-nome" style="font-family:'Orbitron'; font-size: 2.5rem; margin:0; color:var(--neon-blue);">---</h2>
                    <div id="v-primary-chips" style="margin-top:10px;"></div>
                </div>

                <div class="stat-grid" id="v-stats-grid"></div>

                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap:20px;">
                    <div>
                        <div class="data-box" style="border-left-color: var(--neon-pink);">
                            <h3>[ IDENTITY_PERSONALIZATION ]</h3>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                <div>
                                    <div class="stat-label">UNIFORME_STYLE</div>
                                    <div id="v-uniforme" class="item-tag" style="font-size: 0.7rem;"></div>
                                    <div class="stat-label" style="margin-top:10px;">FAZIONE_CLUB</div>
                                    <div id="v-fazione" class="item-tag" style="border-color: var(--neon-blue);"></div>
                                </div>
                                <div>
                                    <div class="stat-label">DISTINCTIVE_MARK</div>
                                    <div id="v-segno" class="item-tag" style="font-size: 0.7rem;"></div>
                                    <div class="stat-label" style="margin-top:10px;">AFFINITY_LINKS</div>
                                    <div id="v-links" class="affinity-grid"></div>
                                </div>
                            </div>
                        </div>

                        <div class="data-box">
                            <h3>EREDITÀ & ANOMALIE</h3>
                            <div id="v-anomalie-tags"></div>
                            <div id="v-eredita-box"></div>
                            <div id="v-anomalia-extra"></div>
                        </div>

                        <div class="data-box" style="border-color: var(--neon-yellow);">
                            <h3>ARCHIVIO MEMORIE</h3>
                            <div id="v-memorie-list"></div>
                        </div>
                    </div>

                    <div>
                        <div class="data-box">
                            <h3>MODULI OPERATIVI (CAPACITÀ)</h3>
                            <div id="v-tech-list"></div>
                        </div>
                        <div class="data-box" style="border-left-color: var(--neon-pink);">
                            <h3>EQUIPAGGIAMENTO & OGGETTI</h3>
                            <div id="v-oggetti-list"></div>
                        </div>
                    </div>
                </div>

                <div class="data-box" style="border-color: var(--neon-pink);">
                    <h3>STATO SINCRONIZZAZIONE CORE (MAX_LIMIT: 20)</h3>
                    <div id="v-sync-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Config (Invariata)
        const firebaseConfig = { apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y", authDomain: "kotra-8da26.firebaseapp.com", projectId: "kotra-8da26", storageBucket: "kotra-8da26.firebasestorage.app", messagingSenderId: "932848394064", appId: "1:932848394064:web:d368c9ae301b54bab01655" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allChars = [], dbStirpi = [], dbClassi = [], isMaster = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const configSnap = await getDoc(doc(db, "config", "permissions"));
                isMaster = user.email.toLowerCase() === (configSnap.exists() ? configSnap.data().masterEmail.toLowerCase() : "");
                document.getElementById('role-display').innerText = isMaster ? "SYS_ADMIN_ACTIVE" : "OPERATOR_SYNCED";
                const [resS, resJ] = await Promise.all([fetch('stirpi_database.json'), fetch('classi_database.json')]);
                dbStirpi = (await resS.json()).items;
                dbClassi = (await resJ.json()).items;
                const snap = await getDocs(collection(db, "personaggi"));
                allChars = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderArchive();
            } else { window.location.href = "index.html"; }
        });

        window.renderArchive = () => {
            const gridMaster = document.getElementById('grid-master');
            const gridUsers = document.getElementById('grid-users');
            gridMaster.innerHTML = ""; gridUsers.innerHTML = "";
            allChars.forEach(p => {
                const card = document.createElement('div');
                card.className = 'pg-card';
                card.innerHTML = `<img src="${p.immagine || ''}"><div class="pg-card-info"><div style="color:var(--neon-blue); font-family:'Orbitron'; font-size:0.9rem;">${p.nome.toUpperCase()}</div><div style="font-size:0.6rem; color:#888;">${p.stirpe} // ${p.job}</div></div>`;
                card.onclick = () => openViewer(p);
                (p.creatoDa === 'MASTER' ? gridMaster : gridUsers).appendChild(card);
            });
        };

        window.openViewer = (p) => {
            document.getElementById('viewer-overlay').style.display = 'block';
            document.getElementById('v-img').src = p.immagine || '';
            document.getElementById('v-nome').innerText = p.nome;

            // 1. CHIPS
            let chipHtml = `<span class="data-chip">${p.stirpe}</span><span class="data-chip job">${p.job}</span>`;
            if(p.specialData?.job2) chipHtml += `<span class="data-chip job">SEC: ${p.specialData.job2}</span>`;
            if(p.specialData?.talentoNaturale && p.specialData?.job3) chipHtml += `<span class="data-chip job-3">NATURAL: ${p.specialData.job3}</span>`;
            document.getElementById('v-primary-chips').innerHTML = chipHtml;

            // 2. STATS GRID DINAMICA
            const stats = [{l:'ANIMA', v:p.anima}];
            if(p.specialData?.senzaCore) stats.push({l:'SCINTILLA', v: p.specialData.scintilla || 'NON_DEF', highlight: true});
            else stats.push({l:'CORE', v: p.core});
            if(p.specialData?.doppioCore) stats.push({l:'CORE_SEC', v: p.specialData.coreSecondario || 'SYNC_ERR', highlight: true});
            stats.push({l:'DIFETTO', v:p.difetto}, {l:'NEMESI', v:p.nemesi});
            document.getElementById('v-stats-grid').innerHTML = stats.map(s => `<div class="stat-block ${s.highlight ? 'highlight' : ''}"><span class="stat-label">${s.l}</span><span class="stat-value" style="${s.highlight ? 'color:var(--neon-yellow)' : ''}">${s.v}</span></div>`).join('');

            // 3. IDENTITY PERSONALIZATION
            document.getElementById('v-uniforme').innerText = p.uniforme || 'Standard Frame';
            document.getElementById('v-fazione').innerText = p.fazione || 'Indipendente';
            document.getElementById('v-segno').innerText = p.segnoDistintivo || 'Nessuno';
            document.getElementById('v-links').innerHTML = `<div class="affinity-link">${p.link01 || 'Empty_Slot'}</div><div class="affinity-link">${p.link02 || 'Empty_Slot'}</div>`;

            // 4. ANOMALIE & EREDITA'
            const anoTags = document.getElementById('v-anomalie-tags');
            const extraBox = document.getElementById('v-anomalia-extra');
            anoTags.innerHTML = ""; extraBox.innerHTML = "";
            if(p.specialData) {
                if(p.specialData.doppioCore) anoTags.innerHTML += `<span class="data-chip special">DOPPIO CORE</span>`;
                if(p.specialData.mutante) {
                    anoTags.innerHTML += `<span class="data-chip special">MUTANTE</span>`;
                    extraBox.innerHTML += `<div class="item-tag yellow"><strong>MUTAZIONE:</strong> ${p.specialData.mutazione}</div>`;
                }
                if(p.specialData.hybridFrame) {
                    anoTags.innerHTML += `<span class="data-chip special">HYBRID FRAME</span>`;
                    extraBox.innerHTML += `<div class="item-tag yellow"><strong>FRAME_AGGIUNTIVO:</strong> ${p.specialData.frameSecondario}</div>`;
                }
                if(p.specialData.talentoNaturale) anoTags.innerHTML += `<span class="data-chip special">TALENTO NATURALE</span>`;
                if(p.specialData.senzaCore) anoTags.innerHTML += `<span class="data-chip special" style="border-color:red; color:red;">SENZA CORE</span>`;
            }
            let erObj = null;
            dbStirpi.forEach(s => { const e = s.eredita.find(er => er.nome === p.eredita); if(e) erObj = e; });
            document.getElementById('v-eredita-box').innerHTML = `<div class="item-tag"><strong>${p.eredita}:</strong> ${erObj?.descrizione || ''}</div>`;

            // 5. MEMORIE, TECNICHE, OGGETTI
            document.getElementById('v-memorie-list').innerHTML = p.memorie?.map(m => `<div class="item-tag yellow"><strong>MEMORIA:</strong> ${m.testo || m}</div>`).join('') || '<div class="stat-label">ARCHIVIO VUOTO</div>';
            
            const techList = document.getElementById('v-tech-list');
            techList.innerHTML = "";
            [p.job, p.specialData?.job2, (p.specialData?.talentoNaturale ? p.specialData?.job3 : null)].forEach(jobName => {
                if(jobName) {
                    const jd = dbClassi.find(j => j.nome === jobName);
                    jd?.tecniche?.forEach(t => techList.innerHTML += `<div class="item-tag"><strong>[${jobName}] ${t.nome}:</strong> ${t.effetto}</div>`);
                }
            });
            p.capacita?.forEach(c => techList.innerHTML += `<div class="item-tag" style="border-color:var(--neon-pink)">${c}</div>`);
            document.getElementById('v-oggetti-list').innerHTML = p.oggetti?.map(o => `<div class="item-tag" style="border-color:var(--neon-yellow)">[EQUIP] ${o}</div>`).join('') || '<div class="stat-label">NESSUN OGGETTO</div>';

            // 6. CALCOLO SYNC LEVEL (CAP 20)
            const memCount = p.memorie?.length || 0;
            let syncVal = 11 + (memCount * 3);
            if(syncVal > 20) syncVal = 20; // Hard Cap a 20

            let bar = `<div style="font-family:'Orbitron'; font-size:0.7rem; color:var(--neon-pink); margin-bottom:5px;">SYNC_LEVEL: ${syncVal}/20</div><div class="limite-container">`;
            for(let i=0; i<20; i++) bar += `<div class="limite-dot ${i<syncVal?'dot-filled':''}"></div>`;
            document.getElementById('v-sync-bar').innerHTML = bar + `</div>`;
        };

        window.closeViewer = () => document.getElementById('viewer-overlay').style.display = 'none';
        document.getElementById('btn-logout').onclick = () => signOut(auth);
    </script>
</body>
</html>
