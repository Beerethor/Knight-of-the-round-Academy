<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Terminale Archivio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-pink: #ff00ff; 
            --neon-yellow: #ffff00; 
            --bg-dark: #060608; 
            --panel-bg: rgba(17, 17, 22, 0.95);
        }

        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Navigazione */
        .nav-header { 
            padding: 20px 40px; 
            border-bottom: 2px solid var(--neon-blue); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        .btn-action { 
            background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); 
            padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; text-decoration: none; 
            font-size: 0.75rem; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .btn-action:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }

        /* Ricerca */
        .search-container { padding: 20px 40px; background: rgba(12, 12, 15, 0.6); }
        .search-input { 
            width: 100%; max-width: 500px; background: rgba(0,0,0,0.7); 
            border: 1px solid var(--neon-blue); color: white; padding: 12px; 
            font-family: 'Rajdhani'; font-size: 1.1rem; outline: none;
        }

        /* Griglia Card */
        .section-label { font-family: 'Orbitron'; color: var(--neon-pink); padding: 40px 40px 10px; font-size: 0.9rem; letter-spacing: 3px; }
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px 40px; }
        
        .pg-card { 
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; transition: 0.4s; position: relative; overflow: hidden;
        }
        .pg-card:hover { border-color: var(--neon-blue); transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0, 242, 255, 0.2); }
        .pg-card img { width: 100%; height: 200px; object-fit: cover; filter: grayscale(50%); transition: 0.5s; }
        .pg-card:hover img { filter: grayscale(0%); transform: scale(1.05); }
        .pg-card-info { padding: 20px; background: linear-gradient(to top, #000, transparent); }
        .pg-card-name { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 1.2rem; }

        /* Loader Hacking */
        #v-loader {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1001; flex-direction: column; justify-content: center; align-items: center;
        }
        .hack-bar-container { width: 300px; height: 4px; background: rgba(0,242,255,0.1); border: 1px solid var(--neon-blue); margin-top: 20px; }
        .hack-bar-fill { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .hack-text { color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.8rem; animation: glitch 1s infinite; }

        /* Viewer Overlay */
        #viewer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; backdrop-filter: blur(10px); }
        .sheet-container { max-width: 1200px; margin: 40px auto; background: var(--panel-bg); border: 1px solid var(--neon-blue); display: grid; grid-template-columns: 380px 1fr; position: relative; }
        .side-img { width: 100%; height: 100%; object-fit: cover; border-right: 1px solid var(--neon-blue); }
        .main-sheet { padding: 40px; }
        .close-overlay { position: fixed; top: 20px; right: 20px; color: var(--neon-pink); cursor: pointer; font-family: 'Orbitron'; border: 1px solid var(--neon-pink); padding: 8px 15px; z-index: 1100; background: black;}

        .data-box { background: rgba(255,255,255,0.03); border-left: 4px solid var(--neon-blue); padding: 20px; margin-bottom: 20px; }
        .data-box h3 { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--neon-pink); margin: 0 0 10px; letter-spacing: 2px; }
        .tech-tag { background: rgba(0, 242, 255, 0.05); border-left: 2px solid var(--neon-blue); padding: 8px; margin-bottom: 5px; font-size: 0.9rem; }
        .trait-pill { display: inline-block; padding: 4px 10px; border: 1px solid var(--neon-yellow); margin: 3px; font-size: 0.7rem; color: var(--neon-yellow); font-family: 'Orbitron'; }

        /* Punti Limite */
        .limite-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 10px; }
        .limite-dot { height: 10px; background: #111; border: 1px solid #333; }
        .dot-filled { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        @keyframes glitch { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @media (max-width: 900px) { .sheet-container { grid-template-columns: 1fr; } .side-img { height: 300px; } }
    </style>
</head>
<body>

    <header class="nav-header">
        <div>
            <h1 style="font-family:'Orbitron'; color:var(--neon-blue); display:inline-block; margin:0; font-size:1.3rem;">KOTRA // ARCHIVIO</h1>
            <span id="role-display"></span>
        </div>
        <div class="nav-controls">
            <a href="index.html" class="btn-action">HUB</a>
            <a href="creatore.html" class="btn-action">+ REGISTRAZIONE</a>
            <button class="btn-action" id="btn-logout" style="border-color:var(--neon-pink); color:var(--neon-pink);">LOGOUT</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-bar" class="search-input" placeholder="Scansione database (nome, stirpe, job)..." oninput="filterArchive()">
    </div>

    <div id="master-view" style="display: none;">
        <div class="section-label">UNITÀ SOTTOPOSTE</div>
        <div class="archive-grid" id="grid-utenti"></div>
    </div>

    <div class="section-label">LE MIE MATRICOLE</div>
    <div class="archive-grid" id="grid-personali"></div>

    <div id="viewer-overlay">
        <div id="v-loader">
            <div class="hack-text">DECRYPTING NEURAL LINK...</div>
            <div class="hack-bar-container"><div id="v-hack-fill" class="hack-bar-fill"></div></div>
            <div id="v-hack-status" style="font-size: 0.6rem; color: var(--neon-pink); margin-top: 10px; font-family:'Orbitron';">[ ACCESSING... ]</div>
        </div>

        <span class="close-overlay" onclick="closeViewer()">CHIUDI [X]</span>
        <div class="sheet-container">
            <img id="v-img" class="side-img" src="">
            <div class="main-sheet">
                <div style="border-bottom: 1px solid var(--neon-blue); padding-bottom: 20px; margin-bottom: 20px; position: relative;">
                    <h2 id="v-nome" style="font-family:'Orbitron'; font-size: 3rem; margin:0; color:var(--neon-blue);">---</h2>
                    <p id="v-motto" style="font-style:italic; color:var(--neon-yellow); margin-top: 5px; font-size: 1.1rem;">"---"</p>
                    <button id="v-btn-edit" class="btn-action" style="position:absolute; top:0; right:0; border-color: var(--neon-yellow); color: var(--neon-yellow);">EVOLVI</button>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
                    <div>
                        <div class="data-box" style="border-color: var(--neon-yellow);">
                            <h3>PROFILO SOCIALE</h3>
                            <div style="font-size:0.9rem;"><strong>CLUB:</strong> <span id="v-club" style="color:var(--neon-blue)">--</span></div>
                            <div style="font-size:0.9rem;"><strong>DISTINTIVO:</strong> <span id="v-distintivo" style="color:var(--neon-blue)">--</span></div>
                            <div id="v-uniforme" style="font-size:0.8rem; color:#888; margin-top:10px;">--</div>
                        </div>
                        <div class="data-box">
                            <h3>STIRPE & EREDITÀ</h3>
                            <div id="v-stirpe" style="font-weight:bold; color:var(--neon-blue); font-family:'Orbitron'; margin-bottom:5px;">--</div>
                            <div id="v-eredita-desc" style="font-size:0.85rem;"></div>
                        </div>
                        <div class="data-box">
                            <h3>OPERATIVITÀ JOB</h3>
                            <div id="v-job" style="font-weight:bold; color:var(--neon-blue); font-family:'Orbitron'; margin-bottom:5px;">--</div>
                            <div id="v-job-desc" style="font-size:0.85rem;"></div>
                        </div>
                    </div>
                    <div>
                        <div class="data-box" style="border-color: var(--neon-pink);">
                            <h3>CORE SYNC</h3>
                            <div id="v-params" style="display:grid; grid-template-columns: 1fr 1fr; font-size:0.9rem; gap:5px;"></div>
                            <div id="v-limite-visual"></div>
                        </div>
                        <div class="data-box">
                            <h3>CAPACITÀ ATTIVE</h3>
                            <div id="v-tecniche"></div>
                        </div>
                        <div class="data-box">
                            <h3>MEMORIE</h3>
                            <div id="v-memorie-box" style="font-size:0.85rem;"></div>
                        </div>
                    </div>
                </div>
                <div class="data-box" style="border-left-color: var(--neon-yellow);">
                    <h3>TRATTI MEMETICI</h3>
                    <div id="v-tratti"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allChars = [], dbStirpi = [], dbClassi = [], isMasterGlobal = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const configSnap = await getDoc(doc(db, "config", "permissions"));
                const masterEmail = configSnap.exists() ? configSnap.data().masterEmail : "";
                isMasterGlobal = user.email.toLowerCase().trim() === masterEmail.toLowerCase().trim();
                
                document.getElementById('role-display').innerHTML = `<span style="font-family:'Orbitron'; font-size:0.6rem; padding:2px 8px; border:1px solid ${isMasterGlobal?'var(--neon-pink)':'var(--neon-blue)'}; color:${isMasterGlobal?'var(--neon-pink)':'var(--neon-blue)'}; margin-left:10px;">${isMasterGlobal?'MASTER':'OPERATORE'}</span>`;

                try {
                    const [resS, resJ] = await Promise.all([fetch('stirpi_database.json'), fetch('classi_database.json')]);
                    dbStirpi = (await resS.json()).items;
                    dbClassi = (await resJ.json()).items;
                    const snap = await getDocs(collection(db, "personaggi"));
                    allChars = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderArchive(user.uid);
                } catch (e) { console.error(e); }
            } else { window.location.href = "index.html"; }
        });

        function renderArchive(uid, filter = "") {
            const gPers = document.getElementById('grid-personali');
            const gUtenti = document.getElementById('grid-utenti');
            const masterView = document.getElementById('master-view');
            gPers.innerHTML = ""; gUtenti.innerHTML = "";
            masterView.style.display = isMasterGlobal ? 'block' : 'none';

            allChars.filter(c => c.nome.toLowerCase().includes(filter.toLowerCase()) || c.stirpe.toLowerCase().includes(filter.toLowerCase()) || c.job.toLowerCase().includes(filter.toLowerCase()))
            .forEach(p => {
                const card = document.createElement('div');
                card.className = 'pg-card';
                const canManage = isMasterGlobal || p.creatoDa === uid;
                const isMio = (p.creatoDa === uid) || (isMasterGlobal && (p.creatoDa === "MASTER" || p.ownerEmail === auth.currentUser.email));

                card.innerHTML = `
                    <img src="${p.immagine || ''}">
                    <div class="pg-card-info">
                        <div class="pg-card-name">${p.nome}</div>
                        <div style="font-size:0.7rem; color:#666;">${p.stirpe.toUpperCase()} | ${p.job.toUpperCase()}</div>
                        ${canManage ? `<button class="btn-delete-small" onclick="event.stopPropagation(); window.deleteChar('${p.id}', '${p.nome}')">ELIMINA</button>
                                       <button class="btn-edit-small" onclick="event.stopPropagation(); window.editChar('${p.id}')">EVOLVI</button>` : ''}
                    </div>`;
                card.onclick = () => openViewer(p);
                (isMio ? gPers : gUtenti).appendChild(card);
            });
        }

        window.openViewer = async (p) => {
            const overlay = document.getElementById('viewer-overlay');
            const loader = document.getElementById('v-loader');
            const bar = document.getElementById('v-hack-fill');
            const status = document.getElementById('v-hack-status');
            
            overlay.style.display = 'block';
            loader.style.display = 'flex';
            
            const steps = [{p:30, t:"BYPASSING FIREWALL..."}, {p:60, t:"SYNCING NEURAL CORE..."}, {p:100, t:"ACCESS GRANTED"}];
            for(let s of steps){
                await new Promise(r => setTimeout(r, 250));
                bar.style.width = s.p+"%";
                status.innerText = s.t;
            }

            // Popolamento Dati
            let ereditaDati = null;
            dbStirpi.forEach(s => { const found = s.eredita.find(e => e.nome === p.eredita); if(found) ereditaDati = found; });
            const jobDati = dbClassi.find(j => j.nome === p.job);

            document.getElementById('v-img').src = p.immagine || '';
            document.getElementById('v-nome').innerText = p.nome;
            document.getElementById('v-motto').innerText = p.motto ? `"${p.motto}"` : "";
            document.getElementById('v-club').innerText = p.club || "--";
            document.getElementById('v-distintivo').innerText = p.trattoDistintivo || "--";
            document.getElementById('v-uniforme').innerText = p.uniforme || "Uniforme Standard Operativa";
            document.getElementById('v-stirpe').innerText = `${p.stirpe.toUpperCase()} > ${p.eredita.toUpperCase()}`;
            document.getElementById('v-eredita-desc').innerHTML = `<p>${ereditaDati?.descrizione || ""}</p>` + (ereditaDati?.effetto ? `<div class="tech-tag">${ereditaDati.effetto}</div>` : "");
            document.getElementById('v-job').innerText = p.job.toUpperCase();
            document.getElementById('v-job-desc').innerHTML = `<p>${jobDati?.descrizione || ""}</p>`;
            
            const numMem = p.memorie?.length || 0;
            const totLim = 11 + (numMem * 3);
            document.getElementById('v-params').innerHTML = `<div>ANIMA: ${p.anima}</div><div>CORE: ${p.core}</div><div>DIFETTO: ${p.difetto}</div><div>NEMESI: ${p.nemesi}</div>`;
            let dots = `<div class="limite-container">`;
            for(let i=0; i<20; i++) dots += `<div class="limite-dot ${i<totLim?'dot-filled':''}"></div>`;
            document.getElementById('v-limite-visual').innerHTML = dots + `</div>`;

            const tBox = document.getElementById('v-tecniche'); tBox.innerHTML = "";
            jobDati?.tecniche?.forEach(t => tBox.innerHTML += `<div class="tech-tag"><strong>${t.nome}:</strong> ${t.effetto}</div>`);
            p.capacita?.forEach(c => tBox.innerHTML += `<div class="tech-tag" style="border-color:var(--neon-pink)">${c}</div>`);
            
            document.getElementById('v-memorie-box').innerHTML = `MEMORIE: ${p.memorie?.join(' // ') || '--'}<br>AFFINITÀ: ${p.affinita?.join(' // ') || '--'}`;
            document.getElementById('v-tratti').innerHTML = p.tratti?.map(t => `<span class="trait-pill">${t}</span>`).join('') || '';
            document.getElementById('v-btn-edit').style.display = (isMasterGlobal || p.creatoDa === auth.currentUser.uid) ? 'block' : 'none';
            document.getElementById('v-btn-edit').onclick = () => window.editChar(p.id);

            setTimeout(() => { loader.style.display = 'none'; }, 300);
        };

        window.closeViewer = () => document.getElementById('viewer-overlay').style.display = 'none';
        window.filterArchive = () => renderArchive(auth.currentUser.uid, document.getElementById('search-bar').value);
        window.editChar = (id) => { sessionStorage.setItem('updateModeId', id); window.location.href = 'aggiorna.html'; };
        window.deleteChar = async (id, nome) => { if(confirm(`EPURARE ${nome.toUpperCase()}?`)) { await deleteDoc(doc(db, "personaggi", id)); location.reload(); } };
        document.getElementById('btn-logout').onclick = () => signOut(auth);
    </script>
</body>
</html>
