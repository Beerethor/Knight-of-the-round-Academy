<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Terminale Archivio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; --bg-dark: #060608; --panel-bg: #111116; }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Header */
        .nav-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #000; flex-wrap: wrap; gap: 15px; }
        .btn-action { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px 15px; font-family: 'Orbitron'; cursor: pointer; text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .btn-action:hover { background: var(--neon-blue); color: black; }
        .btn-home { border-color: var(--neon-yellow); color: var(--neon-yellow); }
        .btn-logout { border-color: var(--neon-pink); color: var(--neon-pink); }

        /* Ricerca */
        .search-container { padding: 10px 40px; background: #0c0c0f; border-bottom: 1px solid #222; }
        .search-input { width: 100%; max-width: 500px; background: #000; border: 1px solid var(--neon-blue); color: white; padding: 10px 15px; font-family: 'Rajdhani'; font-size: 1.1rem; border-radius: 4px; outline: none; }

        /* Griglia e Card */
        .section-label { font-family: 'Orbitron'; color: var(--neon-pink); padding: 20px 40px 0; font-size: 0.9rem; letter-spacing: 2px; }
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px 40px 40px; }
        
        .pg-card { background: var(--panel-bg); border: 1px solid #222; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; border-radius: 4px; }
        .pg-card:hover { border-color: var(--neon-blue); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1); }
        .pg-card img { width: 100%; height: 180px; object-fit: cover; object-position: center 20%; filter: grayscale(30%); transition: 0.3s; }
        .pg-card:hover img { filter: grayscale(0%); }
        
        .pg-card-info { padding: 15px; border-top: 1px solid #222; position: relative; min-height: 80px; }
        .pg-card-name { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 1.1rem; margin-bottom: 5px; }
        
        .btn-edit-small { position: absolute; bottom: 12px; right: 12px; background: none; border: 1px solid var(--neon-yellow); color: var(--neon-yellow); font-family: 'Orbitron'; font-size: 0.6rem; padding: 3px 6px; cursor: pointer; }
        .btn-delete-small { position: absolute; bottom: 12px; right: 85px; background: none; border: 1px solid var(--neon-pink); color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.6rem; padding: 3px 6px; cursor: pointer; }
        .btn-edit-small:hover { background: var(--neon-yellow); color: black; }
        .btn-delete-small:hover { background: var(--neon-pink); color: black; }

        /* Viewer Overlay */
        #viewer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; }
        .sheet-container { max-width: 1100px; margin: 40px auto; background: #0c0c0f; border: 1px solid #333; display: grid; grid-template-columns: 350px 1fr; position: relative; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .side-img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; border-right: 1px solid var(--neon-blue); }
        .main-sheet { padding: 40px; }
        .close-overlay { position: absolute; top: 20px; right: 20px; color: white; cursor: pointer; font-family: 'Orbitron'; font-size: 1.2rem; z-index: 10; }
        
        .data-box { background: rgba(255,255,255,0.03); border-left: 3px solid var(--neon-blue); padding: 15px; margin-bottom: 20px; }
        .data-box h3 { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--neon-pink); margin: 0 0 10px; letter-spacing: 1px; }
        .tech-tag { display: block; background: rgba(0,242,255,0.05); border-left: 2px solid var(--neon-blue); padding: 10px; margin-bottom: 8px; font-size: 0.9rem; line-height: 1.4; }
        .trait-pill { display: inline-block; padding: 4px 10px; border: 1px solid #444; margin: 3px; font-size: 0.8rem; color: var(--neon-yellow); background: rgba(0,0,0,0.3); }
        
        @media (max-width: 850px) {
            .sheet-container { grid-template-columns: 1fr; }
            .side-img { height: 300px; border-right: none; border-bottom: 1px solid var(--neon-blue); }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <div>
            <h1 style="font-family:'Orbitron'; color:var(--neon-blue); display:inline-block; margin:0; font-size:1.3rem;">KOTRA // ARCHIVIO</h1>
            <span id="role-display"></span>
        </div>
        <div class="nav-controls">
            <a href="index.html" class="btn-action btn-home">HUB</a>
            <a href="creatore.html" class="btn-action">+ NUOVA MATRICOLA</a>
            <button class="btn-action btn-logout" id="btn-logout">LOGOUT</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-bar" class="search-input" placeholder="Cerca per nome, stirpe o job..." oninput="filterArchive()">
    </div>

    <div id="master-view" style="display: none;">
        <div class="section-label">UNITÀ SOTTOPOSTE (GIOCATORI)</div>
        <div class="archive-grid" id="grid-utenti"></div>
    </div>

    <div class="section-label">LE MIE MATRICOLE</div>
    <div class="archive-grid" id="grid-personali"></div>

    <div id="viewer-overlay">
        <span class="close-overlay" onclick="closeViewer()">[ CHIUDI X ]</span>
        <div class="sheet-container">
            <img id="v-img" class="side-img" src="">
            <div class="main-sheet">
                <div style="border-bottom: 1px solid var(--neon-blue); padding-bottom: 20px; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <h2 id="v-nome" style="font-family:'Orbitron'; font-size: 3rem; margin:0; color:var(--neon-blue);">---</h2>
                        <button id="v-btn-edit" class="btn-action" style="border-color: var(--neon-yellow); color: var(--neon-yellow);">AGGIORNA DATI</button>
                    </div>
                    <p id="v-motto" style="font-style:italic; color:var(--neon-yellow); margin-top: 10px; font-size: 1.1rem;">"---"</p>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;" id="viewer-content">
                    <div>
                        <div class="data-box">
                            <h3>STIRPE & EREDITÀ</h3>
                            <div id="v-stirpe" style="font-weight: bold; color: var(--neon-blue); margin-bottom: 8px; font-family: 'Orbitron'; font-size: 0.9rem;">---</div>
                            <div id="v-eredita-desc"></div>
                        </div>
                        <div class="data-box">
                            <h3>JOB OPERATIVO</h3>
                            <div id="v-job" style="font-weight: bold; color: var(--neon-blue); margin-bottom: 8px; font-family: 'Orbitron'; font-size: 0.9rem;">---</div>
                            <div id="v-job-desc"></div>
                        </div>
                    </div>
                    <div>
                        <div class="data-box"><h3>TECNICHE OPERATIVE</h3><div id="v-tecniche"></div></div>
                        <div class="data-box"><h3>PARAMETRI CORE</h3><div id="v-params" style="font-size:0.95rem; line-height: 1.8;"></div></div>
                    </div>
                </div>
                <div class="data-box"><h3>TRATTI MEMETICI</h3><div id="v-tratti"></div></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allChars = [], dbStirpi = [], dbClassi = [], isMasterGlobal = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const configSnap = await getDoc(doc(db, "config", "permissions"));
                const masterEmail = configSnap.exists() ? configSnap.data().masterEmail : "";
                isMasterGlobal = user.email.toLowerCase().trim() === masterEmail.toLowerCase().trim();
                
                document.getElementById('role-display').innerHTML = `<span style="font-family:'Orbitron'; font-size:0.6rem; padding:2px 8px; border:1px solid ${isMasterGlobal?'var(--neon-pink)':'var(--neon-blue)'}; color:${isMasterGlobal?'var(--neon-pink)':'var(--neon-blue)'}; border-radius:4px; margin-left:10px;">${isMasterGlobal?'MASTER':'OPERATORE'}</span>`;

                try {
                    const [resS, resJ] = await Promise.all([fetch('stirpi_database.json'), fetch('classi_database.json')]);
                    dbStirpi = (await resS.json()).items;
                    dbClassi = (await resJ.json()).items;
                    
                    const snap = await getDocs(collection(db, "personaggi"));
                    allChars = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderArchive(user.uid);
                } catch (e) { console.error("Database Sync Error:", e); }
            } else { window.location.href = "index.html"; }
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        function renderArchive(uid, filter = "") {
            const gridPersonali = document.getElementById('grid-personali');
            const gridUtenti = document.getElementById('grid-utenti');
            const masterView = document.getElementById('master-view');
            gridPersonali.innerHTML = ""; gridUtenti.innerHTML = "";
            
            if(masterView) masterView.style.display = isMasterGlobal ? 'block' : 'none';

            const filtered = allChars.filter(c => 
                c.nome.toLowerCase().includes(filter.toLowerCase()) ||
                c.stirpe.toLowerCase().includes(filter.toLowerCase()) ||
                c.job.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'pg-card';
                const canManage = isMasterGlobal || p.creatoDa === uid;
                
                card.innerHTML = `
                    <img src="${p.immagine || ''}">
                    <div class="pg-card-info">
                        <div class="pg-card-name">${p.nome}</div>
                        <div style="font-size:0.7rem; color:#666; text-transform:uppercase;">${p.stirpe} | ${p.job}</div>
                        ${canManage ? `
                            <button class="btn-delete-small" onclick="event.stopPropagation(); deleteCharacter('${p.id}', '${p.nome}')">ELIMINA</button>
                            <button class="btn-edit-small" onclick="event.stopPropagation(); editCharacter('${p.id}')">MODIFICA</button>
                        ` : ''}
                    </div>`;
                card.onclick = () => openViewer(p);

                if (p.creatoDa === "MASTER" || (isMasterGlobal && p.ownerEmail === auth.currentUser.email) || p.creatoDa === uid) {
                    gridPersonali.appendChild(card);
                } else if (isMasterGlobal) {
                    gridUtenti.appendChild(card);
                }
            });
        }

        window.filterArchive = () => renderArchive(auth.currentUser.uid, document.getElementById('search-bar').value);

        window.editCharacter = (id) => {
    // Salviamo l'ID del personaggio da caricare
    sessionStorage.setItem('updateModeId', id);
    window.location.href = 'aggiorna.html';
};

        window.deleteCharacter = async (id, nome) => {
            if (confirm(`ATTENZIONE: Procedere con l'eliminazione definitiva di [ ${nome.toUpperCase()} ]?`)) {
                try {
                    await deleteDoc(doc(db, "personaggi", id));
                    allChars = allChars.filter(c => c.id !== id);
                    renderArchive(auth.currentUser.uid, document.getElementById('search-bar').value);
                } catch (e) { alert("Errore durante l'eliminazione."); }
            }
        };

       function openViewer(p) {
    let ereditaDati = null;
    dbStirpi.forEach(s => { 
        const found = s.eredita.find(e => e.nome === p.eredita); 
        if(found) ereditaDati = found; 
    });
    const jobDati = dbClassi.find(j => j.nome === p.job);

    document.getElementById('v-img').src = p.immagine || '';
    document.getElementById('v-nome').innerText = p.nome;
    document.getElementById('v-motto').innerText = p.motto ? `"${p.motto}"` : "";

    // --- SEZIONE EREDITÀ (Lore + Effetti) ---
    document.getElementById('v-stirpe').innerText = `${p.stirpe.toUpperCase()} > ${p.eredita.toUpperCase()}`;
    
    // Recupero il testo dell'effetto (gestisco sia 'effetto' che 'effetti')
    const testoEffetto = ereditaDati?.effetto || ereditaDati?.effetti || "";
    
    let htmlEredita = `<p style="color:#ccc; font-size:0.85rem; margin:0 0 10px 0; line-height:1.4;">${ereditaDati ? ereditaDati.descrizione : "Dati lore non trovati."}</p>`;
    
    if(testoEffetto) {
        htmlEredita += `
            <div style="background: rgba(255, 0, 255, 0.05); border: 1px solid rgba(255, 0, 255, 0.2); padding: 10px; border-radius: 4px; margin-top: 10px;">
                <strong style="color:var(--neon-pink); font-size:0.65rem; text-transform:uppercase; display:block; margin-bottom:4px; letter-spacing:1px;">POTENZIALE GENETICO / SOCIALE:</strong>
                <div style="color:var(--neon-yellow); font-size:0.85rem; line-height:1.3; font-weight:500;">${testoEffetto}</div>
            </div>`;
    }
    document.getElementById('v-eredita-desc').innerHTML = htmlEredita;

    // --- SEZIONE JOB (Citazione + Descrizione) ---
    document.getElementById('v-job').innerText = p.job.toUpperCase();
    let htmlJob = "";
    if(jobDati?.citazione) htmlJob += `<i style="color:var(--neon-blue); font-size:0.85rem; display:block; margin-bottom:8px; opacity:0.8; border-left: 2px solid var(--neon-blue); padding-left: 10px;">"${jobDati.citazione}"</i>`;
    htmlJob += `<p style="color:#ccc; font-size:0.85rem; margin:0; line-height:1.4;">${jobDati ? jobDati.descrizione : "Protocollo operativo non trovato."}</p>`;
    document.getElementById('v-job-desc').innerHTML = htmlJob;
    
    // --- PARAMETRI ---
    document.getElementById('v-params').innerHTML = `
        <div style="margin-bottom:5px;"><strong style="color:var(--neon-pink); font-size:0.7rem;">ANIMA:</strong> <span style="color:white;">${p.anima || '--'}</span></div>
        <div style="margin-bottom:5px;"><strong style="color:var(--neon-pink); font-size:0.7rem;">CORE:</strong> <span style="color:white;">${p.core || '--'}</span></div>
        <div style="margin-bottom:5px;"><strong style="color:var(--neon-pink); font-size:0.7rem;">DIFETTO:</strong> <span style="color:white;">${p.difetto || '--'}</span></div>
        <div style="margin-bottom:5px;"><strong style="color:var(--neon-pink); font-size:0.7rem;">NEMESI:</strong> <span style="color:white;">${p.nemesi || '--'}</span></div>`;

    // --- TECNICHE (Dal Job) ---
    const tBox = document.getElementById('v-tecniche'); 
    tBox.innerHTML = "";
    if (jobDati?.tecniche) {
        jobDati.tecniche.forEach(t => {
            tBox.innerHTML += `
            <div class="tech-tag">
                <strong style="color:var(--neon-blue); text-transform:uppercase; font-size:0.75rem;">${t.nome}:</strong> 
                <span style="color:#ddd; font-size:0.85rem;">${t.effetto}</span>
            </div>`;
        });
    }

    document.getElementById('v-tratti').innerHTML = p.tratti ? p.tratti.map(t => `<span class="trait-pill">${t}</span>`).join('') : '';
    
    const btnEdit = document.getElementById('v-btn-edit');
    btnEdit.onclick = () => editCharacter(p.id);
    btnEdit.style.display = (isMasterGlobal || p.creatoDa === auth.currentUser.uid) ? 'block' : 'none';

    document.getElementById('viewer-overlay').style.display = 'block';
}

        window.closeViewer = () => document.getElementById('viewer-overlay').style.display = 'none';
    </script>
</body>
</html>
