<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Protocollo Inizializzazione</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; --bg-dark: #0a0a0c; }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; padding: 20px; line-height: 1.4; }
        
        /* Navigazione */
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-nav { text-decoration: none; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid var(--neon-blue); padding: 5px 15px; margin-left: 5px; transition: 0.3s; }
        .btn-nav:hover { background: var(--neon-blue); color: black; }
        .btn-logout { background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); padding: 5px 15px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; margin-left: 10px; }

        .role-badge { font-family: 'Orbitron'; font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; border: 1px solid; margin-left: 10px; }
        .master { border-color: var(--neon-pink); color: var(--neon-pink); }
        .player { border-color: var(--neon-blue); color: var(--neon-blue); }

        /* Form Layout */
        .form-section { background: rgba(255,255,255,0.05); padding: 20px; border: 1px solid #333; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-left: 3px solid var(--neon-blue); }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; margin: 10px 0; border-radius: 8px; box-sizing: border-box; }
        input:invalid { border-color: var(--neon-pink); }

        /* Anteprima Immagine Potenziata */
        .img-preview { width: 100%; height: 250px; border: 2px dashed #444; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; border-radius: 8px; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; filter: grayscale(0%); transition: 0.3s; }

        /* Azioni */
        .btn-save { width: 100%; background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 15px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save:hover:not(:disabled) { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }
        .btn-save:disabled { border-color: #444; color: #444; cursor: not-allowed; opacity: 0.5; }
        .btn-reset { border-color: var(--neon-pink); color: var(--neon-pink); }
        
        /* Spinner */
        #loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--neon-blue); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="font-family:'Orbitron'; margin-top:15px; color:var(--neon-blue);">SINCRONIZZAZIONE DATI...</p>
    </div>

    <header class="nav-header">
        <div>
            <h1 style="display:inline-block; font-size: 1.2rem; margin:0;">INIZIALIZZAZIONE MATRICOLA</h1>
            <span id="role-display" class="role-badge">VERIFICA...</span>
        </div>
        <div style="display: flex; align-items: center;">
            <a href="index.html" class="btn-nav" style="border-color: var(--neon-yellow); color: var(--neon-yellow);">HUB</a>
            <a href="archivio.html" class="btn-nav">ARCHIVIO</a>
            <button class="btn-logout" id="btn-logout">LOGOUT</button>
        </div>
    </header>

    <div id="pg-form">
        <div class="form-section">
            <div class="full-width"><h2 style="font-family:'Orbitron'; color:var(--neon-pink); margin:0;">1. DATI CORE</h2></div>
            <div>
                <label>NOME MATRICOLA *</label>
                <input type="text" id="nome" placeholder="Obbligatorio" required oninput="validateForm()">
                <label style="margin-top:15px;">ANIMA (Tag)</label>
                <input type="text" id="anima" placeholder="Es: Pilota Provetto">
            </div>
            <div>
                <label>RITRATTO OPERATIVO (Auto-Resize)</label>
                <input type="file" id="img-file" accept="image/*" onchange="handleImage(event)">
                <div class="img-preview" id="preview-box">OFFLINE</div>
            </div>
        </div>

        <div class="form-section">
            <div class="full-width"><h2 style="font-family:'Orbitron'; color:var(--neon-pink); margin:0;">2. IDENTITÀ</h2></div>
            <div>
                <label>CORE</label><input type="text" id="core">
                <label style="margin-top:15px;">DIFETTO</label><input type="text" id="difetto">
            </div>
            <div>
                <label>MOTTO</label><input type="text" id="motto">
                <label style="margin-top:15px;">NEMESI</label><input type="text" id="nemesi">
            </div>
            <div class="full-width">
                <label>I 4 TRATTI d8 INIZIALI</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" class="tratto-input" placeholder="Tratto 1">
                    <input type="text" class="tratto-input" placeholder="Tratto 2">
                    <input type="text" class="tratto-input" placeholder="Tratto 3">
                    <input type="text" class="tratto-input" placeholder="Tratto 4">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="full-width"><h2 style="font-family:'Orbitron'; color:var(--neon-pink); margin:0;">3. PROTOCOLLO</h2></div>
            <div><label>STIRPE *</label><select id="select-stirpe" required onchange="aggiornaEredita()"></select></div>
            <div><label>JOB *</label><select id="select-job" required onchange="validateForm()"></select></div>
            <div class="full-width">
                <label style="color:var(--neon-yellow);"><input type="checkbox" id="mezzosangue" onchange="aggiornaEredita()" style="width:auto;"> ATTIVA MEZZOSANGUE</label>
            </div>
            <div class="full-width"><label>EREDITÀ SELEZIONATA</label><select id="select-eredita"></select></div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 3fr; gap: 15px; margin-top: 20px; margin-bottom: 40px;">
        <button type="button" class="btn-save btn-reset" onclick="resetForm()">REINIZIALIZZA</button>
        <button class="btn-save" id="btn-save" disabled>SINCRONIZZA CON IL CLOUD</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null, isMaster = false, currentImgData = "", dbStirpi = [], currentEditId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const configSnap = await getDoc(doc(db, "config", "permissions"));
                isMaster = user.email.toLowerCase().trim() === (configSnap.exists() ? configSnap.data().masterEmail.toLowerCase().trim() : "");
                document.getElementById('role-display').innerText = isMaster ? "MASTER" : "GIOCATORE";
                document.getElementById('role-display').className = `role-badge ${isMaster ? 'master' : 'player'}`;
                
                init();
            } else { window.location.href = "index.html"; }
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // COMPRESSIONE IMMAGINE (Canvas Resize)
        window.handleImage = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    currentImgData = canvas.toDataURL("image/jpeg", 0.7); // 70% qualità
                    document.getElementById('preview-box').innerHTML = `<img src="${currentImgData}">`;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // VALIDAZIONE CAMPI
        window.validateForm = () => {
            const nome = document.getElementById('nome').value.trim();
            const stirpe = document.getElementById('select-stirpe').value;
            const job = document.getElementById('select-job').value;
            document.getElementById('btn-save').disabled = !(nome && stirpe && job);
        };

        // GESTIONE DATABASE JSON E CARICAMENTO MODIFICA
        async function init() {
            try {
                const [resS, resJ] = await Promise.all([
                    fetch('stirpi_database.json'), 
                    fetch('classi_database.json')
                ]);
                
                if(!resS.ok || !resJ.ok) throw new Error("File JSON non trovati");

                dbStirpi = (await resS.json()).items;
                const jobs = (await resJ.json()).items;

                document.getElementById('select-stirpe').innerHTML = dbStirpi.map(s => `<option value="${s.nome}">${s.nome}</option>`).join('');
                document.getElementById('select-job').innerHTML = jobs.map(j => `<option value="${j.nome}">${j.nome}</option>`).join('');
                aggiornaEredita();
                
                // CONTROLLO MODALITÀ MODIFICA
                currentEditId = sessionStorage.getItem('editModeId');
                if(currentEditId) {
                    await loadCharacterForEdit(currentEditId);
                } else {
                    validateForm();
                }
            } catch (e) {
                alert("ERRORE CRITICO: Database Stirpi/Classi mancante.");
            }
        }

        async function loadCharacterForEdit(id) {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            document.querySelector('#loading-overlay p').innerText = "RECUPERO DATI MATRICOLA...";
            
            try {
                const docSnap = await getDoc(doc(db, "personaggi", id));
                if(docSnap.exists()) {
                    const p = docSnap.data();
                    
                    // Riempi campi base
                    document.getElementById('nome').value = p.nome;
                    document.getElementById('anima').value = p.anima || '';
                    document.getElementById('core').value = p.core || '';
                    document.getElementById('motto').value = p.motto || '';
                    document.getElementById('difetto').value = p.difetto || '';
                    document.getElementById('nemesi').value = p.nemesi || '';
                    
                    // Riempi tratti
                    if(p.tratti) {
                        const trattiInputs = document.querySelectorAll('.tratto-input');
                        for(let i=0; i < p.tratti.length && i < trattiInputs.length; i++) {
                            trattiInputs[i].value = p.tratti[i];
                        }
                    }
                    
                    // Seleziona Stirpe e Job
                    document.getElementById('select-stirpe').value = p.stirpe;
                    document.getElementById('select-job').value = p.job;
                    
                    // Gestisci Mezzosangue (se il PG ha un'eredità non appartenente alla stirpe base)
                    const stirpeBaseDati = dbStirpi.find(s => s.nome === p.stirpe);
                    const ereditaBaseNomi = stirpeBaseDati ? stirpeBaseDati.eredita.map(e => e.nome) : [];
                    if(!ereditaBaseNomi.includes(p.eredita)) {
                        document.getElementById('mezzosangue').checked = true;
                    }
                    
                    // Aggiorna eredità disponibili e seleziona quella corretta
                    aggiornaEredita();
                    document.getElementById('select-eredita').value = p.eredita;
                    
                    // Gestisci Immagine
                    currentImgData = p.immagine || '';
                    if(currentImgData) {
                        document.getElementById('preview-box').innerHTML = `<img src="${currentImgData}">`;
                    }
                    
                    document.getElementById('btn-save').innerText = "AGGIORNA MATRICOLA";
                    document.querySelector('.btn-reset').innerText = "ANNULLA MODIFICA";
                }
            } catch (e) { alert("Errore caricamento."); }
            overlay.style.display = 'none';
            validateForm();
        }

        window.aggiornaEredita = () => {
            const isMez = document.getElementById('mezzosangue').checked;
            const stirpeSel = document.getElementById('select-stirpe').value;
            let options = "";
            dbStirpi.forEach(s => {
                if (isMez || s.nome === stirpeSel) {
                    s.eredita.forEach(e => options += `<option value="${e.nome}">${isMez ? '['+s.nome+'] ' : ''}${e.nome}</option>`);
                }
            });
            document.getElementById('select-eredita').innerHTML = options;
            validateForm();
        };

        window.resetForm = () => {
            if(currentEditId) {
                if(confirm("Annullare le modifiche e tornare all'Archivio?")) {
                    sessionStorage.removeItem('editModeId');
                    window.location.href = 'archivio.html';
                }
            } else {
                if(confirm("Protocollo Reset? Tutti i dati andranno persi.")) location.reload();
            }
        };

        // SALVATAGGIO O AGGIORNAMENTO
        document.getElementById('btn-save').onclick = async () => {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            document.querySelector('#loading-overlay p').innerText = currentEditId ? "AGGIORNAMENTO MATRICOLA..." : "SINCRONIZZA CON IL CLOUD...";

            const pg = {
                nome: document.getElementById('nome').value.trim(),
                anima: document.getElementById('anima').value.trim(),
                core: document.getElementById('core').value.trim(),
                motto: document.getElementById('motto').value.trim(),
                difetto: document.getElementById('difetto').value.trim(),
                nemesi: document.getElementById('nemesi').value.trim(),
                tratti: Array.from(document.querySelectorAll('.tratto-input')).map(i => i.value.trim()).filter(v => v !== ""),
                stirpe: document.getElementById('select-stirpe').value,
                job: document.getElementById('select-job').value,
                eredita: document.getElementById('select-eredita').value,
                immagine: currentImgData,
                // Aggiorna ownerEmail se Master modifica per mantenere consistenza,
                // ma non cambiare creatoDa se è un PG di un utente
                ownerEmail: currentUser.email,
                lastUpdate: serverTimestamp()
            };

            // Se è creazione, imposta i metadati iniziali
            if(!currentEditId) {
                pg.creatoDa = isMaster ? "MASTER" : currentUser.uid;
                pg.timestamp = serverTimestamp();
            }

            try {
                // Genera ID se nuovo, usa ID esistente se modifica
                const docId = currentEditId ? currentEditId : `${currentUser.uid}-${Date.now()}`;
                await setDoc(doc(db, "personaggi", docId), pg, { merge: true });
                
                if(currentEditId) sessionStorage.removeItem('editModeId');
                
                overlay.style.display = 'none';
                alert(currentEditId ? "Protocollo Aggiornato." : "Protocollo Completato.");
                window.location.href = "archivio.html";
            } catch (e) {
                overlay.style.display = 'none';
                alert("ERRORE CRITICO.");
            }
        };
    </script>
</body>
</html>
