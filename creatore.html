<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Inizializzazione Matricola</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; --bg-dark: #0a0a0c; }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; padding: 20px; line-height: 1.4; }
        h1 { font-family: 'Orbitron'; color: var(--neon-blue); text-transform: uppercase; border-bottom: 2px solid #333; margin-bottom: 30px; letter-spacing: 2px; }
        h2 { font-family: 'Orbitron'; color: var(--neon-pink); font-size: 1rem; margin-top: 0; }
        .form-section { background: rgba(255,255,255,0.05); padding: 20px; border: 1px solid #333; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        label { display: block; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; font-family: 'Rajdhani'; font-size: 1.1rem; box-sizing: border-box; }
        input:focus { border-color: var(--neon-blue); outline: none; }
        .checkbox-container { display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 0, 0.05); padding: 10px; border: 1px dashed var(--neon-yellow); grid-column: 1 / -1; }
        .traits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pl-visualizer { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }
        .dot.limite { background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }
        .dot.sovraccarico { background: var(--neon-pink); box-shadow: 0 0 8px var(--neon-pink); }
        button { background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 15px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
        button:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }
        #output-scheda { display: none; margin-top: 30px; border: 2px solid var(--neon-pink); padding: 30px; background: #000; }
    </style>
</head>
<body>

    <h1>Protocollo Inizializzazione Matricola</h1>

    <div class="form-section">
        <div class="full-width"><h2>1. Identità e Anima</h2></div>
        <div>
            <label>NOME MATRICOLA</label>
            <input type="text" id="nome" placeholder="Es: Arthur Pendragon">
        </div>
        <div>
            <label>IL MIO MOTTO PERSONALE</label>
            <input type="text" id="motto" placeholder="Es: Oltre ogni limite">
        </div>
        <div>
            <label>CORE</label>
            <input type="text" id="core" placeholder="Es: Coraggio Ardente">
        </div>
        <div>
            <label>ANIMA (Parole descrittive)</label>
            <input type="text" id="anima" placeholder="Es: Fiamma della Speranza">
        </div>
        <div>
            <label>IL MIO DIFETTO</label>
            <input type="text" id="difetto" placeholder="Es: Impulsività cieca">
        </div>
        <div>
            <label>NEMESI</label>
            <input type="text" id="nemesi" placeholder="Es: Mordred l'Oscuro">
        </div>
    </div>

    <div class="form-section">
        <div class="full-width"><h2>2. Stirpe e Percorso</h2></div>
        <div>
            <label>STIRPE</label>
            <select id="select-stirpe" onchange="aggiornaEredita()"></select>
        </div>
        <div>
            <label>JOB</label>
            <select id="select-job"></select>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="mezzosangue" onchange="aggiornaEredita()">
            <label style="margin:0; color:var(--neon-yellow);">PROTOCOLLO MEZZOSANGUE</label>
        </div>
        <div class="full-width">
            <label>EREDITÀ SELEZIONATA</label>
            <select id="select-eredita"></select>
        </div>
    </div>

    <div class="form-section">
        <div class="full-width"><h2>3. Unità Knight</h2></div>
        <div>
            <label>NOME DEL KNIGHT</label>
            <input type="text" id="nome-knight">
        </div>
        <div>
            <label>FRAME</label>
            <input type="text" id="frame-knight">
        </div>
        <div class="full-width">
            <label>I 4 TRATTI DEL KNIGHT</label>
            <div class="traits-grid">
                <input type="text" class="tratto-input" placeholder="Tratto 1">
                <input type="text" class="tratto-input" placeholder="Tratto 2">
                <input type="text" class="tratto-input" placeholder="Tratto 3">
                <input type="text" class="tratto-input" placeholder="Tratto 4">
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="full-width"><h2>4. Stato Risorse</h2></div>
        <div class="full-width">
            <label>PUNTI LIMITE (8) & SOVRACCARICO (3)</label>
            <div id="pl-display" class="pl-visualizer"></div>
        </div>
    </div>

    <button id="btn-save" onclick="generaScheda()">Salva su Database Cloud</button>

    <div id="output-scheda"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655",
            measurementId: "G-4ZYKLJGF1Y"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;
        let dbStirpi = [];

        onAuthStateChanged(auth, user => { currentUser = user; });

        async function init() {
            try {
                const [resS, resJ] = await Promise.all([fetch('stirpi_database.json'), fetch('classi_database.json')]);
                dbStirpi = (await resS.json()).items;
                const jobs = (await resJ.json()).items;
                const sStirpe = document.getElementById('select-stirpe');
                const sJob = document.getElementById('select-job');
                dbStirpi.forEach(s => sStirpe.innerHTML += `<option value="${s.nome}">${s.nome}</option>`);
                jobs.forEach(j => sJob.innerHTML += `<option value="${j.nome}">${j.nome}</option>`);
                aggiornaEredita();
                renderPL();
            } catch (e) { console.error(e); }
        }

        window.aggiornaEredita = function() {
            const isMez = document.getElementById('mezzosangue').checked;
            const stirpe = document.getElementById('select-stirpe').value;
            const sEredita = document.getElementById('select-eredita');
            sEredita.innerHTML = "";
            dbStirpi.forEach(s => {
                if (isMez || s.nome === stirpe) {
                    s.eredita.forEach(e => {
                        sEredita.innerHTML += `<option value="${e.nome}">[${s.nome}] ${e.nome}</option>`;
                    });
                }
            });
        }

        function renderPL() {
            const display = document.getElementById('pl-display');
            display.innerHTML = "";
            for(let i=0; i<8; i++) display.innerHTML += '<div class="dot limite"></div>';
            for(let i=0; i<3; i++) display.innerHTML += '<div class="dot sovraccarico"></div>';
        }

        window.generaScheda = async function() {
            const nome = document.getElementById('nome').value;
            if(!nome) return alert("Inserisci il nome della Matricola!");

            const pg = {
                nome: nome,
                motto: document.getElementById('motto').value,
                core: document.getElementById('core').value,
                anima: document.getElementById('anima').value,
                difetto: document.getElementById('difetto').value,
                nemesi: document.getElementById('nemesi').value,
                stirpe: document.getElementById('select-stirpe').value,
                job: document.getElementById('select-job').value,
                eredita: document.getElementById('select-eredita').value,
                knight: document.getElementById('nome-knight').value,
                frame: document.getElementById('frame-knight').value,
                tratti: Array.from(document.querySelectorAll('.tratto-input')).map(i => i.value).filter(v => v !== ""),
                puntiLimite: 8,
                puntiSovraccarico: 3,
                capacita: [], // Vuote come richiesto
                oggetti: [],   // Vuote come richiesto
                creatore: currentUser ? currentUser.email : "Anonimo",
                timestamp: serverTimestamp()
            };

            const id = `${nome.toLowerCase().replace(/\s+/g, '-')}-${Date.now()}`;

            try {
                document.getElementById('btn-save').innerText = "SINCRONIZZAZIONE...";
                await setDoc(doc(db, "personaggi", id), pg);
                const out = document.getElementById('output-scheda');
                out.style.display = 'block';
                out.innerHTML = `<h2 style="color:var(--neon-blue);">ARCHIVIATO: ${id}</h2><p>Protocollo sincronizzato nel cloud.</p><button onclick="window.print()">STAMPA SCHEDA</button>`;
                document.getElementById('btn-save').innerText = "SALVATO!";
            } catch (e) {
                alert("Errore cloud!");
                document.getElementById('btn-save').innerText = "RIPROVA";
            }
        }
        window.onload = init;
    </script>
</body>
</html>
