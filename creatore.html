<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Protocollo Inizializzazione</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-pink: #ff00ff; 
            --neon-yellow: #ffff00; 
            --bg-dark: #060608; 
            --panel-bg: rgba(15, 15, 20, 0.9);
            --border-color: rgba(0, 242, 255, 0.2);
        }

        body { 
            background: var(--bg-dark); 
            color: #eee; 
            font-family: 'Rajdhani', sans-serif; 
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.03) 0%, transparent 80%);
        }

        /* Navigazione */
        .nav-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; border-bottom: 2px solid var(--neon-blue); 
            padding-bottom: 10px; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1);
        }

        .btn-nav { 
            text-decoration: none; color: var(--neon-blue); font-family: 'Orbitron'; 
            font-size: 0.7rem; border: 1px solid var(--neon-blue); padding: 8px 15px; 
            margin-left: 5px; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .btn-nav:hover { background: var(--neon-blue); color: black; }

        .role-badge { font-family: 'Orbitron'; font-size: 0.6rem; padding: 3px 10px; border: 1px solid; margin-left: 10px; letter-spacing: 1px; }
        .master { border-color: var(--neon-pink); color: var(--neon-pink); }
        .player { border-color: var(--neon-blue); color: var(--neon-blue); }

        /* Form Layout */
        .form-section { 
            background: var(--panel-bg); padding: 25px; border: 1px solid var(--border-color); 
            margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; 
            border-left: 4px solid var(--neon-blue); position: relative;
        }
        .evolution { border-left-color: var(--neon-pink); }
        .special-section { border-left-color: var(--neon-yellow); background: rgba(255, 255, 0, 0.02); }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.65rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { 
            width: 100%; background: #000; border: 1px solid #333; color: white; 
            padding: 12px; border-radius: 0; font-family: 'Rajdhani'; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255, 0, 255, 0.1); }

        /* Anteprima Immagine focalizzata sul Viso */
        .img-preview { 
            width: 180px; height: 180px; 
            border: 2px solid var(--neon-blue); 
            margin: 10px auto; display: flex; 
            align-items: center; justify-content: center; 
            background: #000; overflow: hidden; position: relative;
            clip-path: polygon(15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%, 0 15%);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .img-preview img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            object-position: center 20%; /* Centra leggermente verso l'alto per il viso */
        }
        .upload-label {
            display: block; background: #111; border: 1px dashed var(--neon-blue);
            padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 0.7rem;
        }
        .upload-label:hover { background: rgba(0, 242, 255, 0.1); color: var(--neon-blue); }

        /* Special Boxes */
        .special-box { padding: 15px; background: rgba(255, 255, 0, 0.05); border: 1px dashed var(--neon-yellow); margin-top: 5px; }

        /* Azioni */
        .btn-save { 
            width: 100%; background: transparent; border: 2px solid var(--neon-blue); 
            color: var(--neon-blue); padding: 18px; font-family: 'Orbitron'; 
            font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 2px;
        }
        .btn-save:hover:not(:disabled) { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }
        .btn-save:disabled { border-color: #333; color: #444; cursor: not-allowed; }
        .btn-reset { border-color: var(--neon-pink); color: var(--neon-pink); }

        /* Loading */
        #loading-overlay { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; 
        }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--neon-blue); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="font-family:'Orbitron'; margin-top:15px; color:var(--neon-blue); letter-spacing: 2px;">SINCRONIZZAZIONE...</p>
    </div>

    <header class="nav-header">
        <div>
            <h1 style="display:inline-block; font-family:'Orbitron'; font-size: 1.1rem; margin:0; color:var(--neon-blue);">INITIALIZATION_PROTOCOL</h1>
            <span id="role-display" class="role-badge">VERIFYING...</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <a href="archivio.html" class="btn-nav">ARCHIVIO</a>
            <button class="btn-nav" id="btn-logout" style="border-color:var(--neon-pink); color:var(--neon-pink);">LOGOUT</button>
        </div>
    </header>

    <div id="pg-form">
        <div class="form-section">
            <div class="full-width"><h2 style="font-family:'Orbitron'; font-size: 0.9rem; color:var(--neon-pink); margin:0;">[01] DATI_CORE</h2></div>
            <div>
                <label>NOME_MATRICOLA *</label>
                <input type="text" id="nome" placeholder="ID UNIVOCO" required oninput="validateForm()">
                <label style="margin-top:15px;">ANIMA (TAG)</label>
                <input type="text" id="anima" placeholder="Es: Scintilla Ribelle">
            </div>
            <div>
                <label>RITRATTO_OPERATIVO (FACE_ID)</label>
                <label for="img-file" class="upload-label">CARICA_FILE_SORGENTE</label>
                <input type="file" id="img-file" accept="image/*" onchange="handleImage(event)" style="display:none;">
                <div class="img-preview" id="preview-box">
                    <span style="font-size:0.6rem; color:#444;">NO_SIGNAL</span>
                </div>
            </div>
        </div>

        <div class="form-section evolution">
            <div class="full-width"><h2 style="font-family:'Orbitron'; font-size: 0.9rem; color:var(--neon-pink); margin:0;">[02] IDENTITY_PROFILE</h2></div>
            <div>
                <label>CORE_PRIMARY</label><input type="text" id="core">
                <label style="margin-top:15px;">DIFETTO_SISTEMA</label><input type="text" id="difetto">
            </div>
            <div>
                <label>MOTTO_OPERATIVO</label><input type="text" id="motto">
                <label style="margin-top:15px;">NEMESI_TARGET</label><input type="text" id="nemesi">
            </div>
            <div class="full-width">
                <label>MEMETIC_TRAITS (4 x d8)</label>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px;">
                    <input type="text" class="tratto-input" placeholder="TRATTO_01">
                    <input type="text" class="tratto-input" placeholder="TRATTO_02">
                    <input type="text" class="tratto-input" placeholder="TRATTO_03">
                    <input type="text" class="tratto-input" placeholder="TRATTO_04">
                </div>
            </div>
        </div>

        <div class="full-width"><h2 style="font-family:'Orbitron'; font-size: 0.9rem; color:var(--neon-blue); margin-top:15px;">[05] CHASSIS_CONFIGURATION</h2></div>
        <div>
            <label>KNIGHT_MODEL (CHASSIS)</label>
            <input type="text" id="knight" placeholder="Es: MK-V Paladin">
        </div>
        <div>
            <label>FRAME_TYPE (TACTICAL_ROLE)</label>
            <select id="select-frame">
                <option value="">-- CARICAMENTO DATI... --</option>
            </select>
        </div>

        
        <div class="form-section">
            <div class="full-width"><h2 style="font-family:'Orbitron'; font-size: 0.9rem; color:var(--neon-pink); margin:0;">[03] SELECTION_STIRPE_JOB</h2></div>
            <div><label>STIRPE_BASE *</label><select id="select-stirpe" required onchange="aggiornaEredita()"></select></div>
            <div><label>JOB_PRIMARY *</label><select id="select-job" required onchange="validateForm()"></select></div>
            <div class="full-width">
                <label style="color:var(--neon-yellow); cursor:pointer;">
                    <input type="checkbox" id="mezzosangue" onchange="aggiornaEredita()" style="width:auto; margin-right:10px;"> ATTIVA_MEZZOSANGUE_OVERRIDE
                </label>
            </div>
            <div class="full-width"><label>EREDITÀ_SINAPTICA</label><select id="select-eredita"></select></div>
        </div>

        <div id="special-inheritance-section" class="form-section special-section" style="display: none;">
            <div class="full-width"><h2 style="font-family:'Orbitron'; font-size: 0.9rem; color:var(--neon-yellow); margin:0;">[04] SPECIAL_MODULES_DETECTED</h2></div>
            
            <div id="box-doppio-core" class="special-box full-width" style="display: none;">
                <label>SECONDARY_CORE_LINK</label>
                <input type="text" id="core-secondario" placeholder="Inserisci secondo Core...">
            </div>

            <div id="box-talento-naturale" class="special-box full-width" style="display: none;">
                <label>EXTRA_JOB_ACCESS</label>
                <select id="select-job-extra"></select>
            </div>

            <div id="box-mutante" class="special-box full-width" style="display: none;">
                <label>MUTATION_DATA</label>
                <input type="text" id="mutazione" placeholder="Descrizione anomalia...">
            </div>

            <div id="box-hybrid" class="special-box full-width" style="display: none;">
                <label>HYBRID_FRAME_ID</label>
                <input type="text" id="frame-extra" placeholder="Specifica Frame secondario...">
            </div>

            <div id="box-senza-core" class="special-box full-width" style="display: none;">
                <label>SCINTILLA_ENGINE (VITAL_DRIVE)</label>
                <input type="text" id="scintilla" placeholder="Cosa ti spinge ad agire?">
            </div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 3fr; gap: 15px; margin-top: 20px; margin-bottom: 50px;">
        <button type="button" class="btn-save btn-reset" onclick="resetForm()">RE-BOOT</button>
        <button class="btn-save" id="btn-save" disabled>COMMIT_TO_CLOUD</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null, isMaster = false, currentImgData = "", dbStirpi = [], currentEditId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const configSnap = await getDoc(doc(db, "config", "permissions"));
                isMaster = user.email.toLowerCase().trim() === (configSnap.exists() ? configSnap.data().masterEmail.toLowerCase().trim() : "");
                document.getElementById('role-display').innerText = isMaster ? "MASTER" : "PLAYER";
                document.getElementById('role-display').className = `role-badge ${isMaster ? 'master' : 'player'}`;
                init();
            } else { window.location.href = "index.html"; }
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // Immagine con Ritaglio Centrale (Face Focus)
        window.handleImage = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = 500; // Risoluzione quadrata fissa
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext("2d");

                    let sX = 0, sY = 0, sSize = img.width;
                    if (img.width > img.height) {
                        sSize = img.height;
                        sX = (img.width - img.height) / 2;
                    } else {
                        sSize = img.width;
                        sY = (img.height - img.width) / 2;
                    }

                    ctx.drawImage(img, sX, sY, sSize, sSize, 0, 0, size, size);
                    currentImgData = canvas.toDataURL("image/jpeg", 0.8);
                    document.getElementById('preview-box').innerHTML = `<img src="${currentImgData}">`;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.checkSpecialInheritance = () => {
            const eredita = document.getElementById('select-eredita').value;
            const section = document.getElementById('special-inheritance-section');
            const boxes = {
                'Doppio Core': 'box-doppio-core',
                'Talento naturale': 'box-talento-naturale',
                'Mutante': 'box-mutante',
                'Hybrid Frame': 'box-hybrid',
                'Senza Core': 'box-senza-core'
            };

            Object.values(boxes).forEach(id => document.getElementById(id).style.display = 'none');
            
            if (boxes[eredita]) {
                document.getElementById(boxes[eredita]).style.display = 'block';
                section.style.display = 'grid';
            } else {
                section.style.display = 'none';
            }
        };

        window.aggiornaEredita = () => {
            const isMez = document.getElementById('mezzosangue').checked;
            const stirpeSel = document.getElementById('select-stirpe').value;
            let options = '<option value="">-- SELEZIONA EREDITÀ --</option>';
            dbStirpi.forEach(s => {
                if (isMez || s.nome === stirpeSel) {
                    s.eredita.forEach(e => options += `<option value="${e.nome}">${isMez ? '['+s.nome+'] ' : ''}${e.nome}</option>`);
                }
            });
            const selEr = document.getElementById('select-eredita');
            selEr.innerHTML = options;
            selEr.onchange = () => { checkSpecialInheritance(); validateForm(); };
            checkSpecialInheritance();
            validateForm();
        };

        window.validateForm = () => {
            const nome = document.getElementById('nome').value.trim();
            const stirpe = document.getElementById('select-stirpe').value;
            const job = document.getElementById('select-job').value;
            document.getElementById('btn-save').disabled = !(nome && stirpe && job);
        };

       let dbKnightGuide = null;

async function init() {
    try {
        // Carichiamo tutti i database necessari
        const [resS, resJ, resK] = await Promise.all([
            fetch('stirpi_database.json'), 
            fetch('classi_database.json'),
            fetch('knight_guide.json') // Il tuo nuovo file
        ]);

        dbStirpi = (await resS.json()).items;
        const jobs = (await resJ.json()).items;
        dbKnightGuide = await resK.json();

        // 1. Popola Stirpi e Job (codice esistente)
        document.getElementById('select-stirpe').innerHTML = dbStirpi.map(s => `<option value="${s.nome}">${s.nome}</option>`).join('');
        const jobOptions = jobs.map(j => `<option value="${j.nome}">${j.nome}</option>`).join('');
        document.getElementById('select-job').innerHTML = jobOptions;

        // 2. Popola i FRAME dalla knight_guide.json
        // Cerchiamo la sezione con id: 2 (I Frame)
        const sezioneFrame = dbKnightGuide.sezioni.find(s => s.id === 2);
        if (sezioneFrame && sezioneFrame.rows) {
            const frameOptions = sezioneFrame.rows.map(f => 
                `<option value="${f.nome}">${f.nome} (${f.specializzazione})</option>`
            ).join('');
            document.getElementById('select-frame').innerHTML = '<option value="">-- SELEZIONA FRAME --</option>' + frameOptions;
        }

        aggiornaEredita();
        
        // Gestione Edit Mode
        currentEditId = sessionStorage.getItem('editModeId');
        if(currentEditId) await loadCharacterForEdit(currentEditId);

    } catch (e) { 
        console.error("Errore caricamento database:", e);
        alert("CRITICAL_ERROR: Database Knight non raggiungibile."); 
    }
}

        async function loadCharacterForEdit(id) {
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const docSnap = await getDoc(doc(db, "personaggi", id));
                if(docSnap.exists()) {
                    const p = docSnap.data();
                    document.getElementById('nome').value = p.nome;
                    document.getElementById('anima').value = p.anima || '';
                    document.getElementById('core').value = p.core || '';
                    document.getElementById('motto').value = p.motto || '';
                    document.getElementById('difetto').value = p.difetto || '';
                    document.getElementById('nemesi').value = p.nemesi || '';
                    
                    if(p.tratti) {
                        const inputs = document.querySelectorAll('.tratto-input');
                        p.tratti.forEach((t, i) => { if(inputs[i]) inputs[i].value = t; });
                    }

                    document.getElementById('select-stirpe').value = p.stirpe;
                    document.getElementById('select-job').value = p.job;
                    
                    const sBase = dbStirpi.find(s => s.nome === p.stirpe);
                    if(sBase && !sBase.eredita.some(e => e.nome === p.eredita)) {
                        document.getElementById('mezzosangue').checked = true;
                    }
                    aggiornaEredita();
                    document.getElementById('select-eredita').value = p.eredita;
                    checkSpecialInheritance();

                    if(p.specialData) {
                        document.getElementById('core-secondario').value = p.specialData.core2 || '';
                        document.getElementById('select-job-extra').value = p.specialData.job2 || '';
                        document.getElementById('mutazione').value = p.specialData.mutazione || '';
                        document.getElementById('frame-extra').value = p.specialData.frame2 || '';
                        document.getElementById('scintilla').value = p.specialData.scintilla || '';
                    }

                    currentImgData = p.immagine || '';
                    if(currentImgData) document.getElementById('preview-box').innerHTML = `<img src="${currentImgData}">`;
                    document.getElementById('btn-save').innerText = "UPDATE_IDENTITY";
                }
            } catch (e) { console.error(e); }
            document.getElementById('loading-overlay').style.display = 'none';
        }

       window.resetForm = () => {
    if(confirm("TERMINATE_SESSION? Tutti i dati non salvati verranno sovrascritti.")) {
        // 1. Pulisce tutti gli input di testo, textarea e select
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            if (input.type === 'checkbox') {
                input.checked = false;
            } else {
                input.value = '';
            }
        });

        // 2. Reset specifico per le Stirpi e Job (riporta alle prime opzioni)
        init(); // Ricarica le opzioni dai JSON per resettare i select

        // 3. Reset dell'immagine
        currentImgData = "";
        document.getElementById('preview-box').innerHTML = `<span style="font-size:0.6rem; color:#444;">NO_SIGNAL</span>`;

        // 4. Nasconde le sezioni speciali
        document.getElementById('special-inheritance-section').style.display = 'none';

        // 5. Disabilita il tasto salva
        validateForm();
        
        console.log("SYSTEM_REBOOT: Campi resettati.");
    }
};

        document.getElementById('btn-save').onclick = async () => {
            document.getElementById('loading-overlay').style.display = 'flex';
            const pg = {
                nome: document.getElementById('nome').value.trim(),
                anima: document.getElementById('anima').value.trim(),
                core: document.getElementById('core').value.trim(),
                motto: document.getElementById('motto').value.trim(),
                difetto: document.getElementById('difetto').value.trim(),
                nemesi: document.getElementById('nemesi').value.trim(),
                tratti: Array.from(document.querySelectorAll('.tratto-input')).map(i => i.value.trim()).filter(v => v !== ""),
                stirpe: document.getElementById('select-stirpe').value,
                job: document.getElementById('select-job').value,
                eredita: document.getElementById('select-eredita').value,
                knight: document.getElementById('knight').value.trim(),
                frame: document.getElementById('frame').value.trim(),
                immagine: currentImgData,
                specialData: {
                    core2: document.getElementById('core-secondario').value,
                    job2: document.getElementById('select-job-extra').value,
                    mutazione: document.getElementById('mutazione').value,
                    frame2: document.getElementById('frame-extra').value,
                    scintilla: document.getElementById('scintilla').value
                },
                ownerEmail: currentUser.email,
                lastUpdate: serverTimestamp()
            };

            if(!currentEditId) {
                pg.creatoDa = isMaster ? "MASTER" : currentUser.uid;
                pg.timestamp = serverTimestamp();
            }

            try {
                const docId = currentEditId || `${currentUser.uid}-${Date.now()}`;
                await setDoc(doc(db, "personaggi", docId), pg, { merge: true });
                sessionStorage.removeItem('editModeId');
                window.location.href = "archivio.html";
            } catch (e) { alert("CRITICAL_SYNC_ERROR"); document.getElementById('loading-overlay').style.display = 'none'; }
        };
    </script>
</body>
</html>
