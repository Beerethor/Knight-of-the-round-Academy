<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Protocollo Inizializzazione</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; --neon-orange: #ff8c00; --bg-dark: #0a0a0c; }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; padding: 20px; line-height: 1.4; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-nav { text-decoration: none; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid var(--neon-blue); padding: 5px 15px; transition: 0.3s; }
        .btn-nav:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 10px var(--neon-blue); }

        h1 { font-family: 'Orbitron'; color: var(--neon-blue); text-transform: uppercase; margin: 0; letter-spacing: 2px; font-size: 1.5rem; }
        h2 { font-family: 'Orbitron'; color: var(--neon-pink); font-size: 1rem; margin-top: 0; }
        
        .form-section { background: rgba(255,255,255,0.05); padding: 20px; border: 1px solid #333; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; font-family: 'Rajdhani'; font-size: 1.1rem; box-sizing: border-box; }
        
        .img-preview { width: 100%; height: 250px; border: 2px dashed #444; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }

        .mezzosangue-panel { grid-column: 1 / -1; background: rgba(255, 255, 0, 0.1); padding: 15px; border: 2px solid var(--neon-yellow); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--neon-yellow); }
        input:checked + .slider:before { transform: translateX(30px); }

        .pl-visualizer { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); }
        .dot.limite { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .dot.sovraccarico { background: #fff; box-shadow: 0 0 10px #fff; }

        .action-bar { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 20px; }
        button { background: transparent; padding: 15px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-save { border: 2px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-save:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }
        .btn-reset { border: 2px solid var(--neon-orange); color: var(--neon-orange); }
        
        .role-badge { font-family: 'Orbitron'; font-size: 0.6rem; padding: 2px 8px; border: 1px solid; border-radius: 10px; }
        .master { border-color: var(--neon-pink); color: var(--neon-pink); }
        .player { border-color: var(--neon-blue); color: var(--neon-blue); }
    </style>
</head>
<body>

    <header class="nav-header">
        <div>
            <h1>Sincronia Matricola</h1>
            <span id="role-display" class="role-badge"></span>
        </div>
        <a href="archivio.html" class="btn-nav">VAI ALL'ARCHIVIO</a>
    </header>

    <div id="pg-form">
        <div class="form-section">
            <div class="full-width"><h2>1. Profilo Operativo</h2></div>
            <div>
                <label>NOME MATRICOLA (Memoria I)</label>
                <input type="text" id="nome" placeholder="Arthur">
                <label style="margin-top:15px;">ANIMA</label>
                <input type="text" id="anima" placeholder="Parole chiave">
            </div>
            <div>
                <label>RITRATTO (Focus Viso)</label>
                <input type="file" id="img-file" accept="image/*" onchange="handleImage(event)">
                <div class="img-preview" id="preview-box">VISUALE OFFLINE</div>
            </div>
        </div>

        <div class="form-section">
            <div class="full-width"><h2>2. Parametri Identitari</h2></div>
            <div>
                <label>CORE</label><input type="text" id="core">
                <label style="margin-top:15px;">DIFETTO</label><input type="text" id="difetto">
            </div>
            <div>
                <label>MOTTO</label><input type="text" id="motto">
                <label style="margin-top:15px;">NEMESI</label><input type="text" id="nemesi">
            </div>
            <div class="full-width">
                <label>TRATTI d8 (Inserisci i 4 iniziali)</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" class="tratto-input" placeholder="Tratto 1">
                    <input type="text" class="tratto-input" placeholder="Tratto 2">
                    <input type="text" class="tratto-input" placeholder="Tratto 3">
                    <input type="text" class="tratto-input" placeholder="Tratto 4">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="full-width"><h2>3. Archeotipo e Unità Knight</h2></div>
            <div><label>STIRPE</label><select id="select-stirpe" onchange="aggiornaEredita()"></select></div>
            <div><label>JOB</label><select id="select-job"></select></div>
            
            <div class="mezzosangue-panel" onclick="document.getElementById('mezzosangue').click()">
                <span style="color:var(--neon-yellow); font-family:'Orbitron';">⚠ PROTOCOLLO MEZZOSANGUE</span>
                <label class="switch"><input type="checkbox" id="mezzosangue" onchange="aggiornaEredita()"><span class="slider"></span></label>
            </div>

            <div class="full-width"><label>EREDITÀ SELEZIONATA</label><select id="select-eredita"></select></div>
            <div><label>NOME KNIGHT</label><input type="text" id="nome-knight"></div>
            <div><label>MODELLO FRAME</label><input type="text" id="frame-knight"></div>
        </div>

        <div class="form-section">
            <div class="full-width"><h2>4. Riserve Energetiche</h2></div>
            <div class="full-width">
                <label>Limite (8) & Sovraccarico (3 per Memoria I)</label>
                <div id="pl-display" class="pl-visualizer"></div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn-reset" onclick="location.reload()">RESET SISTEMI</button>
        <button class="btn-save" id="btn-save">INVIA ALL'ARCHIVIO CLOUD</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentImgData = "";
        let dbStirpi = [];

        // Gestione Identità e Ruoli
        const isMaster = localStorage.getItem('is_master') === 'true';
        let userId = localStorage.getItem('kotra_uid');
        if(!userId) {
            userId = 'USR-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('kotra_uid', userId);
        }
        
        const rDisplay = document.getElementById('role-display');
        rDisplay.innerText = isMaster ? "AUTORIZZAZIONE MASTER" : `UTENTE: ${userId}`;
        rDisplay.className = `role-badge ${isMaster ? 'master' : 'player'}`;

        window.handleImage = (e) => {
            const file = e.target.files[0];
            if(file.size > 800000) return alert("Immagine troppo pesante! Max 800KB.");
            const reader = new FileReader();
            reader.onload = () => {
                currentImgData = reader.result;
                document.getElementById('preview-box').innerHTML = `<img src="${currentImgData}">`;
            };
            reader.readAsDataURL(file);
        };

        async function init() {
            try {
                const [resS, resJ] = await Promise.all([fetch('stirpi_database.json'), fetch('classi_database.json')]);
                dbStirpi = (await resS.json()).items;
                const jobs = (await resJ.json()).items;
                const sStirpe = document.getElementById('select-stirpe');
                const sJob = document.getElementById('select-job');
                
                dbStirpi.forEach(s => sStirpe.innerHTML += `<option value="${s.nome}">${s.nome}</option>`);
                jobs.forEach(j => sJob.innerHTML += `<option value="${j.nome}">${j.nome}</option>`);
                
                aggiornaEredita();
                renderPL();
            } catch (e) { console.error("Database offline."); }
        }

        window.aggiornaEredita = () => {
            const isMez = document.getElementById('mezzosangue').checked;
            const stirpeSel = document.getElementById('select-stirpe').value;
            const sEredita = document.getElementById('select-eredita');
            sEredita.innerHTML = "";
            dbStirpi.forEach(s => {
                if (isMez || s.nome === stirpeSel) {
                    s.eredita.forEach(e => sEredita.innerHTML += `<option value="${e.nome}">[${s.nome}] ${e.nome}</option>`);
                }
            });
        };

        function renderPL() {
            const display = document.getElementById('pl-display');
            display.innerHTML = "";
            for(let i=0; i<8; i++) display.innerHTML += '<div class="dot limite"></div>';
            for(let i=0; i<3; i++) display.innerHTML += '<div class="dot sovraccarico"></div>';
        }

        document.getElementById('btn-save').addEventListener('click', async () => {
            const nome = document.getElementById('nome').value;
            if(!nome) return alert("Inserisci un nome per la Matricola!");

            const pg = {
                nome,
                anima: document.getElementById('anima').value,
                core: document.getElementById('core').value,
                motto: document.getElementById('motto').value,
                difetto: document.getElementById('difetto').value,
                nemesi: document.getElementById('nemesi').value,
                tratti: Array.from(document.querySelectorAll('.tratto-input')).map(i => i.value).filter(v => v !== ""),
                stirpe: document.getElementById('select-stirpe').value,
                job: document.getElementById('select-job').value,
                eredita: document.getElementById('select-eredita').value,
                knight: document.getElementById('nome-knight').value,
                frame: document.getElementById('frame-knight').value,
                immagine: currentImgData,
                creatoDa: isMaster ? "MASTER" : userId,
                timestamp: serverTimestamp(),
                memorie: [], // Inizialmente vuote, sbloccabili nell'archivio
                capacita: [],
                oggetti: []
            };

            try {
                const btn = document.getElementById('btn-save');
                btn.innerText = "TRASMISSIONE DATI...";
                btn.disabled = true;
                
                // Salvataggio con ID univoco basato sul tempo
                await setDoc(doc(db, "personaggi", `${nome.toLowerCase()}-${Date.now()}`), pg);
                
                alert("Matricola Archiviata con successo!");
                window.location.href = "archivio.html";
            } catch (e) {
                console.error(e);
                alert("Errore nel salvataggio. Assicurati che le regole di scrittura su Firebase siano attive (if true).");
                document.getElementById('btn-save').innerText = "RIPROVA";
                document.getElementById('btn-save').disabled = false;
            }
        });

        window.onload = init;
    </script>
</body>
</html>
