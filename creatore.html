<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Inizializzazione Matricola</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; --neon-orange: #ff8c00; --bg-dark: #0a0a0c; }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; padding: 20px; line-height: 1.4; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-nav { text-decoration: none; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid var(--neon-blue); padding: 5px 15px; transition: 0.3s; }
        .btn-nav:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 10px var(--neon-blue); }

        h1 { font-family: 'Orbitron'; color: var(--neon-blue); text-transform: uppercase; margin: 0; letter-spacing: 2px; font-size: 1.5rem; }
        h2 { font-family: 'Orbitron'; color: var(--neon-pink); font-size: 1rem; margin-top: 0; }
        
        .form-section { background: rgba(255,255,255,0.05); padding: 20px; border: 1px solid #333; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; font-family: 'Rajdhani'; font-size: 1.1rem; box-sizing: border-box; }
        
        .img-preview { width: 100%; max-height: 250px; border: 2px dashed #444; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        .img-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .mezzosangue-panel { grid-column: 1 / -1; background: rgba(255, 255, 0, 0.1); padding: 15px; border: 2px solid var(--neon-yellow); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--neon-yellow); }
        input:checked + .slider:before { transform: translateX(30px); }

        .traits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }
        .dot.limite { background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }
        .dot.sovraccarico { background: var(--neon-pink); box-shadow: 0 0 8px var(--neon-pink); }

        .action-bar { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 20px; }
        button { background: transparent; padding: 15px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        
        .btn-save { border: 2px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-save:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }
        
        .btn-reset { border: 2px solid var(--neon-orange); color: var(--neon-orange); }
        .btn-reset:hover { background: var(--neon-orange); color: black; box-shadow: 0 0 20px var(--neon-orange); }

        #output-scheda { display: none; margin-top: 30px; border: 2px solid var(--neon-pink); padding: 30px; background: #000; }
    </style>
</head>
<body>

    <header class="nav-header">
        <h1>Inizializzazione Matricola</h1>
        <a href="index.html" class="btn-nav">HOME DASHBOARD</a>
    </header>

    <form id="pg-form">
        <div class="form-section">
            <div class="full-width"><h2>1. Profilo e Visuale</h2></div>
            <div>
                <label>NOME MATRICOLA</label>
                <input type="text" id="nome">
                <label style="margin-top:15px;">ANIMA</label>
                <input type="text" id="anima">
            </div>
            <div>
                <label>IMMAGINE (Upload o Link)</label>
                <input type="file" id="img-file" accept="image/*" onchange="handleImage(event)" style="font-size: 0.8rem; padding: 5px;">
                <input type="text" id="img-url" placeholder="Incolla URL immagine" oninput="handleURL(this.value)" style="margin-top:5px;">
                <div class="img-preview" id="preview-box">
                    <span style="color:#444;">NESSUN DATO VISIVO</span>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="full-width"><h2>2. Tratti e Identità</h2></div>
            <div>
                <label>CORE</label>
                <input type="text" id="core">
                <label style="margin-top:15px;">DIFETTO</label>
                <input type="text" id="difetto">
            </div>
            <div>
                <label>MOTTO</label>
                <input type="text" id="motto">
                <label style="margin-top:15px;">NEMESI</label>
                <input type="text" id="nemesi">
            </div>
            <div class="full-width">
                <label>I 4 TRATTI (d8)</label>
                <div class="traits-grid">
                    <input type="text" class="tratto-input" placeholder="Tratto 1">
                    <input type="text" class="tratto-input" placeholder="Tratto 2">
                    <input type="text" class="tratto-input" placeholder="Tratto 3">
                    <input type="text" class="tratto-input" placeholder="Tratto 4">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="full-width"><h2>3. Stirpe e Knight</h2></div>
            <div><label>STIRPE</label><select id="select-stirpe" onchange="aggiornaEredita()"></select></div>
            <div><label>JOB</label><select id="select-job"></select></div>
            <div class="mezzosangue-panel" onclick="document.getElementById('mezzosangue').click()">
                <span style="color:var(--neon-yellow); font-family:'Orbitron';">⚠ PROTOCOLLO MEZZOSANGUE</span>
                <label class="switch"><input type="checkbox" id="mezzosangue" onchange="aggiornaEredita()"><span class="slider"></span></label>
            </div>
            <div class="full-width"><label>EREDITÀ</label><select id="select-eredita"></select></div>
            <div><label>NOME KNIGHT</label><input type="text" id="nome-knight"></div>
            <div><label>FRAME</label><input type="text" id="frame-knight"></div>
        </div>
    </form>

    <div class="action-bar">
        <button class="btn-reset" onclick="clearFields()">PULISCI CAMPI</button>
        <button class="btn-save" onclick="generaScheda()">ARCHIVIA NEL CLOUD</button>
    </div>

    <div id="output-scheda"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentImgData = "";
        let dbStirpi = [];

        // Gestione Immagini
        window.handleImage = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                currentImgData = reader.result;
                document.getElementById('preview-box').innerHTML = `<img src="${currentImgData}">`;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        window.handleURL = (url) => {
            currentImgData = url;
            document.getElementById('preview-box').innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='URL Errato'">`;
        };

        // Pulizia Campi
        window.clearFields = () => {
            if(confirm("Sei sicuro di voler resettare tutti i dati inseriti?")) {
                document.getElementById('pg-form').reset();
                currentImgData = "";
                document.getElementById('preview-box').innerHTML = `<span style="color:#444;">NESSUN DATO VISIVO</span>`;
                document.getElementById('output-scheda').style.display = 'none';
                aggiornaEredita();
            }
        };

        async function init() {
            try {
                const [resS, resJ] = await Promise.all([fetch('stirpi_database.json'), fetch('classi_database.json')]);
                dbStirpi = (await resS.json()).items;
                const jobs = (await resJ.json()).items;
                const sStirpe = document.getElementById('select-stirpe');
                const sJob = document.getElementById('select-job');
                dbStirpi.forEach(s => sStirpe.innerHTML += `<option value="${s.nome}">${s.nome}</option>`);
                jobs.forEach(j => sJob.innerHTML += `<option value="${j.nome}">${j.nome}</option>`);
                aggiornaEredita();
            } catch (e) { console.error(e); }
        }

        window.aggiornaEredita = () => {
            const isMez = document.getElementById('mezzosangue').checked;
            const stirpe = document.getElementById('select-stirpe').value;
            const sEredita = document.getElementById('select-eredita');
            sEredita.innerHTML = "";
            dbStirpi.forEach(s => {
                if (isMez || s.nome === stirpe) {
                    s.eredita.forEach(e => sEredita.innerHTML += `<option value="${e.nome}">[${s.nome}] ${e.nome}</option>`);
                }
            });
        };

        window.generaScheda = async () => {
            const nome = document.getElementById('nome').value;
            if(!nome) return alert("Inserisci il nome!");

            const pg = {
                nome, anima: document.getElementById('anima').value,
                core: document.getElementById('core').value, motto: document.getElementById('motto').value,
                difetto: document.getElementById('difetto').value, nemesi: document.getElementById('nemesi').value,
                tratti: Array.from(document.querySelectorAll('.tratto-input')).map(i => i.value).filter(v => v !== ""),
                stirpe: document.getElementById('select-stirpe').value, job: document.getElementById('select-job').value,
                eredita: document.getElementById('select-eredita').value,
                knight: document.getElementById('nome-knight').value, frame: document.getElementById('frame-knight').value,
                immagine: currentImgData,
                timestamp: serverTimestamp()
            };

            const id = `${nome.toLowerCase().replace(/\s+/g, '-')}-${Date.now()}`;
            try {
                await setDoc(doc(db, "personaggi", id), pg);
                document.getElementById('output-scheda').style.display = 'block';
                document.getElementById('output-scheda').innerHTML = `<h2 style="color:var(--neon-blue);">ARCHIVIATO CON SUCCESSO</h2><p>ID: ${id}</p><button onclick="window.print()" style="border-color:white; color:white;">STAMPA SCHEDA</button>`;
            } catch (e) { alert("Errore di connessione al database!"); }
        };
        window.onload = init;
    </script>
</body>
</html>
