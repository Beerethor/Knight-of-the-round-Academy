<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTRA - Protocollo Inizializzazione</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; --bg-dark: #0a0a0c; }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; padding: 20px; line-height: 1.4; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-nav { text-decoration: none; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid var(--neon-blue); padding: 5px 15px; }
        .btn-logout { background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); padding: 5px 15px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; margin-left: 10px; }

        .role-badge { font-family: 'Orbitron'; font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; border: 1px solid; margin-left: 10px; }
        .master { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 5px var(--neon-pink); }
        .player { border-color: var(--neon-blue); color: var(--neon-blue); }

        .form-section { background: rgba(255,255,255,0.05); padding: 20px; border: 1px solid #333; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-left: 3px solid var(--neon-blue); }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; font-family: 'Rajdhani'; font-size: 1.1rem; box-sizing: border-box; }
        
        .img-preview { width: 100%; height: 250px; border: 2px dashed #444; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; position: relative; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }

        .pl-visualizer { display: flex; gap: 8px; margin-top: 10px; }
        .dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); }
        .dot.limite { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .dot.sovraccarico { background: #fff; box-shadow: 0 0 10px #fff; }

        .btn-save { width: 100%; background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 20px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-save:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }
        .btn-save:disabled { border-color: #444; color: #444; cursor: wait; }
    </style>
</head>
<body>

    <header class="nav-header">
        <div>
            <h1 style="display:inline-block; font-size: 1.2rem; margin:0;">GENERATORE MATRICOLE</h1>
            <span id="role-display" class="role-badge">SINCRONIZZAZIONE...</span>
        </div>
        <div style="display: flex; align-items: center;">
            <a href="archivio.html" class="btn-nav">ARCHIVIO</a>
            <button class="btn-logout" id="btn-logout">LOGOUT</button>
        </div>
    </header>

    <div id="pg-form">
        <div class="form-section">
            <div class="full-width"><h2 style="font-family:'Orbitron'; color:var(--neon-pink); margin:0;">1. BIOMETRIA</h2></div>
            <div>
                <label>NOME (Memoria I)</label>
                <input type="text" id="nome" placeholder="Es: Kael">
                <label style="margin-top:15px;">ANIMA (Tag)</label>
                <input type="text" id="anima" placeholder="Es: Vetro, Tempesta">
            </div>
            <div>
                <label>RITRATTO (Max 800kb)</label>
                <input type="file" id="img-file" accept="image/*" onchange="handleImage(event)">
                <div class="img-preview" id="preview-box">SISTEMA OTTICO OFFLINE</div>
            </div>
        </div>

        <div class="form-section">
            <div class="full-width"><h2 style="font-family:'Orbitron'; color:var(--neon-pink); margin:0;">2. PARAMETRI PSICHICI</h2></div>
            <div>
                <label>CORE</label><input type="text" id="core">
                <label style="margin-top:15px;">DIFETTO</label><input type="text" id="difetto">
            </div>
            <div>
                <label>MOTTO</label><input type="text" id="motto">
                <label style="margin-top:15px;">NEMESI</label><input type="text" id="nemesi">
            </div>
            <div class="full-width">
                <label>I 4 TRATTI d8 INIZIALI</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" class="tratto-input" placeholder="Tratto 1">
                    <input type="text" class="tratto-input" placeholder="Tratto 2">
                    <input type="text" class="tratto-input" placeholder="Tratto 3">
                    <input type="text" class="tratto-input" placeholder="Tratto 4">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="full-width"><h2 style="font-family:'Orbitron'; color:var(--neon-pink); margin:0;">3. CONFIGURAZIONE KNIGHT</h2></div>
            <div><label>STIRPE</label><select id="select-stirpe" onchange="aggiornaEredita()"></select></div>
            <div><label>JOB</label><select id="select-job"></select></div>
            
            <div class="full-width" style="background:rgba(255,255,0,0.05); padding:10px; border:1px solid rgba(255,255,0,0.3);">
                <label style="color:var(--neon-yellow); cursor:pointer;">
                    <input type="checkbox" id="mezzosangue" onchange="aggiornaEredita()" style="width:auto;"> 
                    ATTIVA PROTOCOLLO MEZZOSANGUE (Accesso a tutte le Eredità)
                </label>
            </div>

            <div class="full-width"><label>EREDITÀ DISPONIBILI</label><select id="select-eredita"></select></div>
        </div>
    </div>

    <button class="btn-save" id="btn-save">INVIA DATI AL TERMINALE ARCHIVIO</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
            authDomain: "kotra-8da26.firebaseapp.com",
            projectId: "kotra-8da26",
            storageBucket: "kotra-8da26.firebasestorage.app",
            messagingSenderId: "932848394064",
            appId: "1:932848394064:web:d368c9ae301b54bab01655"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let isMaster = false;
        let currentImgData = "";
        let dbStirpi = [];

        // 1. RECUPERO RUOLO MASTER DA FIREBASE
        async function checkMasterRole(email) {
            try {
                const docSnap = await getDoc(doc(db, "config", "permissions"));
                if (docSnap.exists()) {
                    return email === docSnap.data().masterEmail;
                }
            } catch (e) { console.error("Errore permessi:", e); }
            return false;
        }

        // 2. GESTIONE SESSIONE
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                isMaster = await checkMasterRole(user.email);
                
                const badge = document.getElementById('role-display');
                badge.innerText = isMaster ? "AUTORITÀ MASTER" : `UTENTE: ${user.email}`;
                badge.className = `role-badge ${isMaster ? 'master' : 'player'}`;
                
                initForm();
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // 3. LOGICA IMMAGINI
        window.handleImage = (e) => {
            const file = e.target.files[0];
            if(file && file.size > 850000) return alert("File troppo pesante (Max 800KB)!");
            const reader = new FileReader();
            reader.onload = () => {
                currentImgData = reader.result;
                document.getElementById('preview-box').innerHTML = `<img src="${currentImgData}">`;
            };
            reader.readAsDataURL(file);
        };

        // 4. CARICAMENTO DATI JSON
        async function initForm() {
            try {
                const [resS, resJ] = await Promise.all([
                    fetch('stirpi_database.json'), 
                    fetch('classi_database.json')
                ]);
                dbStirpi = (await resS.json()).items;
                const jobs = (await resJ.json()).items;
                
                const sStirpe = document.getElementById('select-stirpe');
                const sJob = document.getElementById('select-job');
                
                sStirpe.innerHTML = dbStirpi.map(s => `<option value="${s.nome}">${s.nome}</option>`).join('');
                sJob.innerHTML = jobs.map(j => `<option value="${j.nome}">${j.nome}</option>`).join('');
                
                aggiornaEredita();
            } catch (e) { console.error("Database JSON mancanti."); }
        }

        window.aggiornaEredita = () => {
            const isMez = document.getElementById('mezzosangue').checked;
            const stirpeSel = document.getElementById('select-stirpe').value;
            const sEredita = document.getElementById('select-eredita');
            
            let options = "";
            dbStirpi.forEach(s => {
                if (isMez || s.nome === stirpeSel) {
                    s.eredita.forEach(e => {
                        options += `<option value="${e.nome}">${isMez ? '['+s.nome+'] ' : ''}${e.nome}</option>`;
                    });
                }
            });
            sEredita.innerHTML = options;
        };

        // 5. SALVATAGGIO
        document.getElementById('btn-save').addEventListener('click', async () => {
            const nome = document.getElementById('nome').value.trim();
            if(!nome) return alert("Identificativo Matricola mancante!");

            const pg = {
                nome: nome,
                anima: document.getElementById('anima').value,
                core: document.getElementById('core').value,
                motto: document.getElementById('motto').value,
                difetto: document.getElementById('difetto').value,
                nemesi: document.getElementById('nemesi').value,
                tratti: Array.from(document.querySelectorAll('.tratto-input')).map(i => i.value).filter(v => v !== ""),
                stirpe: document.getElementById('select-stirpe').value,
                job: document.getElementById('select-job').value,
                eredita: document.getElementById('select-eredita').value,
                immagine: currentImgData,
                
                // METADATI DI PROPRIETÀ
                creatoDa: isMaster ? "MASTER" : currentUser.uid,
                ownerEmail: currentUser.email,
                timestamp: serverTimestamp(),
                
                // STATO INIZIALE
                memorie: [],
                capacita: [],
                oggetti: []
            };

            try {
                const btn = document.getElementById('btn-save');
                btn.disabled = true;
                btn.innerText = "TRASMISSIONE IN CORSO...";

                // ID univoco per evitare sovrascritture accidentali
                const docId = `${currentUser.uid}-${Date.now()}`;
                await setDoc(doc(db, "personaggi", docId), pg);
                
                alert("Sincronizzazione completata. Benvenuta, Matricola.");
                window.location.href = "archivio.html";
            } catch (e) {
                alert("Errore di trasmissione! Controlla la connessione.");
                console.error(e);
                document.getElementById('btn-save').disabled = false;
                document.getElementById('btn-save').innerText = "RIPROVA INVIO";
            }
        });
    </script>
</body>
</html>
