<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>KOTRA - Inizializzazione Matricola</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-yellow: #ffff00; --bg-dark: #0a0a0c; }
        body { background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; padding: 20px; }
        h1 { font-family: 'Orbitron'; color: var(--neon-blue); text-transform: uppercase; border-bottom: 2px solid #333; margin-bottom: 30px; }
        h2 { font-family: 'Orbitron'; color: var(--neon-pink); font-size: 1rem; margin-top: 0; }
        
        .form-section { background: rgba(255,255,255,0.05); padding: 20px; border: 1px solid #333; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 5px; letter-spacing: 1px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; font-family: 'Rajdhani'; font-size: 1.1rem; box-sizing: border-box; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        
        .checkbox-container { display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 0, 0.05); padding: 10px; border: 1px dashed var(--neon-yellow); grid-column: 1 / -1; }
        
        .pl-visualizer { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 1px solid white; }
        .dot.limite { background: var(--neon-blue); box-shadow: 0 0 5px var(--neon-blue); }
        .dot.sovraccarico { background: var(--neon-pink); box-shadow: 0 0 5px var(--neon-pink); }

        .traits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button { background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 15px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; margin-top: 10px; }
        button:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }

        #output-scheda { display: none; margin-top: 30px; border: 2px solid var(--neon-pink); padding: 30px; background: #000; }
    </style>
</head>
<body>

    <h1>Protocollo Creazione Matricola</h1>

    <div class="form-section">
        <div class="full-width"><h2>Dati Identificativi</h2></div>
        <div>
            <label>NOME DELLA MATRICOLA</label>
            <input type="text" id="nome" placeholder="Es: Arthur Pendragon">
        </div>
        <div>
            <label>IL MIO MOTTO PERSONALE</label>
            <input type="text" id="motto" placeholder="Es: Oltre ogni limite">
        </div>
        <div>
            <label>CORE</label>
            <input type="text" id="core" placeholder="Es: Coraggio Ardente">
        </div>
        <div>
            <label>ANIMA</label>
            <select id="anima">
                <option value="d6">d6</option>
                <option value="d8">d8</option>
                <option value="d10">d10</option>
                <option value="d12">d12</option>
            </select>
        </div>
    </div>

    <div class="form-section">
        <div class="full-width"><h2>Stirpe e Percorso</h2></div>
        <div>
            <label>STIRPE</label>
            <select id="select-stirpe" onchange="aggiornaEredita()"></select>
        </div>
        <div>
            <label>JOB</label>
            <select id="select-job"></select>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="mezzosangue" onchange="aggiornaEredita()">
            <label style="margin:0; color:var(--neon-yellow);">PROTOCOLLO MEZZOSANGUE (Accedi a tutte le Eredità)</label>
        </div>
        <div class="full-width">
            <label>EREDITÀ SELEZIONATA</label>
            <select id="select-eredita"></select>
        </div>
    </div>

    <div class="form-section">
        <div class="full-width"><h2>Unità Knight & Tratti</h2></div>
        <div>
            <label>NOME DEL KNIGHT</label>
            <input type="text" id="nome-knight">
        </div>
        <div>
            <label>FRAME</label>
            <input type="text" id="frame-knight">
        </div>
        <div class="full-width">
            <label>I 4 TRATTI DEL KNIGHT</label>
            <div class="traits-grid">
                <input type="text" class="tratto-input" placeholder="Tratto 1 (es. Ali Jet)">
                <input type="text" class="tratto-input" placeholder="Tratto 2 (es. Spada Dragon)">
                <input type="text" class="tratto-input" placeholder="Tratto 3 (es. Scudo Cinetico)">
                <input type="text" class="tratto-input" placeholder="Tratto 4 (es. Sensori Advanced)">
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="full-width"><h2>Stato Risorse Operative</h2></div>
        <div class="full-width">
            <label>PUNTI LIMITE (PL) E SOVRACCARICO</label>
            <div id="pl-display" class="pl-visualizer"></div>
            <small id="pl-info" style="color: #888; margin-top: 5px; display: block;">Limite: 8 | Sovraccarico: 3 (Base)</small>
        </div>
    </div>

    <button onclick="generaScheda()">Genera Scheda Matricola</button>
    <div id="output-scheda"></div>

    <script>
        let database = { stirpi: [], job: [] };

        async function inizializza() {
            try {
                const [resS, resJ] = await Promise.all([
                    fetch('stirpi_database.json'),
                    fetch('classi_database.json')
                ]);
                database.stirpi = (await resS.json()).items;
                database.job = (await resJ.json()).items;
                popolaMenu();
                renderPL();
            } catch (e) { console.error(e); }
        }

        function popolaMenu() {
            const sStirpe = document.getElementById('select-stirpe');
            const sJob = document.getElementById('select-job');
            database.stirpi.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(s => sStirpe.innerHTML += `<option value="${s.nome}">${s.nome}</option>`);
            database.job.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(j => sJob.innerHTML += `<option value="${j.nome}">${j.nome}</option>`);
            aggiornaEredita();
        }

        function aggiornaEredita() {
            const isMez = document.getElementById('mezzosangue').checked;
            const stirpe = document.getElementById('select-stirpe').value;
            const sEredita = document.getElementById('select-eredita');
            sEredita.innerHTML = "";
            database.stirpi.forEach(s => {
                if (isMez || s.nome === stirpe) {
                    s.eredita.forEach(e => {
                        sEredita.innerHTML += `<option value="${e.nome}">[${s.nome}] ${e.nome}</option>`;
                    });
                }
            });
        }

        function renderPL() {
            const display = document.getElementById('pl-display');
            const pLimite = 8;
            const pSovraccarico = 3; // Solo Nome inizialmente
            display.innerHTML = "";
            for(let i=0; i<pLimite; i++) display.innerHTML += '<div class="dot limite"></div>';
            for(let i=0; i<pSovraccarico; i++) display.innerHTML += '<div class="dot sovraccarico"></div>';
        }

        function generaScheda() {
            const out = document.getElementById('output-scheda');
            const trattiInputs = document.querySelectorAll('.tratto-input');
            let trattiLista = [];
            trattiInputs.forEach(input => { if(input.value) trattiLista.push(input.value); });

            out.style.display = 'block';
            out.innerHTML = `
                <div style="text-align:center; border-bottom: 1px solid var(--neon-pink); padding-bottom: 10px; margin-bottom: 20px;">
                    <h2 style="color:var(--neon-blue); font-size: 2rem; margin:0;">${document.getElementById('nome').value.toUpperCase() || 'MATRICOLA IGNOTA'}</h2>
                    <i style="color:var(--neon-yellow);">"${document.getElementById('motto').value}"</i>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <p><b style="color:var(--neon-pink);">STIRPE:</b> ${document.getElementById('select-stirpe').value}</p>
                        <p><b style="color:var(--neon-pink);">JOB:</b> ${document.getElementById('select-job').value}</p>
                        <p><b style="color:var(--neon-pink);">EREDITÀ:</b> ${document.getElementById('select-eredita').value}</p>
                    </div>
                    <div>
                        <p><b style="color:var(--neon-blue);">KNIGHT:</b> ${document.getElementById('nome-knight').value}</p>
                        <p><b style="color:var(--neon-blue);">FRAME:</b> ${document.getElementById('frame-knight').value}</p>
                        <p><b style="color:var(--neon-blue);">ANIMA:</b> ${document.getElementById('anima').value}</p>
                    </div>
                </div>
                <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
                    <b style="color:var(--neon-yellow);">TRATTI ATTIVI:</b>
                    <p>${trattiLista.join(' • ') || 'Nessun tratto inserito'}</p>
                </div>
                <button onclick="window.print()" style="border-color:white; color:white;">Stampa Scheda Ufficiale</button>
            `;
            out.scrollIntoView({behavior: "smooth"});
        }

        window.onload = inizializza;
    </script>
</body>
</html>
