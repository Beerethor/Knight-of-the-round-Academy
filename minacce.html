<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOTRA - Database Minacce</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-yellow: #ffff00;
            --bg-dark: #06070a;
            --panel-bg: rgba(15, 16, 22, 0.98);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a0a14 0%, #06070a 100%);
            background-attachment: fixed;
        }

        /* HEADER */
        .nav-header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon-pink); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.9rem; margin: 0; text-shadow: 0 0 10px var(--neon-pink); }

        .btn-action { 
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); 
            padding: 8px 12px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.65rem; transition: 0.2s;
        }
        .btn-action:hover { background: var(--neon-pink); color: white; }

        .container { padding: 15px; max-width: 1200px; margin: auto; }
        
        /* PANNELLO MASTER (MODULO) */
        .master-panel { display: none; background: var(--panel-bg); border: 1px solid var(--neon-yellow); padding: 20px; margin-bottom: 30px; box-shadow: 0 0 20px rgba(255, 0, 122, 0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 10px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }

        input, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; font-family: 'Rajdhani'; font-size: 1rem; }
        input:focus, textarea:focus { border-color: var(--neon-pink); outline: none; }
        label { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.55rem; display: block; margin-bottom: 5px; margin-top: 5px; }

        /* SCHEDA MINACCIA */
        .threat-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .threat-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .threat-grid { grid-template-columns: repeat(3, 1fr); } }

        .threat-card { background: rgba(20, 21, 28, 0.95); border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; border-top: 3px solid var(--neon-pink); position: relative; }
        .threat-img { width: 100%; height: 220px; object-fit: cover; filter: grayscale(20%) contrast(110%); }
        .threat-content { padding: 15px; }
        .threat-name { font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .badge { display: inline-block; padding: 3px 10px; font-family: 'Orbitron'; font-size: 0.7rem; border: 1px solid; margin-right: 8px; margin-bottom: 10px; }
        .bg-diff { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .bg-pot { border-color: var(--neon-yellow); color: var(--neon-yellow); background: rgba(255, 255, 0, 0.05); }

        .section-label { font-family: 'Orbitron'; font-size: 0.55rem; color: var(--neon-pink); margin-top: 15px; display: block; border-bottom: 1px solid rgba(255, 0, 122, 0.2); padding-bottom: 3px; margin-bottom: 8px; }
        
        .ferita-item { 
            background: rgba(255, 255, 255, 0.03); padding: 10px; margin: 5px 0; border: 1px solid #222; 
            cursor: pointer; display: flex; align-items: center; font-size: 0.95rem; transition: 0.2s;
        }
        .ferita-item::before { content: '▢'; margin-right: 12px; color: var(--neon-pink); font-family: 'Orbitron'; }
        .ferita-item.damaged { opacity: 0.3; text-decoration: line-through; border-color: var(--neon-pink); background: rgba(255, 0, 122, 0.1); }
        .ferita-item.damaged::before { content: '▣'; }

        .tratto-extra { font-size: 0.85rem; color: #ccc; padding-left: 10px; margin: 3px 0; font-style: italic; border-left: 1px solid var(--neon-blue); }

        .tecnica-box { font-size: 0.9rem; color: var(--neon-blue); border: 1px solid #333; padding: 8px; margin-top: 5px; background: rgba(0, 242, 255, 0.03); }
        .debole-box { margin-top: 15px; font-size: 0.85rem; color: var(--neon-yellow); border: 1px dashed var(--neon-yellow); padding: 10px; }

        .admin-controls { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .btn-edit { flex: 1; border: 1px solid var(--neon-yellow); color: var(--neon-yellow); background: none; font-family: 'Orbitron'; font-size: 0.6rem; padding: 8px; cursor: pointer; }
        .btn-del { flex: 1; border: 1px solid #ff4444; color: #ff4444; background: none; font-family: 'Orbitron'; font-size: 0.6rem; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>

<header class="nav-header">
    <h1 class="header-title">KOTRA // THREAT_DATABASE</h1>
    <div>
        <a href="index.html" class="btn-action">TORNA_HUB</a>
        <button class="btn-action" id="btn-add" style="display:none; border-color:var(--neon-yellow); color:var(--neon-yellow);" onclick="togglePanel()">+ NUOVA_MINACCIA</button>
    </div>
</header>

<div class="container">
    <div id="master-panel" class="master-panel">
        <input type="hidden" id="edit-id"> <div class="form-grid">
            <div><label>NOME MINACCIA</label><input type="text" id="m-nome" placeholder="Codice identificativo..."></div>
            <div><label>DIFFICOLTÀ (1-6)</label><input type="number" id="m-diff" value="1" min="1" max="6"></div>
            <div><label>POTENZA (1-5)</label><input type="number" id="m-pot" value="1" min="1" max="5"></div>
        </div>
        
        <label>URL IMMAGINE ESTERNO</label>
        <input type="text" id="m-img-url" placeholder="Incolla link .jpg o .png (es. da Imgur o PostImages)">
        
        <label style="margin-top:15px">DESCRIZIONE BREVE</label>
        <textarea id="m-desc" rows="1"></textarea>

        <div class="form-grid" style="margin-top:15px">
            <div><label>FERITE / TRATTI VITALI (1 per riga)</label><textarea id="m-tratti" rows="3" placeholder="Cuore metallico&#10;Sensori ottici"></textarea></div>
            <div><label>TRATTI AGGIUNTIVI (1 per riga)</label><textarea id="m-extra" rows="3" placeholder="Volo&#10;Resistenza al fuoco"></textarea></div>
            <div><label>TECNICA MINACCIA</label><textarea id="m-tecnica" rows="3" placeholder="Effetto della tecnica..."></textarea></div>
        </div>
        
        <label>PUNTO DEBOLE</label>
        <input type="text" id="m-debole" placeholder="Cosa la rende vulnerabile?">

        <button class="btn-action" style="margin-top:20px; width:100%; height:50px; font-size:1rem; border-color:var(--neon-yellow); color:var(--neon-yellow);" id="btn-save" onclick="saveThreat()">ARCHIVIA RECORD NEL DATABASE</button>
        <button class="btn-action" style="margin-top:10px; width:100%; border-color:#666; color:#666;" onclick="location.reload()">ANNULLA OPERAZIONE</button>
    </div>

    <div id="threat-list" class="threat-grid">
        <div style="color:var(--neon-blue); font-family:'Orbitron'; padding:40px; text-align:center; width:100%;">
            SINCRONIZZAZIONE DATABASE IN CORSO...
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";

    let allThreats = [];

    window.togglePanel = () => {
        document.getElementById('master-panel').style.display = 'block';
        document.getElementById('edit-id').value = ""; // Reset se era in edit
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === MASTER_EMAIL) document.getElementById('btn-add').style.display = 'inline-block';
            loadThreats();
        } else { window.location.href = "index.html"; }
    });

    // FUNZIONE DI SALVATAGGIO (Edit o New)
    window.saveThreat = async () => {
        const editId = document.getElementById('edit-id').value;
        const imgUrl = document.getElementById('m-img-url').value;
        const btn = document.getElementById('btn-save');

        if(!imgUrl) return alert("Errore: URL immagine mancante.");

        btn.disabled = true;
        btn.innerText = "TRASMISSIONE DATI...";

        try {
            const data = {
                nome: document.getElementById('m-nome').value || "Sconosciuto",
                diff: document.getElementById('m-diff').value,
                pot: document.getElementById('m-pot').value,
                desc: document.getElementById('m-desc').value,
                immagine: imgUrl,
                tratti: document.getElementById('m-tratti').value.split('\n').filter(t => t.trim() !== ""),
                extra: document.getElementById('m-extra').value.split('\n').filter(t => t.trim() !== ""),
                tecnica: document.getElementById('m-tecnica').value,
                debole: document.getElementById('m-debole').value,
                updatedAt: new Date()
            };

            if (editId) {
                await updateDoc(doc(db, "minacce", editId), data);
            } else {
                data.createdAt = new Date();
                await addDoc(collection(db, "minacce"), data);
            }
            
            location.reload();
        } catch (e) {
            alert("Errore critico: " + e.message);
            btn.disabled = false;
            btn.innerText = "RIPROVA SALVATAGGIO";
        }
    };

    // CARICAMENTO LISTA
    async function loadThreats() {
        const container = document.getElementById('threat-list');
        const q = query(collection(db, "minacce"), orderBy("updatedAt", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = "";
        
        allThreats = snap.docs.map(d => ({id: d.id, ...d.data()}));

        if(allThreats.length === 0) {
            container.innerHTML = "<div style='color:#444; padding:40px; text-align:center; width:100%;'>NESSUN RECORD RILEVATO.</div>";
            return;
        }

        allThreats.forEach(m => {
            const card = document.createElement('div');
            card.className = 'threat-card';
            card.innerHTML = `
                <img src="${m.immagine}" class="threat-img" onerror="this.src='https://via.placeholder.com/400x200?text=IMG_NOT_FOUND'">
                <div class="threat-content">
                    <div class="threat-name">${m.nome}</div>
                    <span class="badge bg-diff">DIFF: ${m.diff}</span>
                    <span class="badge bg-pot">POT: ${m.pot}</span>
                    
                    <p style="font-size:0.85rem; color:#bbb; margin:10px 0;">${m.desc}</p>
                    
                    <span class="section-label">FERITE // TRATTI VITALI</span>
                    ${m.tratti.map(t => `<div class="ferita-item" onclick="this.classList.toggle('damaged')">${t}</div>`).join('')}
                    
                    ${m.extra && m.extra.length > 0 ? `
                        <span class="section-label">TRATTI AGGIUNTIVI</span>
                        ${m.extra.map(e => `<div class="tratto-extra">${e}</div>`).join('')}
                    ` : ''}

                    <span class="section-label">TECNICA MINACCIA</span>
                    <div class="tecnica-box">${m.tecnica}</div>

                    <div class="debole-box">
                        <b style="font-size:0.6rem; font-family:'Orbitron';">VULNERABILITÀ:</b><br>${m.debole}
                    </div>

                    ${auth.currentUser.email === MASTER_EMAIL ? `
                        <div class="admin-controls">
                            <button class="btn-edit" onclick="editThreat('${m.id}')">MODIFICA</button>
                            <button class="btn-del" onclick="deleteThreat('${m.id}')">ELIMINA</button>
                        </div>
                    ` : ''}
                </div>
            `;
            container.appendChild(card);
        });
    }

    // GESTIONE MODIFICA
    window.editThreat = (id) => {
        const m = allThreats.find(t => t.id === id);
        if(!m) return;

        document.getElementById('edit-id').value = m.id;
        document.getElementById('m-nome').value = m.nome;
        document.getElementById('m-img-url').value = m.immagine;
        document.getElementById('m-diff').value = m.diff;
        document.getElementById('m-pot').value = m.pot;
        document.getElementById('m-desc').value = m.desc;
        document.getElementById('m-tratti').value = m.tratti.join('\n');
        document.getElementById('m-extra').value = (m.extra || []).join('\n');
        document.getElementById('m-tecnica').value = m.tecnica;
        document.getElementById('m-debole').value = m.debole;

        document.getElementById('master-panel').style.display = 'block';
        document.getElementById('btn-save').innerText = "CONFERMA MODIFICHE RECORD";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // GESTIONE ELIMINAZIONE
    window.deleteThreat = async (id) => {
        if(confirm("PROTOCOLLO EPURAZIONE: Eliminare definitivamente questo record?")) {
            await deleteDoc(doc(db, "minacce", id));
            location.reload();
        }
    };
</script>
</body>
</html>
