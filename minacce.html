<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOTRA - Archivio Minacce</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-yellow: #ffff00;
            --bg-dark: #06070a;
            --panel-bg: rgba(15, 16, 22, 0.98);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a0a14 0%, #06070a 100%);
            background-attachment: fixed;
        }

        .nav-header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon-pink); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 1rem; margin: 0; }

        .btn-action { 
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); 
            padding: 10px 15px; font-family: 'Orbitron'; cursor: pointer; text-decoration: none; font-size: 0.7rem; 
        }
        .btn-action:hover { background: var(--neon-pink); color: white; }

        .container { padding: 15px; max-width: 1200px; margin: auto; }
        
        /* Pannello Master */
        .master-panel { display: none; background: var(--panel-bg); border: 1px solid var(--neon-yellow); padding: 20px; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }

        input, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; }
        label { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.6rem; display: block; margin-bottom: 5px; }

        /* Griglia Minacce */
        .threat-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .threat-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .threat-grid { grid-template-columns: repeat(3, 1fr); } }

        .threat-card { background: rgba(20, 21, 28, 0.9); border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; }
        .threat-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--neon-pink); }
        .threat-content { padding: 15px; }
        .threat-name { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; margin-bottom: 10px; text-transform: uppercase; }

        .badge { display: inline-block; padding: 2px 8px; font-family: 'Orbitron'; font-size: 0.65rem; border: 1px solid; margin-right: 5px; }
        .bg-diff { border-color: var(--neon-blue); color: var(--neon-blue); }
        .bg-pot { border-color: var(--neon-yellow); color: var(--neon-yellow); }

        .section-label { font-family: 'Orbitron'; font-size: 0.55rem; color: var(--neon-pink); margin-top: 15px; display: block; }
        .tratto-item { background: rgba(255,255,255,0.05); padding: 5px; margin: 3px 0; font-size: 0.85rem; border-left: 2px solid var(--neon-pink); }
    </style>
</head>
<body>

<header class="nav-header">
    <h1 class="header-title">KOTRA // THREAT_DB</h1>
    <div>
        <a href="index.html" class="btn-action">HUB</a>
        <button class="btn-action" id="btn-add" style="display:none; border-color:var(--neon-yellow); color:var(--neon-yellow);" onclick="togglePanel()">+ NUOVA MINACCIA</button>
    </div>
</header>

<div class="container">
    <div id="master-panel" class="master-panel">
        <div class="form-grid">
            <div><label>NOME</label><input type="text" id="m-nome"></div>
            <div><label>DIFF (1-6)</label><input type="number" id="m-diff" value="1"></div>
            <div><label>POT (1-5)</label><input type="number" id="m-pot" value="1"></div>
        </div>
        <div style="margin-top:15px;">
            <label>IMMAGINE MINACCIA</label>
            <input type="file" id="m-file" accept="image/*" style="border:none;">
        </div>
        <label style="margin-top:15px;">DESCRIZIONE</label>
        <textarea id="m-desc" rows="2"></textarea>
        <div class="form-grid" style="margin-top:15px;">
            <div><label>TRATTI (uno per riga)</label><textarea id="m-tratti" rows="3"></textarea></div>
            <div><label>TECNICA SPECIALE</label><textarea id="m-tecnica" rows="3"></textarea></div>
        </div>
        <label style="margin-top:15px;">PUNTO DEBOLE</label>
        <input type="text" id="m-debole">
        <button class="btn-action" style="margin-top:20px; width:100%;" id="btn-save" onclick="saveThreat()">PROTOCOLLO ARCHIVIAZIONE</button>
    </div>

    <div id="threat-list" class="threat-grid"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";

    window.togglePanel = () => {
        const p = document.getElementById('master-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === MASTER_EMAIL) document.getElementById('btn-add').style.display = 'inline-block';
            loadThreats();
        } else { window.location.href = "index.html"; }
    });

    window.saveThreat = async () => {
        const file = document.getElementById('m-file').files[0];
        if(!file) return alert("Inserisci un'immagine per la minaccia.");
        
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerText = "UPLOADING DATA...";

        try {
            // 1. Caricamento Immagine
            const storageRef = ref(storage, `minacce/${Date.now()}_${file.name}`);
            const snapshot = await uploadBytes(storageRef, file);
            const imgUrl = await getDownloadURL(snapshot.ref);

            // 2. Salvataggio su Firestore
            const threat = {
                nome: document.getElementById('m-nome').value,
                diff: document.getElementById('m-diff').value,
                pot: document.getElementById('m-pot').value,
                desc: document.getElementById('m-desc').value,
                tratti: document.getElementById('m-tratti').value.split('\n').filter(t => t.trim() !== ""),
                tecnica: document.getElementById('m-tecnica').value,
                debole: document.getElementById('m-debole').value,
                immagine: imgUrl,
                createdAt: new Date()
            };

            await addDoc(collection(db, "minacce"), threat);
            location.reload();
        } catch (e) { 
            alert("Errore: " + e.message); 
            btn.disabled = false;
        }
    };

    async function loadThreats() {
        const container = document.getElementById('threat-list');
        const q = query(collection(db, "minacce"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = "";

        snap.forEach(d => {
            const m = d.data();
            const card = document.createElement('div');
            card.className = 'threat-card';
            card.innerHTML = `
                <img src="${m.immagine}" class="threat-img">
                <div class="threat-content">
                    <div class="threat-name">${m.nome}</div>
                    <span class="badge bg-diff">DIFF: ${m.diff}</span>
                    <span class="badge bg-pot">POT: ${m.pot}</span>
                    <p style="font-size:0.85rem; color:#aaa; margin:10px 0;">${m.desc}</p>
                    <span class="section-label">TRATTI_VITALI</span>
                    ${m.tratti.map(t => `<div class="tratto-item">${t}</div>`).join('')}
                    <span class="section-label">TECNICA</span>
                    <div style="font-size:0.8rem; color:var(--neon-blue); border:1px solid #333; padding:5px; margin-top:5px;">${m.tecnica}</div>
                    <div style="margin-top:10px; font-size:0.75rem; color:var(--neon-yellow); border:1px dashed var(--neon-yellow); padding:5px;">
                        <b>DEBOLEZZA:</b> ${m.debole}
                    </div>
                    ${auth.currentUser.email === MASTER_EMAIL ? `<button onclick="deleteThreat('${d.id}')" style="background:none; border:none; color:#444; cursor:pointer; font-size:0.6rem; margin-top:10px;">[CANCELLA]</button>` : ''}
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.deleteThreat = async (id) => {
        if(confirm("Eliminare definitivamente la minaccia?")) {
            await deleteDoc(doc(db, "minacce", id));
            location.reload();
        }
    };
</script>
</body>
</html>
