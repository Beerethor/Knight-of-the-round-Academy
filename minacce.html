<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOTRA - Database Minacce</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-yellow: #ffff00;
            --bg-dark: #06070a;
            --panel-bg: rgba(15, 16, 22, 0.98);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a0a14 0%, #06070a 100%);
            background-attachment: fixed;
        }

        .nav-header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon-pink); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.9rem; margin: 0; }

        .btn-action { 
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); 
            padding: 8px 12px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.65rem; 
        }
        .btn-action:hover { background: var(--neon-pink); color: white; }

        .container { padding: 15px; max-width: 1200px; margin: auto; }
        
        /* PANNELLO MASTER */
        .master-panel { display: none; background: var(--panel-bg); border: 1px solid var(--neon-yellow); padding: 20px; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 10px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }

        input, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; font-family: 'Rajdhani'; }
        label { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.55rem; display: block; margin-bottom: 5px; }

        /* SCHEDA MINACCIA */
        .threat-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .threat-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .threat-grid { grid-template-columns: repeat(3, 1fr); } }

        .threat-card { background: rgba(20, 21, 28, 0.95); border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; border-top: 3px solid var(--neon-pink); position: relative; }
        .threat-img { width: 100%; height: 200px; object-fit: cover; }
        .threat-content { padding: 15px; }
        .threat-name { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; margin-bottom: 10px; text-transform: uppercase; }

        .badge { display: inline-block; padding: 3px 8px; font-family: 'Orbitron'; font-size: 0.65rem; border: 1px solid; margin-right: 5px; margin-bottom: 10px; }
        .bg-diff { border-color: var(--neon-blue); color: var(--neon-blue); }
        .bg-pot { border-color: var(--neon-yellow); color: var(--neon-yellow); }

        .section-label { font-family: 'Orbitron'; font-size: 0.55rem; color: var(--neon-pink); margin-top: 12px; display: block; border-bottom: 1px solid rgba(255, 0, 122, 0.2); padding-bottom: 2px; }
        
        .ferita-item { 
            background: rgba(255, 255, 255, 0.03); padding: 8px; margin: 4px 0; border: 1px solid #222; 
            cursor: pointer; display: flex; align-items: center; font-size: 0.9rem; 
        }
        .ferita-item.damaged { opacity: 0.3; text-decoration: line-through; border-color: var(--neon-pink); }

        .tratto-extra { font-size: 0.85rem; color: #ccc; padding-left: 10px; margin: 3px 0; font-style: italic; }
        .tratto-extra::before { content: "» "; color: var(--neon-blue); }

        .admin-controls { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .btn-edit { color: var(--neon-yellow); border: 1px solid var(--neon-yellow); background: none; font-family: 'Orbitron'; font-size: 0.5rem; padding: 5px; cursor: pointer; }
        .btn-del { color: #ff4444; border: 1px solid #ff4444; background: none; font-family: 'Orbitron'; font-size: 0.5rem; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header class="nav-header">
    <h1 class="header-title">KOTRA // THREAT_OS</h1>
    <div>
        <a href="index.html" class="btn-action">HUB</a>
        <button class="btn-action" id="btn-add" style="display:none; border-color:var(--neon-yellow); color:var(--neon-yellow);" onclick="togglePanel()">+ NUOVO_DENTRO</button>
    </div>
</header>

<div class="container">
    <div id="master-panel" class="master-panel">
        <input type="hidden" id="edit-id"> <div class="form-grid">
            <div><label>NOME</label><input type="text" id="m-nome"></div>
            <div><label>DIFFICOLTÀ (1-6)</label><input type="number" id="m-diff" value="1"></div>
            <div><label>POTENZA (1-5)</label><input type="number" id="m-pot" value="1"></div>
        </div>
        
        <div class="form-grid">
            <div><label>IMMAGINE (Opzionale per edit)</label><input type="file" id="m-file" accept="image/*"></div>
            <div style="grid-column: span 2;"><label>DESCRIZIONE BREVE</label><textarea id="m-desc" rows="1"></textarea></div>
        </div>

        <div class="form-grid">
            <div><label>FERITE / TRATTI (1 per riga)</label><textarea id="m-tratti" rows="3"></textarea></div>
            <div><label>TRATTI AGGIUNTIVI (1 per riga)</label><textarea id="m-extra" rows="3" placeholder="Resistenze, Abilità..."></textarea></div>
            <div><label>TECNICA SPECIALE</label><textarea id="m-tecnica" rows="3"></textarea></div>
        </div>
        
        <label>PUNTO DEBOLE</label>
        <input type="text" id="m-debole">

        <button class="btn-action" style="margin-top:20px; width:100%; border-color:var(--neon-yellow); color:var(--neon-yellow);" id="btn-save" onclick="saveThreat()">ESEGUI SALVATAGGIO RECORD</button>
        <button class="btn-action" style="margin-top:10px; width:100%; border-color:#666; color:#666;" onclick="location.reload()">ANNULLA</button>
    </div>

    <div id="threat-list" class="threat-grid"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";

    let allThreats = [];

    window.togglePanel = () => {
        document.getElementById('master-panel').style.display = 'block';
        window.scrollTo(0,0);
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === MASTER_EMAIL) document.getElementById('btn-add').style.display = 'inline-block';
            loadThreats();
        } else { window.location.href = "index.html"; }
    });

    window.saveThreat = async () => {
        const editId = document.getElementById('edit-id').value;
        const file = document.getElementById('m-file').files[0];
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerText = "ELABORAZIONE...";

        try {
            let imgUrl = null;
            if (file) {
                const storageRef = ref(storage, `minacce/${Date.now()}_${file.name}`);
                const snapshot = await uploadBytes(storageRef, file);
                imgUrl = await getDownloadURL(snapshot.ref);
            }

            const data = {
                nome: document.getElementById('m-nome').value,
                diff: document.getElementById('m-diff').value,
                pot: document.getElementById('m-pot').value,
                desc: document.getElementById('m-desc').value,
                tratti: document.getElementById('m-tratti').value.split('\n').filter(t => t.trim() !== ""),
                extra: document.getElementById('m-extra').value.split('\n').filter(t => t.trim() !== ""),
                tecnica: document.getElementById('m-tecnica').value,
                debole: document.getElementById('m-debole').value,
                updatedAt: new Date()
            };

            if (imgUrl) data.immagine = imgUrl;

            if (editId) {
                await updateDoc(doc(db, "minacce", editId), data);
            } else {
                data.createdAt = new Date();
                if(!imgUrl) throw new Error("Immagine obbligatoria per nuovi record.");
                await addDoc(collection(db, "minacce"), data);
            }
            location.reload();
        } catch (e) { alert(e.message); btn.disabled = false; }
    };

    async function loadThreats() {
        const container = document.getElementById('threat-list');
        const q = query(collection(db, "minacce"), orderBy("updatedAt", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = "";
        allThreats = snap.docs.map(d => ({id: d.id, ...d.data()}));

        allThreats.forEach(m => {
            const card = document.createElement('div');
            card.className = 'threat-card';
            card.innerHTML = `
                <img src="${m.immagine}" class="threat-img">
                <div class="threat-content">
                    <div class="threat-name">${m.nome}</div>
                    <span class="badge bg-diff">DIFF: ${m.diff}</span>
                    <span class="badge bg-pot">POT: ${m.pot}</span>
                    <p style="font-size:0.85rem; color:#888;">${m.desc}</p>
                    
                    <span class="section-label">FERITE (CLICCA PER BARRARE)</span>
                    ${m.tratti.map(t => `<div class="ferita-item" onclick="this.classList.toggle('damaged')">▢ ${t}</div>`).join('')}
                    
                    ${m.extra && m.extra.length > 0 ? `
                        <span class="section-label">TRATTI AGGIUNTIVI</span>
                        ${m.extra.map(e => `<div class="tratto-extra">${e}</div>`).join('')}
                    ` : ''}

                    <span class="section-label">TECNICA</span>
                    <div style="font-size:0.8rem; color:var(--neon-blue); padding:5px;">${m.tecnica}</div>

                    <div style="margin-top:10px; font-size:0.8rem; color:var(--neon-yellow); border:1px dashed var(--neon-yellow); padding:5px;">
                        <b>DEBOLEZZA:</b> ${m.debole}
                    </div>

                    ${auth.currentUser.email === MASTER_EMAIL ? `
                        <div class="admin-controls">
                            <button class="btn-edit" onclick="editThreat('${m.id}')">EDIT</button>
                            <button class="btn-del" onclick="deleteThreat('${m.id}')">DELETE</button>
                        </div>
                    ` : ''}
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.editThreat = (id) => {
        const m = allThreats.find(t => t.id === id);
        document.getElementById('edit-id').value = m.id;
        document.getElementById('m-nome').value = m.nome;
        document.getElementById('m-diff').value = m.diff;
        document.getElementById('m-pot').value = m.pot;
        document.getElementById('m-desc').value = m.desc;
        document.getElementById('m-tratti').value = m.tratti.join('\n');
        document.getElementById('m-extra').value = (m.extra || []).join('\n');
        document.getElementById('m-tecnica').value = m.tecnica;
        document.getElementById('m-debole').value = m.debole;
        togglePanel();
        document.getElementById('btn-save').innerText = "CONFERMA MODIFICHE RECORD";
    };

    window.deleteThreat = async (id) => {
        if(confirm("Protocollo Epurazione: Eliminare definitivamente il record?")) {
            await deleteDoc(doc(db, "minacce", id));
            location.reload();
        }
    };
</script>
</body>
</html>
