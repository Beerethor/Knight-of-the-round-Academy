<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOTRA - Threat Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-yellow: #ffff00;
            --bg-dark: #06070a;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a0a14 0%, #06070a 100%);
            background-attachment: fixed;
        }

        /* HEADER */
        .nav-header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon-pink); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.8rem; margin: 0; }

        .btn-action { 
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); 
            padding: 8px 12px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.6rem;
        }

        .container { padding: 15px; max-width: 1200px; margin: auto; }

        /* GRIGLIA ANTEPRIME */
        .threat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        @media (min-width: 768px) { .threat-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }

        .preview-card { 
            background: #111; border: 1px solid #333; position: relative; cursor: pointer; 
            overflow: hidden; border-bottom: 2px solid var(--neon-pink); height: 220px;
        }
        .preview-card img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .preview-name { position: absolute; bottom: 0; width: 100%; padding: 8px; background: rgba(0,0,0,0.8); font-family: 'Orbitron'; font-size: 0.7rem; color: #fff; text-align: center; box-sizing: border-box; }

        /* OVERLAY SCHEDA */
        #details-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 200; overflow-y: auto; padding: 10px; box-sizing: border-box; }
        
        .details-container { 
            max-width: 800px; margin: 10px auto; background: #0f1016; border: 1px solid var(--neon-pink);
            display: flex; flex-direction: column;
        }
        @media (min-width: 768px) { .details-container { flex-direction: row; } }

        .details-img { width: 100%; height: auto; max-height: 400px; object-fit: contain; background: #000; }
        @media (min-width: 768px) { .details-img { width: 350px; max-height: none; border-right: 1px solid #333; } }

        .details-content { padding: 20px; flex: 1; }
        .section-label { font-family: 'Orbitron'; font-size: 0.55rem; color: var(--neon-pink); margin-top: 15px; display: block; border-bottom: 1px solid rgba(255, 0, 122, 0.2); }
        .badge { display: inline-block; padding: 2px 8px; font-family: 'Orbitron'; font-size: 0.65rem; border: 1px solid; margin-right: 5px; margin-top: 8px; }
        .bg-diff { border-color: var(--neon-blue); color: var(--neon-blue); }
        .bg-pot { border-color: var(--neon-yellow); color: var(--neon-yellow); }

        .ferita-item { background: rgba(255,255,255,0.03); padding: 10px; margin: 5px 0; border: 1px solid #222; cursor: pointer; font-size: 0.85rem; }
        .ferita-item.damaged { opacity: 0.3; text-decoration: line-through; color: var(--neon-pink); }

        /* PULSANTI DOWNLOAD */
        .btn-download-container { display: flex; gap: 10px; max-width: 800px; margin: 0 auto 10px; }
        .btn-dl { flex: 1; background: #000; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 12px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.6rem; text-transform: uppercase; }
        
        .close-btn { position: sticky; top: 0; float: right; background: var(--neon-pink); color: #fff; border: none; padding: 10px 15px; font-family: 'Orbitron'; font-size: 0.7rem; z-index: 201; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<header class="nav-header">
    <h1 class="header-title">KOTRA // THREAT_OS</h1>
    <a href="index.html" class="btn-action">HUB</a>
</header>

<div class="container">
    <div id="threat-grid" class="threat-grid"></div>
</div>

<div id="details-overlay">
    <button class="close-btn" onclick="closeDetails()">CHIUDI [X]</button>
    <div id="details-render"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allThreats = [];

    async function loadThreats() {
        const snap = await getDocs(query(collection(db, "minacce"), orderBy("updatedAt", "desc")));
        allThreats = snap.docs.map(d => ({id: d.id, ...d.data()}));
        const grid = document.getElementById('threat-grid');
        grid.innerHTML = allThreats.map(m => `
            <div class="preview-card" onclick="showDetails('${m.id}')">
                <img src="${m.immagine}" onerror="this.src='https://via.placeholder.com/300?text=KOTRA'">
                <div class="preview-name">${m.nome}</div>
            </div>
        `).join('');
    }
    loadThreats();

    window.showDetails = (id) => {
        const m = allThreats.find(t => t.id === id);
        const render = document.getElementById('details-render');
        render.innerHTML = `
            <div class="btn-download-container">
                <button class="btn-dl" onclick="downloadAsPDF('${m.id}')">💾 SCARICA PDF (MOBILE OK)</button>
            </div>
            <div class="details-container" id="capture-area">
                <img src="${m.immagine}" class="details-img" crossorigin="anonymous">
                <div class="details-content">
                    <h2 style="font-family:'Orbitron'; margin:0; color:var(--neon-pink);">${m.nome}</h2>
                    <span class="badge bg-diff">DIFF: ${m.diff}</span>
                    <span class="badge bg-pot">POT: ${m.pot}</span>
                    <p style="color:#aaa; font-size:0.9rem;">${m.desc}</p>
                    <span class="section-label">FERITE // TRATTI VITALI</span>
                    ${m.tratti.map(t => `<div class="ferita-item">▢ ${t}</div>`).join('')}
                    <span class="section-label">TECNICA SPECIALE</span>
                    <div style="color:var(--neon-blue); font-size:0.85rem; margin-top:5px;">${m.tecnica}</div>
                    <div style="margin-top:15px; border:1px dashed var(--neon-yellow); padding:10px; color:var(--neon-yellow); font-size:0.8rem;">
                        <b>DEBOLEZZA:</b> ${m.debole}
                    </div>
                </div>
            </div>
        `;
        document.getElementById('details-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    };

    // FUNZIONE DOWNLOAD PDF (FUNZIONA SU TUTTI I TELEFONI)
    window.downloadAsPDF = async (id) => {
        const { jsPDF } = window.jspdf;
        const m = allThreats.find(t => t.id === id);
        const btn = document.querySelector('.btn-dl');
        btn.innerText = "GENERAZIONE PDF...";

        const area = document.getElementById('capture-area');
        
        // Usiamo html2canvas per creare l'immagine interna al PDF
        html2canvas(area, {
            useCORS: true,
            scale: 2,
            backgroundColor: "#0f1016"
        }).then(canvas => {
            const imgData = canvas.toDataURL("image/jpeg", 0.95);
            const pdf = new jsPDF({
                orientation: canvas.width > canvas.height ? "l" : "p",
                unit: "px",
                format: [canvas.width / 2, canvas.height / 2]
            });

            pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width / 2, canvas.height / 2);
            pdf.save(`KOTRA_Threat_${m.nome}.pdf`);
            btn.innerText = "💾 SCARICA PDF (MOBILE OK)";
        }).catch(err => {
            alert("Errore durante la generazione. Prova a fare uno screenshot.");
            btn.innerText = "💾 ERRORE";
        });
    };

    window.closeDetails = () => {
        document.getElementById('details-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    };
</script>
</body>
</html>
