<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOTRA - Threat Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-yellow: #ffff00;
            --bg-dark: #06070a;
            --panel-bg: rgba(15, 16, 22, 0.98);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a0a14 0%, #06070a 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .nav-header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon-pink); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.9rem; margin: 0; }

        .btn-action { 
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); 
            padding: 8px 12px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.65rem; transition: 0.2s;
        }

        .container { padding: 15px; max-width: 1200px; margin: auto; }

        /* GRIGLIA */
        .threat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        @media (min-width: 768px) { .threat-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }

        .preview-card { 
            background: #111; border: 1px solid #333; position: relative; cursor: pointer; 
            overflow: hidden; border-bottom: 2px solid var(--neon-pink); height: 250px;
        }
        .preview-card img { width: 100%; height: 100%; object-fit: contain; background: #000; opacity: 0.8; }
        .preview-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); box-sizing: border-box; }
        .preview-name { font-family: 'Orbitron'; font-size: 0.8rem; color: #fff; text-transform: uppercase; }

        /* OVERLAY DETTAGLI */
        #details-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; overflow-y: auto; padding: 10px; box-sizing: border-box; }
        
        /* AREA CHE VERRÀ SCARICATA */
        .details-container { 
            max-width: 900px; margin: 10px auto; background: #0f1016; border: 1px solid var(--neon-pink);
            display: grid; grid-template-columns: 1fr;
        }
        @media (min-width: 768px) { .details-container { grid-template-columns: 350px 1fr; } }

        .details-img { width: 100%; height: auto; max-height: 500px; object-fit: contain; background: #000; cursor: zoom-in; }
        @media (min-width: 768px) { .details-img { max-height: 100%; border-right: 1px solid #333; } }

        .details-content { padding: 25px; }
        .section-label { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-pink); margin-top: 20px; display: block; border-bottom: 1px solid rgba(255, 0, 122, 0.2); padding-bottom: 3px; }
        .badge { display: inline-block; padding: 3px 10px; font-family: 'Orbitron'; font-size: 0.7rem; border: 1px solid; margin-right: 8px; margin-top: 10px; }
        .bg-diff { border-color: var(--neon-blue); color: var(--neon-blue); }
        .bg-pot { border-color: var(--neon-yellow); color: var(--neon-yellow); }

        .ferita-item { background: rgba(255,255,255,0.03); padding: 10px; margin: 5px 0; border: 1px solid #222; cursor: pointer; font-size: 0.9rem; }
        .ferita-item.damaged { opacity: 0.3; text-decoration: line-through; color: var(--neon-pink); }

        /* TASTI */
        .btn-download { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 10px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.6rem; margin-bottom: 10px; width: 100%; max-width: 900px; display: block; margin-left: auto; margin-right: auto; }
        .btn-download:hover { background: var(--neon-blue); color: #000; }
        .close-btn { position: fixed; top: 15px; right: 15px; font-family: 'Orbitron'; color: #fff; background: var(--neon-pink); border: none; padding: 10px; cursor: pointer; z-index: 201; font-size: 0.7rem; }

        /* LIGHTBOX */
        #lightbox-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 300; cursor: zoom-out; justify-content: center; align-items: center; }
        #lightbox-overlay img { max-width: 95%; max-height: 95%; }

        /* FORM */
        .master-panel { display: none; background: var(--panel-bg); border: 1px solid var(--neon-yellow); padding: 20px; margin-bottom: 30px; }
        input, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: 'Rajdhani'; }
        label { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.55rem; display: block; }
    </style>
</head>
<body>

<header class="nav-header">
    <h1 class="header-title">KOTRA // THREAT_DATABASE</h1>
    <div>
        <a href="index.html" class="btn-action">HUB</a>
        <button class="btn-action" id="btn-add" style="display:none; border-color:var(--neon-yellow); color:var(--neon-yellow);" onclick="togglePanel()">+ AGGIUNGI</button>
    </div>
</header>

<div class="container">
    <div id="master-panel" class="master-panel">
        <input type="hidden" id="edit-id">
        <label>NOME MINACCIA</label><input type="text" id="m-nome">
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>DIFF (1-6)</label><input type="number" id="m-diff" value="1"></div>
            <div style="flex:1;"><label>POT (1-5)</label><input type="number" id="m-pot" value="1"></div>
        </div>
        <label>URL IMMAGINE</label><input type="text" id="m-img-url">
        <label>DESCRIZIONE</label><textarea id="m-desc" rows="1"></textarea>
        <label>FERITE (1 per riga)</label><textarea id="m-tratti" rows="2"></textarea>
        <label>EXTRA (1 per riga)</label><textarea id="m-extra" rows="2"></textarea>
        <label>TECNICA</label><textarea id="m-tecnica" rows="2"></textarea>
        <label>PUNTO DEBOLE</label><input type="text" id="m-debole">
        <button class="btn-action" style="width:100%; margin-top:10px; color:var(--neon-yellow); border-color:var(--neon-yellow);" onclick="saveThreat()">SALVA RECORD</button>
        <button class="btn-action" style="width:100%; margin-top:5px; color:#666; border-color:#666;" onclick="location.reload()">ANNULLA</button>
    </div>

    <div id="threat-grid" class="threat-grid"></div>
</div>

<div id="details-overlay">
    <button class="close-btn" onclick="closeDetails()">CHIUDI [X]</button>
    <div id="details-render"></div>
</div>

<div id="lightbox-overlay" onclick="this.style.display='none'">
    <img id="lightbox-img" src="">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";
    let allThreats = [];

    onAuthStateChanged(auth, user => {
        if (user) {
            if (user.email === MASTER_EMAIL) document.getElementById('btn-add').style.display = 'inline-block';
            loadThreats();
        } else { window.location.href = "index.html"; }
    });

    window.togglePanel = () => { document.getElementById('master-panel').style.display = 'block'; };

    async function loadThreats() {
        const snap = await getDocs(query(collection(db, "minacce"), orderBy("updatedAt", "desc")));
        allThreats = snap.docs.map(d => ({id: d.id, ...d.data()}));
        const grid = document.getElementById('threat-grid');
        grid.innerHTML = allThreats.map(m => `
            <div class="preview-card" onclick="showDetails('${m.id}')">
                <img src="${m.immagine}" onerror="this.src='https://via.placeholder.com/200x300?text=ERROR'">
                <div class="preview-info">
                    <div class="preview-name">${m.nome}</div>
                </div>
            </div>
        `).join('');
    }

    window.showDetails = (id) => {
        const m = allThreats.find(t => t.id === id);
        const render = document.getElementById('details-render');
        render.innerHTML = `
            <button class="btn-download" onclick="downloadSheet('${m.nome}')">💾 SCARICA_SCHEDA_PNG</button>
            <div class="details-container" id="capture-area">
                <img src="${m.immagine}" class="details-img" onclick="openLightbox('${m.immagine}')" crossorigin="anonymous">
                <div class="details-content">
                    <h2 style="font-family:'Orbitron'; margin:0; color:var(--neon-pink);">${m.nome}</h2>
                    <span class="badge bg-diff">DIFFICOLTÀ: ${m.diff}</span>
                    <span class="badge bg-pot">POTENZA: ${m.pot}</span>
                    <p style="color:#aaa; font-size:0.9rem;">${m.desc}</p>
                    
                    <span class="section-label">FERITE // TRATTI VITALI</span>
                    ${m.tratti.map(t => `<div class="ferita-item" onclick="this.classList.toggle('damaged')">▢ ${t}</div>`).join('')}
                    
                    ${m.extra.length ? `<span class="section-label">TRATTI AGGIUNTIVI</span>` : ''}
                    ${m.extra.map(e => `<div style="font-size:0.8rem; color:var(--neon-blue); margin-top:5px;">» ${e}</div>`).join('')}

                    <span class="section-label">TECNICA MINACCIA</span>
                    <div style="background:#111; padding:10px; border:1px solid #333; color:var(--neon-blue); font-size:0.85rem;">${m.tecnica}</div>

                    <div style="margin-top:15px; border:1px dashed var(--neon-yellow); padding:10px; color:var(--neon-yellow); font-size:0.85rem;">
                        <b>VULNERABILITÀ:</b> ${m.debole}
                    </div>
                </div>
            </div>
            ${auth.currentUser.email === MASTER_EMAIL ? `
                <div style="max-width:900px; margin: 10px auto; display:flex; gap:10px;">
                    <button class="btn-action" style="flex:1; border-color:var(--neon-yellow); color:var(--neon-yellow);" onclick="editThreat('${m.id}')">EDIT</button>
                    <button class="btn-action" style="flex:1; border-color:#ff4444; color:#ff4444;" onclick="deleteThreat('${m.id}')">DEL</button>
                </div>
            ` : ''}
        `;
        document.getElementById('details-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    };

    // FUNZIONE DOWNLOAD AGGIORNATA
    window.downloadSheet = (nome) => {
        const area = document.getElementById('capture-area');
        const btn = document.querySelector('.btn-download');
        btn.innerText = "GENERAZIONE...";

        html2canvas(area, {
            useCORS: true,
            allowTaint: false,
            backgroundColor: "#0f1016",
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `KOTRA_Threat_${nome}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btn.innerText = "💾 SCARICA_SCHEDA_PNG";
        }).catch(err => {
            alert("Errore: Il sito che ospita l'immagine impedisce il download per sicurezza (CORS).");
            btn.innerText = "💾 ERRORE DOWNLOAD";
        });
    };

    window.openLightbox = (url) => {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox-overlay').style.display = 'flex';
    };

    window.closeDetails = () => {
        document.getElementById('details-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    window.saveThreat = async () => {
        const editId = document.getElementById('edit-id').value;
        const data = {
            nome: document.getElementById('m-nome').value,
            diff: document.getElementById('m-diff').value,
            pot: document.getElementById('m-pot').value,
            immagine: document.getElementById('m-img-url').value,
            desc: document.getElementById('m-desc').value,
            tratti: document.getElementById('m-tratti').value.split('\n').filter(t => t.trim()),
            extra: document.getElementById('m-extra').value.split('\n').filter(t => t.trim()),
            tecnica: document.getElementById('m-tecnica').value,
            debole: document.getElementById('m-debole').value,
            updatedAt: new Date()
        };
        if(editId) await updateDoc(doc(db, "minacce", editId), data);
        else await addDoc(collection(db, "minacce"), data);
        location.reload();
    };

    window.editThreat = (id) => {
        const m = allThreats.find(t => t.id === id);
        document.getElementById('edit-id').value = m.id;
        document.getElementById('m-nome').value = m.nome;
        document.getElementById('m-img-url').value = m.immagine;
        document.getElementById('m-diff').value = m.diff;
        document.getElementById('m-pot').value = m.pot;
        document.getElementById('m-desc').value = m.desc;
        document.getElementById('m-tratti').value = m.tratti.join('\n');
        document.getElementById('m-extra').value = m.extra.join('\n');
        document.getElementById('m-tecnica').value = m.tecnica;
        document.getElementById('m-debole').value = m.debole;
        closeDetails();
        togglePanel();
    };

    window.deleteThreat = async (id) => {
        if(confirm("ELIMINARE?")) { await deleteDoc(doc(db, "minacce", id)); location.reload(); }
    };
</script>
</body>
</html>
