<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOTRA - Archivio Minacce</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-yellow: #ffff00;
            --bg-dark: #06070a;
            --panel-bg: rgba(15, 16, 22, 0.98);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a0a14 0%, #06070a 100%);
            background-attachment: fixed;
        }

        /* HEADER */
        .nav-header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon-pink); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.9rem; margin: 0; }

        .btn-action { 
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); 
            padding: 8px 12px; font-family: 'Orbitron'; cursor: pointer; text-decoration: none; font-size: 0.65rem; 
        }
        .btn-action:hover { background: var(--neon-pink); color: white; }

        .container { padding: 15px; max-width: 1200px; margin: auto; }
        
        /* PANNELLO MASTER */
        .master-panel { display: none; background: var(--panel-bg); border: 1px solid var(--neon-yellow); padding: 20px; margin-bottom: 30px; box-shadow: 0 0 20px rgba(255, 0, 122, 0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }

        input, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; font-family: 'Rajdhani'; font-size: 1rem; }
        label { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.6rem; display: block; margin-bottom: 5px; margin-top: 10px; }

        /* GRIGLIA MINACCE */
        .threat-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .threat-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .threat-grid { grid-template-columns: repeat(3, 1fr); } }

        .threat-card { background: rgba(20, 21, 28, 0.95); border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; border-top: 3px solid var(--neon-pink); }
        .threat-img { width: 100%; height: 220px; object-fit: cover; filter: grayscale(30%) contrast(120%); }
        .threat-content { padding: 15px; }
        .threat-name { font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .badge { display: inline-block; padding: 3px 10px; font-family: 'Orbitron'; font-size: 0.7rem; border: 1px solid; margin-right: 8px; margin-bottom: 10px; }
        .bg-diff { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .bg-pot { border-color: var(--neon-yellow); color: var(--neon-yellow); background: rgba(255, 255, 0, 0.05); }

        /* FERITE / TRATTI */
        .section-label { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-pink); margin-top: 15px; display: block; border-bottom: 1px solid rgba(255, 0, 122, 0.2); padding-bottom: 3px; margin-bottom: 8px; }
        
        .ferita-item { 
            background: rgba(255, 255, 255, 0.03); padding: 10px; margin: 5px 0; border: 1px solid #222; 
            cursor: pointer; display: flex; align-items: center; font-size: 0.95rem; transition: 0.2s;
        }
        .ferita-item::before { content: '▢'; margin-right: 12px; color: var(--neon-pink); font-family: 'Orbitron'; font-size: 1.1rem; }
        .ferita-item.damaged { opacity: 0.3; text-decoration: line-through; background: rgba(255, 0, 122, 0.1); border-color: var(--neon-pink); }
        .ferita-item.damaged::before { content: '▣'; }

        .tecnica-box { font-size: 0.9rem; color: var(--neon-blue); border-left: 2px solid var(--neon-blue); padding: 8px; margin-top: 5px; background: rgba(0, 242, 255, 0.03); }
        .debole-box { margin-top: 15px; font-size: 0.85rem; color: var(--neon-yellow); border: 1px dashed var(--neon-yellow); padding: 10px; }
    </style>
</head>
<body>

<header class="nav-header">
    <h1 class="header-title">KOTRA // THREAT_ARCHIVE</h1>
    <div>
        <a href="index.html" class="btn-action">HUB</a>
        <button class="btn-action" id="btn-add" style="display:none; border-color:var(--neon-yellow); color:var(--neon-yellow);" onclick="togglePanel()">+ PROTOCOLLO_GENESI</button>
    </div>
</header>

<div class="container">
    <div id="master-panel" class="master-panel">
        <div class="form-grid">
            <div><label>NOME MINACCIA</label><input type="text" id="m-nome" placeholder="Codename..."></div>
            <div><label>DIFFICOLTÀ (1-6)</label><input type="number" id="m-diff" value="1" min="1" max="6"></div>
            <div><label>POTENZA (1-5)</label><input type="number" id="m-pot" value="1" min="1" max="5"></div>
        </div>
        
        <div class="form-grid">
            <div>
                <label>IMMAGINE (File)</label>
                <input type="file" id="m-file" accept="image/*">
            </div>
            <div style="grid-column: span 2;">
                <label>DESCRIZIONE BREVE</label>
                <textarea id="m-desc" rows="2" placeholder="Sintesi della minaccia..."></textarea>
            </div>
        </div>

        <div class="form-grid">
            <div>
                <label>FERITE / TRATTI (uno per riga)</label>
                <textarea id="m-tratti" rows="4" placeholder="Tratto Ferita 1&#10;Tratto Ferita 2&#10;Tratto Ferita 3"></textarea>
            </div>
            <div>
                <label>TECNICA MINACCIA</label>
                <textarea id="m-tecnica" rows="4" placeholder="Effetto speciale..."></textarea>
            </div>
            <div>
                <label>PUNTO DEBOLE</label>
                <textarea id="m-debole" rows="4" placeholder="Come abbatterla?"></textarea>
            </div>
        </div>

        <button class="btn-action" style="margin-top:20px; width:100%; height:50px; font-size:1rem;" id="btn-save" onclick="saveThreat()">ARCHIVIA RECORD NEL DATABASE</button>
    </div>

    <div id="threat-list" class="threat-grid">
        <div style="color:var(--neon-blue); font-family:'Orbitron'; padding:40px; text-align:center; width:100%;">
            CARICAMENTO DATABASE MINACCE...
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";

    window.togglePanel = () => {
        const p = document.getElementById('master-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === MASTER_EMAIL) document.getElementById('btn-add').style.display = 'inline-block';
            loadThreats();
        } else { window.location.href = "index.html"; }
    });

    window.saveThreat = async () => {
        const file = document.getElementById('m-file').files[0];
        if(!file) return alert("Protocollo negato: Caricare immagine minaccia.");
        
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerText = "UPLOADING TO CLOUD...";

        try {
            const storageRef = ref(storage, `minacce/${Date.now()}_${file.name}`);
            const snapshot = await uploadBytes(storageRef, file);
            const imgUrl = await getDownloadURL(snapshot.ref);

            const threat = {
                nome: document.getElementById('m-nome').value,
                diff: document.getElementById('m-diff').value,
                pot: document.getElementById('m-pot').value,
                desc: document.getElementById('m-desc').value,
                tratti: document.getElementById('m-tratti').value.split('\n').filter(t => t.trim() !== ""),
                tecnica: document.getElementById('m-tecnica').value,
                debole: document.getElementById('m-debole').value,
                immagine: imgUrl,
                createdAt: new Date()
            };

            await addDoc(collection(db, "minacce"), threat);
            location.reload();
        } catch (e) { 
            alert("Errore: " + e.message); 
            btn.disabled = false;
        }
    };

    async function loadThreats() {
        const container = document.getElementById('threat-list');
        const q = query(collection(db, "minacce"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = "";

        if(snap.empty) {
            container.innerHTML = "<div style='color:#666; padding:40px;'>SETTORE SICURO: Nessuna minaccia registrata.</div>";
            return;
        }

        snap.forEach(d => {
            const m = d.data();
            const card = document.createElement('div');
            card.className = 'threat-card';
            card.innerHTML = `
                <img src="${m.immagine}" class="threat-img">
                <div class="threat-content">
                    <div class="threat-name">${m.nome}</div>
                    <span class="badge bg-diff">DIFFICOLTÀ: ${m.diff}</span>
                    <span class="badge bg-pot">POTENZA: ${m.pot}</span>
                    
                    <p style="font-size:0.9rem; color:#bbb; margin:10px 0; line-height:1.4;">${m.desc}</p>
                    
                    <span class="section-label">FERITE // TRATTI VITALI</span>
                    <div>
                        ${m.tratti.map(t => `<div class="ferita-item" onclick="this.classList.toggle('damaged')">${t}</div>`).join('')}
                    </div>

                    <span class="section-label">TECNICA MINACCIA</span>
                    <div class="tecnica-box">${m.tecnica}</div>

                    <div class="debe-box">
                        <span class="section-label" style="color:var(--neon-yellow); border-color:rgba(255,255,0,0.2);">PUNTO DEBOLE</span>
                        <div style="font-size:0.9rem; color:var(--neon-yellow); padding:5px;">${m.debole}</div>
                    </div>

                    ${auth.currentUser.email === MASTER_EMAIL ? `<button onclick="deleteThreat('${d.id}')" style="background:none; border:none; color:#444; cursor:pointer; font-size:0.6rem; margin-top:20px;">[CANCELLA_RECORD]</button>` : ''}
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.deleteThreat = async (id) => {
        if(confirm("Eliminare definitivamente il record della minaccia?")) {
            await deleteDoc(doc(db, "minacce", id));
            location.reload();
        }
    };
</script>
</body>
</html>
