<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOTRA - Threat Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-yellow: #ffff00;
            --bg-dark: #06070a;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a0a14 0%, #06070a 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* HEADER */
        .nav-header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon-pink); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.9rem; margin: 0; }

        .btn-action { 
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); 
            padding: 8px 12px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.65rem;
        }

        /* RICERCA E FILTRI */
        .search-container {
            background: rgba(255, 255, 255, 0.05); padding: 15px; margin: 20px auto; max-width: 1170px;
            border: 1px solid #333; display: grid; grid-template-columns: 1fr; gap: 10px;
        }
        @media (min-width: 768px) { .search-container { grid-template-columns: 2fr 1fr 1fr; } }

        .filter-input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; font-family: 'Rajdhani'; width: 100%; box-sizing: border-box; }
        .filter-label { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-blue); display: block; margin-bottom: 5px; }

        .container { padding: 0 15px 50px; max-width: 1200px; margin: auto; }

        /* GRID */
        .threat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        @media (min-width: 768px) { .threat-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }

        .preview-card { background: #111; border: 1px solid #333; cursor: pointer; border-bottom: 2px solid var(--neon-pink); height: 260px; position: relative; overflow: hidden; }
        .preview-card img { width: 100%; height: 100%; object-fit: contain; background: #000; opacity: 0.8; }
        .preview-info { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, #000); box-sizing: border-box; }
        .preview-name { font-family: 'Orbitron'; font-size: 0.75rem; color: #fff; }

        /* SCHEDA DETTAGLI */
        #details-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; overflow-y: auto; padding: 10px; box-sizing: border-box; }
        .details-container { max-width: 900px; margin: 10px auto; background: #0f1016; border: 1px solid var(--neon-pink); display: flex; flex-direction: column; }
        @media (min-width: 768px) { .details-container { flex-direction: row; } }

        .details-img { width: 100%; height: auto; max-height: 450px; object-fit: contain; background: #000; cursor: zoom-in; }
        @media (min-width: 768px) { .details-img { width: 380px; max-height: none; border-right: 1px solid #333; } }

        .details-content { padding: 25px; flex: 1; }
        .section-label { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-pink); margin-top: 20px; display: block; border-bottom: 1px solid rgba(255, 0, 122, 0.2); }
        .badge { display: inline-block; padding: 3px 10px; font-family: 'Orbitron'; font-size: 0.7rem; border: 1px solid; margin-right: 8px; margin-top: 10px; }
        .bg-diff { border-color: var(--neon-blue); color: var(--neon-blue); }
        .bg-pot { border-color: var(--neon-yellow); color: var(--neon-yellow); }

        .ferita-item { background: rgba(255,255,255,0.03); padding: 12px; margin: 8px 0; border: 1px solid #222; cursor: pointer; }
        .ferita-item.damaged { opacity: 0.3; text-decoration: line-through; color: var(--neon-pink); }

        /* LIGHTBOX (IL SECONDO OVERLAY) */
        #lightbox-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 300; cursor: zoom-out; 
            justify-content: center; align-items: center; 
        }
        #lightbox-overlay img { max-width: 98%; max-height: 98%; object-fit: contain; box-shadow: 0 0 30px var(--neon-pink); }

        .btn-dl { background: #000; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 12px; font-family: 'Orbitron'; cursor: pointer; width: 100%; max-width: 900px; display: block; margin: 0 auto 10px; }
        .close-btn { position: sticky; top: 0; float: right; background: var(--neon-pink); color: #fff; border: none; padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; z-index: 201; }

        /* MASTER */
        .master-panel { display: none; background: #111; border: 1px solid var(--neon-yellow); padding: 20px; margin: 20px auto; max-width: 1170px; }
        input, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: 'Rajdhani'; }
    </style>
</head>
<body>

<header class="nav-header">
    <h1 class="header-title">KOTRA // THREAT_OS</h1>
    <div>
        <a href="index.html" class="btn-action">HUB</a>
        <button class="btn-action" id="btn-add" style="display:none; border-color:var(--neon-yellow); color:var(--neon-yellow);" onclick="togglePanel()">+ AGGIUNGI</button>
    </div>
</header>

<div class="search-container">
    <div><label class="filter-label">NOME</label><input type="text" id="search-name" class="filter-input" oninput="filterThreats()"></div>
    <div><label class="filter-label">DIFFICOLTÀ (Min)</label><input type="number" id="filter-diff" class="filter-input" oninput="filterThreats()"></div>
    <div><label class="filter-label">POTENZA (Min)</label><input type="number" id="filter-pot" class="filter-input" oninput="filterThreats()"></div>
</div>

<div class="container">
    <div id="master-panel" class="master-panel">
        <input type="hidden" id="edit-id">
        <input type="text" id="m-nome" placeholder="NOME">
        <input type="number" id="m-diff" placeholder="DIFF (1-6)">
        <input type="number" id="m-pot" placeholder="POT (1-5)">
        <input type="text" id="m-img-url" placeholder="URL IMMAGINE">
        <textarea id="m-desc" placeholder="DESCRIZIONE"></textarea>
        <textarea id="m-tratti" placeholder="FERITE (una per riga)"></textarea>
        <textarea id="m-extra" placeholder="EXTRA (una per riga)"></textarea>
        <textarea id="m-tecnica" placeholder="TECNICA"></textarea>
        <input type="text" id="m-debole" placeholder="DEBOLEZZA">
        <button class="btn-action" style="width:100%; border-color:var(--neon-yellow); color:var(--neon-yellow);" onclick="saveThreat()">SALVA RECORD</button>
    </div>
    <div id="threat-grid" class="threat-grid"></div>
</div>

<div id="details-overlay">
    <button class="close-btn" onclick="closeDetails()">CHIUDI [X]</button>
    <div id="details-render"></div>
</div>

<div id="lightbox-overlay" onclick="this.style.display='none'">
    <img id="lightbox-img" src="">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";
    let allThreats = [];

    onAuthStateChanged(auth, user => {
        if (user) {
            if (user.email === MASTER_EMAIL) document.getElementById('btn-add').style.display = 'inline-block';
            loadThreats();
        } else { window.location.href = "index.html"; }
    });

    window.togglePanel = () => { document.getElementById('master-panel').style.display = 'block'; };

    async function loadThreats() {
        const snap = await getDocs(query(collection(db, "minacce"), orderBy("updatedAt", "desc")));
        allThreats = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderGrid(allThreats);
    }

    function renderGrid(data) {
        document.getElementById('threat-grid').innerHTML = data.map(m => `
            <div class="preview-card" onclick="showDetails('${m.id}')">
                <img src="${m.immagine}" onerror="this.src='https://via.placeholder.com/300?text=KOTRA'">
                <div class="preview-info">
                    <div class="preview-name">${m.nome}</div>
                </div>
            </div>
        `).join('');
    }

    window.filterThreats = () => {
        const n = document.getElementById('search-name').value.toLowerCase();
        const d = parseInt(document.getElementById('filter-diff').value) || 0;
        const p = parseInt(document.getElementById('filter-pot').value) || 0;
        const filtered = allThreats.filter(m => m.nome.toLowerCase().includes(n) && m.diff >= d && m.pot >= p);
        renderGrid(filtered);
    };

    window.showDetails = (id) => {
        const m = allThreats.find(t => t.id === id);
        document.getElementById('details-render').innerHTML = `
            <button class="btn-dl" onclick="downloadPDF('${m.id}')">💾 ESPORTA PDF</button>
            <div class="details-container" id="capture-area">
                <img src="${m.immagine}" class="details-img" onclick="openLightbox('${m.immagine}')">
                <div class="details-content">
                    <h2 style="font-family:'Orbitron'; color:var(--neon-pink); margin:0;">${m.nome}</h2>
                    <span class="badge bg-diff">DIFF: ${m.diff}</span><span class="badge bg-pot">POT: ${m.pot}</span>
                    <p style="color:#aaa; font-size:0.9rem;">${m.desc}</p>
                    <span class="section-label">VITALI</span>
                    ${m.tratti.map(t => `<div class="ferita-item" onclick="this.classList.toggle('damaged')">▢ ${t}</div>`).join('')}
                    <span class="section-label">TECNICA</span>
                    <div style="color:var(--neon-blue); font-size:0.85rem; margin-top:5px;">${m.tecnica}</div>
                    <div style="margin-top:15px; border:1px dashed var(--neon-yellow); padding:10px; color:var(--neon-yellow); font-size:0.8rem;"><b>DEBOLEZZA:</b> ${m.debole}</div>
                </div>
            </div>
            ${auth.currentUser.email === MASTER_EMAIL ? `<button class="btn-action" onclick="deleteThreat('${m.id}')">ELIMINA</button>` : ''}
        `;
        document.getElementById('details-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    };

    window.openLightbox = (url) => {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox-overlay').style.display = 'flex';
    };

    window.downloadPDF = (id) => {
        const { jsPDF } = window.jspdf;
        const area = document.getElementById('capture-area');
        html2canvas(area, { useCORS: true, scale: 2, backgroundColor: "#0f1016" }).then(canvas => {
            const pdf = new jsPDF({ orientation: canvas.width > canvas.height ? "l" : "p", unit: "px", format: [canvas.width/2, canvas.height/2] });
            pdf.addImage(canvas.toDataURL("image/jpeg", 0.95), 'JPEG', 0, 0, canvas.width/2, canvas.height/2);
            pdf.save("KOTRA_Threat.pdf");
        });
    };

    window.closeDetails = () => { document.getElementById('details-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; };

    window.saveThreat = async () => {
        const data = {
            nome: document.getElementById('m-nome').value,
            diff: document.getElementById('m-diff').value,
            pot: document.getElementById('m-pot').value,
            immagine: document.getElementById('m-img-url').value,
            desc: document.getElementById('m-desc').value,
            tratti: document.getElementById('m-tratti').value.split('\n').filter(t => t.trim()),
            extra: document.getElementById('m-extra').value.split('\n').filter(t => t.trim()),
            tecnica: document.getElementById('m-tecnica').value,
            debole: document.getElementById('m-debole').value,
            updatedAt: new Date()
        };
        await addDoc(collection(db, "minacce"), data);
        location.reload();
    };

    window.deleteThreat = async (id) => { if(confirm("ELIMINARE?")) { await deleteDoc(doc(db, "minacce", id)); location.reload(); } };
</script>
</body>
</html>
