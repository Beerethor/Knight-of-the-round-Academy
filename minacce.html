<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOTRA - Archivio Minacce</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-yellow: #ffff00;
            --bg-dark: #06070a;
            --panel-bg: rgba(15, 16, 22, 0.98);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            background-image: radial-gradient(circle at 50% 50%, #1a0a14 0%, #06070a 100%);
            background-attachment: fixed;
        }

        /* --- HEADER OTTIMIZZATO --- */
        .nav-header { 
            padding: 10px 15px; 
            background: rgba(0,0,0,0.95); 
            border-bottom: 2px solid var(--neon-pink); 
            display: flex; 
            flex-direction: column;
            gap: 10px;
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 5px 15px rgba(255, 0, 122, 0.2);
        }

        @media (min-width: 768px) {
            .nav-header { flex-direction: row; justify-content: space-between; align-items: center; padding: 15px 30px; }
        }

        .header-title { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 1rem; margin: 0; text-shadow: 0 0 10px var(--neon-pink); }

        /* --- PULSANTI --- */
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn-action { 
            background: rgba(0,0,0,0.6); 
            border: 1px solid var(--neon-pink); 
            color: var(--neon-pink); 
            padding: 10px 15px; 
            font-family: 'Orbitron'; 
            cursor: pointer; 
            text-decoration: none; 
            font-size: 0.7rem; 
            flex: 1;
            text-align: center;
            transition: 0.2s;
        }

        .btn-action:hover { background: var(--neon-pink); color: white; box-shadow: 0 0 15px var(--neon-pink); }
        .btn-master { border-color: var(--neon-yellow); color: var(--neon-yellow); display: none; }

        /* --- FORM CREAZIONE (HIDE/SHOW) --- */
        .master-panel { 
            display: none; /* Inizialmente nascosto */
            background: var(--panel-bg); 
            border: 1px solid var(--neon-yellow); 
            padding: 20px; 
            margin: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.1);
        }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }

        input, textarea, select { 
            background: #000; border: 1px solid #444; color: #fff; padding: 12px; 
            font-family: 'Rajdhani'; font-size: 1rem; width: 100%; box-sizing: border-box; 
        }

        label { color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.6rem; display: block; margin-bottom: 5px; }

        /* --- GRIGLIA MINACCE (VISUALIZZATA PER PRIMA) --- */
        .container { padding: 15px; max-width: 1200px; margin: auto; }
        
        .threat-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
            margin-top: 10px;
        }
        @media (min-width: 768px) { .threat-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .threat-grid { grid-template-columns: repeat(3, 1fr); } }

        .threat-card { 
            background: rgba(20, 21, 28, 0.8); 
            border: 1px solid #333; 
            border-left: 4px solid var(--neon-pink);
            padding: 20px; 
            position: relative;
        }

        .threat-name { font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; margin-bottom: 10px; text-transform: uppercase; }

        .badge { 
            display: inline-block; padding: 3px 10px; font-family: 'Orbitron'; 
            font-size: 0.7rem; border-radius: 3px; margin-right: 5px; margin-bottom: 10px;
        }
        .bg-diff { background: rgba(0, 242, 255, 0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .bg-pot { background: rgba(255, 255, 0, 0.1); color: var(--neon-yellow); border: 1px solid var(--neon-yellow); }

        .tratto-item { background: rgba(255, 255, 255, 0.03); padding: 8px; margin: 5px 0; border-radius: 4px; font-size: 0.9rem; border: 1px solid #222; }

        .debolezza-box { margin-top: 15px; padding: 10px; border: 1px dashed var(--neon-yellow); color: var(--neon-yellow); font-size: 0.85rem; }

        /* --- GUIDA MOBILE --- */
        .guida-toggle { background: #111; color: var(--neon-blue); padding: 15px; margin: 20px 15px; border: 1px solid var(--neon-blue); font-family: 'Orbitron'; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

<header class="nav-header">
    <h1 class="header-title">KOTRA // THREAT_DB</h1>
    <div class="btn-group">
        <a href="index.html" class="btn-action">HUB</a>
        <button class="btn-action btn-master" id="btn-toggle-form" onclick="toggleMasterPanel()">+ NUOVA MINACCIA</button>
    </div>
</header>

<div class="container">
    <div id="master-panel" class="master-panel">
        <div class="form-grid">
            <div><label>NOME</label><input type="text" id="m-nome"></div>
            <div><label>DIFF (1-6)</label><input type="number" id="m-diff" value="1"></div>
            <div><label>POT (1-5)</label><input type="number" id="m-pot" value="1"></div>
        </div>
        <label style="margin-top:15px">DESCRIZIONE</label>
        <textarea id="m-desc" rows="2"></textarea>
        <div class="form-grid" style="margin-top:15px">
            <div><label>TRATTI (uno per riga)</label><textarea id="m-tratti" rows="3"></textarea></div>
            <div><label>TECNICA</label><textarea id="m-tecnica" rows="3"></textarea></div>
        </div>
        <label style="margin-top:15px">PUNTO DEBOLE</label>
        <input type="text" id="m-debole">
        <button class="btn-action" style="margin-top:20px; width:100%; border-color:var(--neon-yellow); color:var(--neon-yellow);" onclick="saveThreat()">ESEGUI PROTOCOLLO ARCHIVIAZIONE</button>
    </div>

    <div id="threat-list" class="threat-grid">
        <div style="color: var(--neon-blue); font-family: 'Orbitron'; padding: 20px;">CONNESSIONE AL DATABASE...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAMvHn28SY3k9TiLvz2afjn0zpj73Lw5Y",
        authDomain: "kotra-8da26.firebaseapp.com",
        projectId: "kotra-8da26",
        storageBucket: "kotra-8da26.firebasestorage.app",
        messagingSenderId: "932848394064",
        appId: "1:932848394064:web:d368c9ae301b54bab01655"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const MASTER_EMAIL = "t.giuseppeinfante@gmail.com";

    // Toggle Pannello Master
    window.toggleMasterPanel = () => {
        const p = document.getElementById('master-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === MASTER_EMAIL) {
                document.getElementById('btn-toggle-form').style.display = 'block';
            }
            loadThreats();
        } else {
            window.location.href = "index.html";
        }
    });

    window.saveThreat = async () => {
        const btn = event.target;
        btn.disabled = true;
        btn.innerText = "ARCHIVIAZIONE IN CORSO...";

        const threat = {
            nome: document.getElementById('m-nome').value,
            diff: document.getElementById('m-diff').value,
            pot: document.getElementById('m-pot').value,
            desc: document.getElementById('m-desc').value,
            tratti: document.getElementById('m-tratti').value.split('\n').filter(t => t.trim() !== ""),
            tecnica: document.getElementById('m-tecnica').value,
            debole: document.getElementById('m-debole').value,
            createdAt: new Date()
        };

        try {
            await addDoc(collection(db, "minacce"), threat);
            location.reload();
        } catch (e) { alert("Errore: " + e.message); btn.disabled = false; }
    };

    async function loadThreats() {
        const container = document.getElementById('threat-list');
        const snap = await getDocs(collection(db, "minacce"));
        container.innerHTML = "";

        if(snap.empty) {
            container.innerHTML = "<div style='padding:20px; color:#666;'>NESSUNA MINACCIA RILEVATA NEL SETTORE.</div>";
            return;
        }

        snap.forEach(d => {
            const m = d.data();
            const card = document.createElement('div');
            card.className = 'threat-card';
            card.innerHTML = `
                <div class="threat-name">${m.nome}</div>
                <div>
                    <span class="badge bg-diff">DIFF: ${m.diff}</span>
                    <span class="badge bg-pot">POT: ${m.pot}</span>
                </div>
                <p style="font-size:0.9rem; color:#bbb; margin:10px 0;">${m.desc}</p>
                <div style="margin-top:10px;">
                    <label>TRATTI_VITALI</label>
                    ${m.tratti.map(t => `<div class="tratto-item">-- ${t}</div>`).join('')}
                </div>
                <div style="margin-top:15px;">
                    <label>TECNICA_ATTIVA</label>
                    <div style="font-size:0.85rem; color:var(--neon-blue);">${m.tecnica}</div>
                </div>
                <div class="debolezza-box">
                    <b style="font-family:'Orbitron'; font-size:0.6rem;">VULNERABILITÀ:</b><br>${m.debole}
                </div>
                ${auth.currentUser.email === MASTER_EMAIL ? 
                    `<button onclick="deleteThreat('${d.id}')" style="margin-top:15px; background:none; border:none; color:#444; cursor:pointer; font-size:0.6rem;">[ELIMINA_RECORD]</button>` 
                    : ''}
            `;
            container.appendChild(card);
        });
    }

    window.deleteThreat = async (id) => {
        if(confirm("Eliminare definitivamente il record?")) {
            await deleteDoc(doc(db, "minacce", id));
            location.reload();
        }
    };
</script>
</body>
</html>
